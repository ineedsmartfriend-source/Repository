<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ MASTER-CLASS AI 지능형 종합 복원 메모장 V7</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #030712;
        }
        .ai-final-box {
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.75;
            letter-spacing: -0.02em;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0b1329;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1f293d;
            border-radius: 4px;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800 pb-3 shrink-0">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🦅</span>
            <div>
                <h1 class="text-base font-extrabold tracking-tight bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-400 bg-clip-text text-transparent">초정밀 구조 수렴 메모 시스템 (V7 ULTRA)</h1>
                <p class="text-[10px] text-slate-500 font-mono">Dynamic Row Convergence & Ultra Purifier Engine</p>
            </div>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-400 hover:text-rose-400 transition-colors bg-slate-900 border border-slate-800 px-2.5 py-1 rounded-md">전체 초기화</button>
    </div>

    <div class="my-3 shrink-0 relative">
        <div class="w-full h-16 bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800/80 rounded-xl shadow-2xl flex items-center justify-center gap-3 pointer-events-none">
            <span class="text-xl text-cyan-400 animate-pulse">✨</span>
            <span id="btn-text" class="text-xs font-bold text-slate-200">노트 · 표 이미지 분석 (세로 찢어짐 및 계단식 줄바꿈 완벽 해결)</span>
        </div>
        <input type="file" id="image-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-2.5 bg-slate-900/50 rounded-lg mt-2 border border-slate-800/60 font-medium">
            🟢 엔진 스탠바이 (글자 단차 오차를 수학적으로 계산하여 한눈에 보이도록 문장을 조립합니다)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-16 text-center">
            <div class="text-3xl mb-3 opacity-40">📝</div>
            <p class="font-bold text-slate-300 text-sm mb-1">고가독성 마스터 뷰 활성화 완료</p>
            <p class="max-w-xs leading-relaxed text-slate-500">줄바꿈 오류가 가득한 캡처본을 가로 스트림으로 완벽히 결합하여 최상의 시각 정보로 변환합니다.</p>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('ai_master_v7_memos')) || [];
        renderMemos();

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerHTML = "⏳ <span class='text-amber-400 font-bold'>[1/2] 고급 그래픽 전처리 스케일링 가동 중...</span>";
                btnText.innerText = "이미지 최적화 중...";
                imageInput.disabled = true;

                const img = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const i = new Image();
                        i.onload = () => resolve(i);
                        i.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                // 이미지 선명도 극대화 픽셀 필터링
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                    let v = (gray > 140) ? 255 : 0; 
                    data[i] = v; data[i+1] = v; data[i+2] = v;
                }
                ctx.putImageData(imgData, 0, 0);

                statusBar.innerHTML = "⏳ <span class='text-cyan-400 font-bold'>[2/2] 동적 유연 행 수렴 연산 및 유령 기호 삭제 중...</span>";
                btnText.innerText = "단차 정렬 메커니즘 연산 중...";

                const worker = await Tesseract.createWorker('kor+eng');
                const result = await worker.recognize(canvas);
                const words = result.data.words;
                await worker.terminate();

                if (!words || words.length === 0) {
                    statusBar.innerText = "❌ 문자를 검출하지 못했습니다. 선명한 이미지를 사용해주세요.";
                    resetInput();
                    return;
                }

                const imgWidth = canvas.width;
                const rows = [];
                // 고해상도 및 저해상도 이미지의 단차를 모두 흡수할 수 있는 가변 마진 공식 적용
                const rowThreshold = Math.max(22, img.height * 0.024); 

                // [핵심 해결책: 단차 오류를 잡아내는 지능형 행 수렴 프로세스]
                words.forEach(word => {
                    let text = word.text.trim();
                    if (!text) return;

                    // 가독성을 해치는 가비지 특수 파편 문자 원천 필터링
                    if (/^[\\|¦_~+=<>`^'""\s\[\](){}:;,\-–—.]+$/.test(text) && text.length <= 1) return;

                    let yCenter = word.bbox.y0 + (word.bbox.y1 - word.bbox.y0) / 2;
                    // 기존에 등록된 행들 중 높이 차이가 임계값 이내인 행을 통합 검색
                    let matchedRow = rows.find(r => Math.abs(r.yCenter - yCenter) < rowThreshold);

                    if (matchedRow) {
                        matchedRow.words.push(word);
                        // 수렴된 행의 중심값을 유동적으로 업데이트
                        matchedRow.yCenter = (matchedRow.yCenter * (matchedRow.words.length - 1) + yCenter) / matchedRow.words.length;
                    } else {
                        rows.push({ yCenter: yCenter, words: [word] });
                    }
                });

                // 상단 행부터 순서대로 정렬
                rows.sort((a, b) => a.yCenter - b.yCenter);

                // 구조 분석 (표 형태인지 유연한 줄글 형태인지 판별)
                let totalGaps = 0;
                let wideGapCount = 0;
                let validWordPairs = 0;

                rows.forEach(row => {
                    row.words.sort((a, b) => a.bbox.x0 - b.bbox.x0);
                    for(let i = 1; i < row.words.length; i++) {
                        let gapRatio = (row.words[i].bbox.x0 - row.words[i-1].bbox.x1) / imgWidth;
                        if(gapRatio > 0.05) wideGapCount++;
                        validWordPairs++;
                    }
                });

                const isTableStructure = validWordPairs > 0 && (wideGapCount / validWordPairs > 0.2);
                let finalLines = [];

                // 문장 복원 및 정렬 스트림
                rows.forEach(row => {
                    row.words.sort((a, b) => a.bbox.x0 - b.bbox.x0);
                    
                    let lineText = "";
                    for (let i = 0; i < row.words.length; i++) {
                        let currentWord = row.words[i];
                        let txt = currentWord.text.trim();

                        if (i > 0) {
                            let prevWord = row.words[i - 1];
                            let gapRatio = (currentWord.bbox.x0 - prevWord.bbox.x1) / imgWidth;

                            if (isTableStructure) {
                                if (gapRatio > 0.04) {
                                    lineText += "  |  ";
                                } else {
                                    lineText += " ";
                                }
                            } else {
                                // 일반 기획서/노트의 경우 세로로 찢어지지 않도록 스페이스 최적화
                                if (gapRatio > 0.03) {
                                    lineText += " ";
                                } else if (gapRatio < 0.006) {
                                    lineText += ""; // 영문-한글 번역 파편 밀착 결합
                                } else {
                                    lineText += " ";
                                }
                            }
                        }
                        lineText += txt;
                    }

                    let cleanedLine = lineText.trim();
                    
                    // 불필요한 공백 괄호 및 기호 파편 정규식 완전 청소
                    cleanedLine = cleanedLine.replace(/\[\s*\|\s*\]/g, '');
                    cleanedLine = cleanedLine.replace(/\[\s*\]/g, '');
                    cleanedLine = cleanedLine.replace(/\s*\|\s*$/g, '');
                    cleanedLine = cleanedLine.replace(/^\s*\|\s*/g, '');

                    // 가독성을 증진시키는 불릿 포인트 보정
                    if (/^[•*▪️-]\s*/.test(cleanedLine)) {
                        cleanedLine = "🔹 " + cleanedLine.replace(/^[•*▪️-]\s*/, '');
                    } else if (/^[0-9]{1,2}\s+/.test(cleanedLine) && !isTableStructure) {
                        cleanedLine = "📍 " + cleanedLine;
                    }

                    if (cleanedLine.replace(/[|\s]/g, '').length > 1) {
                        finalLines.push(cleanedLine);
                    }
                });

                let finalProcessedResult = finalLines.join('\n').replace(/\n{3,}/g, '\n\n').trim();

                if (finalProcessedResult) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                        isTable: isTableStructure,
                        content: finalProcessedResult
                    };

                    memos.unshift(newMemo);
                    localStorage.setItem('ai_master_v7_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = `✅ 정렬 성공! [${isTableStructure ? '구조형 테이블' : '직관적 컴팩트 노트'}] 형태로 가독성을 극대화했습니다.`;
                } else {
                    statusBar.innerText = "❌ 노이즈 제거 후 남은 유효 텍스트가 없습니다.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 오작동 제어 랩핑: " + err.message;
            } finally {
                resetInput();
            }
        });

        function resetInput() {
            imageInput.disabled = false;
            btnText.innerText = "노트 · 표 이미지 분석 (세로 찢어짐 및 계단식 줄바꿈 완벽 해결)";
            imageInput.value = "";
        }

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('정말로 저장된 모든 마스터 노트를 비우시겠습니까?')) {
                memos = [];
                localStorage.removeItem('ai_master_v7_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 모든 메모 캐시가 초기화되었습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('ai_master_v7_memos', JSON.stringify(memos));
            renderMemos();
        }

        function renderMemos() {
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                return;
            }
            emptyState.style.display = 'none';

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-900/40 border border-slate-800 p-4 rounded-xl relative mb-4 shadow-lg animate-fadeIn";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-3 border-b border-slate-800 pb-2">
                        <div class="flex items-center gap-2">
                            <span class="inline-block w-2 h-2 rounded-full ${m.isTable ? 'bg-cyan-400' : 'bg-emerald-400'}"></span>
                            <span class="text-xs font-bold tracking-wider uppercase font-mono ${m.isTable ? 'text-cyan-400' : 'text-emerald-400'}">
                                ${m.isTable ? '📊 GRID TABLE STRUCT' : '📝 COMPACT FLOW NOTE'}
                            </span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-slate-500 font-mono">${m.time}</span>
                            <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 transition-colors px-1 font-bold">✕</button>
                        </div>
                    </div>
                    <div class="bg-slate-950/80 p-4 rounded-lg border border-slate-800/50 shadow-inner">
                        <p class="ai-final-box text-xs md:text-sm text-slate-200 select-text cursor-text font-sans">${m.content}</p>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
