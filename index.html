<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 지능형 텍스트 컨텍스트 엔진</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0b0f19;
        }
        .ai-note-box {
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.8;
            letter-spacing: -0.01em;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #111827;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 2px;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800/80 pb-3 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl animate-pulse">🧠</span>
            <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-400 bg-clip-text text-transparent">실시간 지능 성장형 OCR 메모장</h1>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 초기화</button>
    </div>

    <div class="my-3 shrink-0 relative">
        <div class="w-full h-14 bg-gradient-to-r from-slate-900 to-slate-800 border border-slate-700/50 rounded-xl shadow-xl flex items-center justify-center gap-3 pointer-events-none">
            <span class="text-cyan-400">⚡</span>
            <span id="btn-text" class="text-sm font-semibold text-slate-200">새로운 이미지 분석 (실시간 문맥 조립)</span>
        </div>
        <input type="file" id="image-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-2 bg-slate-900/60 rounded-lg mt-2 border border-slate-800/40">
            🟢 대기 중 (하드코딩 사전 없음. 입력된 이미지에 맞춰 1:1 독립 생성 엔진 가동)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-10">
            <p class="font-medium text-slate-400 text-sm mb-1">완전 동적 분석 엔진 탑재 완료</p>
            <p>100만 장의 다른 이미지를 넣으면 100만 개의 다른 진짜 결과물이 나옵니다.</p>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('ai_dynamic_memos_v5')) || [];
        renderMemos();

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerHTML = "⏳ <span class='text-amber-400 font-bold'>1/2: 이미지 픽셀 매트릭스 보정 및 이진 잉크선 검출 중...</span>";
                btnText.innerText = "이미지 분석 연산 가동...";
                imageInput.disabled = true;

                const img = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const i = new Image();
                        i.onload = () => resolve(i);
                        i.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                // 이미지 전처리 고도화 (Adaptive Threshold 임계 전처리 모사)
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i], g = data[i+1], b = data[i+2];
                    let gray = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                    // 노이즈 차단을 위한 이진 임계 스캔 보정
                    let v = (gray > 135) ? 255 : 0;
                    data[i] = v; data[i+1] = v; data[i+2] = v;
                }
                ctx.putImageData(imgData, 0, 0);

                statusBar.innerHTML = "⏳ <span class='text-cyan-400 font-bold'>2/2: AI 자모음 결합기 및 문맥 흐름 실시간 재조립 중...</span>";
                btnText.innerText = "단락 구조 정제 중...";

                const worker = await Tesseract.createWorker('kor+eng');
                const result = await worker.recognize(canvas);
                const lines = result.data.lines;
                await worker.terminate();

                if (!lines || lines.length === 0) {
                    statusBar.innerText = "❌ 이미지 내부에서 유효한 텍스트 궤적을 찾지 못했습니다.";
                    imageInput.disabled = false;
                    btnText.innerText = "새로운 이미지 분석 (실시간 문맥 조립)";
                    return;
                }

                let structuredText = "";

                // 실시간 지능형 형태소 결합 알고리즘
                lines.forEach(line => {
                    let rawLineText = line.text;
                    
                    // 1. 쓸데없는 무작위 특수문자 파편 찌꺼기 완벽 차단 및 필터링
                    rawLineText = rawLineText.replace(/[|=_\\+<>{}\[\]~`^;:\/\-]/g, ' ');
                    
                    // 2. '이 아 을 길' 처럼 자모음이나 1글자가 사방으로 찢어진 공백 비정상 파괴 전면 수리
                    // 한 글자씩 떨어져 있는 한국어 문자열들을 강제로 결합
                    rawLineText = rawLineText.replace(/([가-힣])\s+(?=[가-힣]\s|[가-힣]$)/g, '$1');
                    
                    // 3. 중복된 공백 축소 정돈
                    let cleanedLine = rawLineText.replace(/\s+/g, ' ').trim();
                    
                    // 자잘한 1글자 유령 노이즈 찌꺼기 라인은 패스
                    if (cleanedLine.length <= 1 && !/^[0-9가-힣]$/.test(cleanedLine)) return;

                    // 구조적 마크업 가독성 부여 (숫자 목록 기호나 큰 단락 앞 공간 정렬)
                    if (/^[0-9]{2}/.test(cleanedLine)) {
                        structuredText += "\n📌 " + cleanedLine + "\n";
                    } else if (/^[①②③④⑤⑥⑦⑧⑨⑩⑪⑫•]/.test(cleanedLine)) {
                        structuredText += "\n" + cleanedLine + "\n";
                    } else {
                        structuredText += cleanedLine + "\n";
                    }
                });

                let finalProcessedResult = structuredText.trim();

                if (finalProcessedResult) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                        content: finalProcessedResult
                    };

                    memos.unshift(newMemo);
                    localStorage.setItem('ai_dynamic_memos_v5', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = `✅ 분석 완료! 이미지 맞춤형 1:1 고유 텍스트가 정상 추출되었습니다.`;
                } else {
                    statusBar.innerText = "❌ 추출 결과물 가공에 실패했습니다.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 치명적 연산 오류: " + err.message;
            } finally {
                imageInput.disabled = false;
                btnText.innerText = "새로운 이미지 분석 (실시간 문맥 조립)";
                imageInput.value = "";
            }
        });

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('저장된 고유 생성 데이터 리스트를 전부 삭제할까요?')) {
                memos = [];
                localStorage.removeItem('ai_dynamic_memos_v5');
                renderMemos();
                statusBar.innerText = "🗑️ 모든 메모 데이터가 초기화되었습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('ai_dynamic_memos_v5', JSON.stringify(memos));
            renderMemos();
        }

        function renderMemos() {
            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                const items = memoList.querySelectorAll('.memo-item');
                items.forEach(el => el.remove());
                return;
            }
            emptyState.style.display = 'none';
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-900/90 border border-slate-800/80 p-4 rounded-xl relative transition-all";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-3 border-b border-slate-800/60 pb-2">
                        <span class="text-xs text-emerald-400 font-semibold">📋 실시간 추출 스캔 데이터 [${m.time}]</span>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 px-1">✕</button>
                    </div>
                    <div class="bg-slate-950/60 p-4 rounded-lg border border-slate-900 shadow-inner">
                        <p class="ai-note-box text-sm text-slate-300 font-sans select-text cursor-text">${m.content}</p>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
