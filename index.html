<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 지능형 범용 다국어 OCR 가공 메모장</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body {
            font-family: 'Pretendard', 'Noto Sans JP', 'Noto Sans SC', sans-serif;
            background-color: #070a12;
        }
        .ai-global-box {
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.8;
            letter-spacing: -0.01em;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0b1329;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2b3d63;
            border-radius: 3px;
        }
    </style>
</head>
<body class="text-slate-200 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800/80 pb-3 shrink-0">
        <div class="flex items-center gap-2.5">
            <span class="text-xl animate-spin-[spin_8s_linear_infinite]">🌐</span>
            <div>
                <h1 class="text-sm font-bold tracking-tight bg-gradient-to-r from-teal-400 via-cyan-400 to-indigo-400 bg-clip-text text-transparent">범용 다국어 문맥 정제 메모장</h1>
                <p class="text-[10px] text-slate-500">Global Multi-Language & Special Characters Engine</p>
            </div>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 리셋</button>
    </div>

    <div class="my-3 shrink-0 relative">
        <div class="w-full h-14 bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 rounded-xl shadow-2xl flex items-center justify-center gap-3 pointer-events-none">
            <span class="text-cyan-400">🌎</span>
            <span id="btn-text" class="text-xs font-semibold text-slate-300">세계 모든 언어 이미지 분석 (원본 문자 보존형)</span>
        </div>
        <input type="file" id="image-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-2 bg-slate-900/40 rounded-lg mt-2 border border-slate-800/60">
            🟢 스탠바이 (한글, 영어, 한자, 일어 및 주요 세계 언어와 특수문자를 변형 없이 있는 그대로 추적합니다)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-12">
            <p class="font-semibold text-slate-400 text-sm mb-1">다국어 대응 중립 엔진 탑재</p>
            <p>100만 가지의 서로 다른 국가의 문서, 도표, 특수 기호를 실시간으로 정밀 스캔합니다.</p>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('ai_global_lang_memos')) || [];
        renderMemos();

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerHTML = "⏳ <span class='text-amber-400 font-bold'>1/2: 글로벌 폰트 외곽선 추출 및 노이즈 아티팩트 소거 중...</span>";
                btnText.innerText = "다국어 픽셀 디코딩 중...";
                imageInput.disabled = true;

                const img = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const i = new Image();
                        i.onload = () => resolve(i);
                        i.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                // 고강도 적응형 선명도 보정 (다국어 미세 폰트 유실 차단)
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i], g = data[i+1], b = data[i+2];
                    let gray = 0.299 * r + 0.587 * g + 0.114 * b;
                    // 다국어 손글씨 및 인쇄 기호 보존을 위해 이진화 경계 최적화 (145 임계값)
                    let v = (gray > 145) ? 255 : 0;
                    data[i] = v; data[i+1] = v; data[i+2] = v;
                }
                ctx.putImageData(imgData, 0, 0);

                statusBar.innerHTML = "⏳ <span class='text-cyan-400 font-bold'>2/2: 범용 언어 매핑팩 가동 및 텍스트 원형 스트림 분석 중...</span>";
                btnText.innerText = "글로벌 텍스트 빌드 중...";

                // 주요 범용 언어팩(한국어, 영어, 일본어, 중국어 간체) 통합 가동
                const worker = await Tesseract.createWorker('kor+eng+jpn+chi_sim');
                const result = await worker.recognize(canvas);
                const lines = result.data.lines;
                await worker.terminate();

                if (!lines || lines.length === 0) {
                    statusBar.innerText = "❌ 이미지 내부에서 문맥 궤적을 발견하지 못했습니다.";
                    imageInput.disabled = false;
                    btnText.innerText = "세계 모든 언어 이미지 분석 (원본 문자 보존형)";
                    return;
                }

                let processedLines = [];

                lines.forEach(line => {
                    let text = line.text;

                    // [다국어 안전 보존 후처리]
                    // 각 나라 언어 고유의 알파벳, 악센트, 특수 형태소 가공을 침해하지 않기 위해 
                    // 줄 맨 앞/뒤에 외롭게 떨어져서 발생하는 OCR 엔진 오류성 찌꺼기 기호(|, \, ¦)만 선택적으로 제거합니다.
                    text = text.replace(/^[\s|\\¦_.\-+~:=]+|[\s|\\¦_.\-+~:=]+$/g, '');

                    let cleanedLine = text.trim();

                    // 실질적 데이터 가치가 없는 유령 공백 라인은 필터링
                    if (cleanedLine.length === 0) return;

                    // 목록 구조를 만들어주는 특수문자 불릿 기호는 스마트하게 시각적 정렬 보정
                    if (/^[•*📌🎯🚀▪️-]\s*/.test(cleanedLine)) {
                        cleanedLine = "📍 " + cleanedLine.replace(/^[•*📌🎯🚀▪️-]\s*/, '');
                    }

                    processedLines.push(cleanedLine);
                });

                // 실시간으로 원형 그대로 조립된 텍스트 스트림 생성
                let finalProcessedResult = processedLines.join('\n').replace(/\n{3,}/g, '\n\n').trim();

                if (finalProcessedResult) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                        content: finalProcessedResult
                    };

                    memos.unshift(newMemo);
                    localStorage.setItem('ai_global_lang_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = `✅ 다국어 분석 성공! 이미지 원본 언어 모델 구조 그대로 메모에 저장되었습니다.`;
                } else {
                    statusBar.innerText = "❌ 문맥 유효성 필터를 만족하는 텍스트가 없습니다.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 치명적 디코딩 에러: " + err.message;
            } finally {
                imageInput.disabled = false;
                btnText.innerText = "세계 모든 언어 이미지 분석 (원본 문자 보존형)";
                imageInput.value = "";
            }
        });

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('저장된 다국어 추출 리스트를 전부 삭제할까요?')) {
                memos = [];
                localStorage.removeItem('ai_global_lang_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 저장 공간 리셋 완료.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('ai_global_lang_memos', JSON.stringify(memos));
            renderMemos();
        }

        function renderMemos() {
            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                const items = memoList.querySelectorAll('.memo-item');
                items.forEach(el => el.remove());
                return;
            }
            emptyState.style.display = 'none';
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-900/70 border border-slate-800/80 p-4 rounded-xl relative mb-4 transition-all";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-2.5 border-b border-slate-800/60 pb-1.5">
                        <span class="text-xs text-cyan-400 font-medium tracking-wide">🗺️ MULTI-LANGUAGE LIVE DATA [${m.time}]</span>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-600 hover:text-rose-400 px-1">✕</button>
                    </div>
                    <div class="bg-slate-950/90 p-4 rounded-lg border border-slate-900 shadow-inner">
                        <p class="ai-global-box text-xs md:text-sm text-slate-300 select-text cursor-text font-sans">${m.content}</p>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
