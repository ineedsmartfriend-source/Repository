<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Smart Text & Row Filter OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
        }
        .clean-row-font {
            font-family: 'Fira Code', 'Pretendard', monospace;
            white-space: pre;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 2px;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800 pb-2 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl">✨</span>
            <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">스마트 텍스트 정제 메모장</h1>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 삭제</button>
    </div>

    <div class="my-3 space-y-2 shrink-0">
        <input type="file" id="image-input" accept="image/*" class="hidden">
        
        <button id="upload-btn" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 active:scale-[0.98] text-white font-bold py-4 px-4 rounded-xl shadow-lg transition-all text-sm flex items-center justify-center gap-2">
            <span>✨</span>
            <span id="btn-text">캡처 선택 (의미 있는 행 단위 추출)</span>
        </button>

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-1.5 bg-slate-800/50 rounded-md">
            🟢 스탠바이 (노이즈와 불필요한 기호를 자동 필터링합니다)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-10">
            <p>화면 캡처 이미지를 선택하면,</p>
            <p class="mt-1">의미 있는 단어만 골라 줄(행)을 맞춰 깔끔하게 정리합니다.</p>
        </div>
    </div>

    <script>
        const uploadBtn = document.getElementById('upload-btn');
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('my_clean_row_memos')) || [];
        
        renderMemos();

        uploadBtn.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerText = "⏳ 이미지 스캔 준비 중...";
                btnText.innerText = "텍스트 필터링 중...";
                uploadBtn.disabled = true;

                statusBar.innerText = "📐 글자 인지 및 구조 분석 알고리즘 작동 중...";
                const result = await Tesseract.recognize(file, 'kor');
                const words = result.data.words;

                if (words.length === 0) {
                    statusBar.innerText = "❌ 인식된 텍스트가 없습니다.";
                    uploadBtn.disabled = false;
                    btnText.innerText = "캡처 선택 (의미 있는 행 단위 추출)";
                    return;
                }

                // --- [고도화 알고리즘 1: 불필요 텍스트 필터링] ---
                const filteredWords = words.filter(w => {
                    const text = w.text.trim();
                    
                    // 1. 의미 없는 단순 노이즈 기호 제거 (., -, _, =, |, * 등 정제)
                    if (/^[.,\-_=|*+:^~'""`‘’“”()\[\]{}<>!?]+$/.test(text)) return false;
                    
                    // 2. OCR 왜곡으로 생기는 무의미한 한 글자 자음/모음 찌꺼기 필터링
                    if (/^[ㄱ-ㅎㅏ-ㅣ]$/.test(text)) return false;
                    
                    // 3. 너무 짧은 노이즈성 한 글자 단어 중 영문/기호만 있는 것 필터링 (한글은 1자 단어도 포함하되 특수문자 연동 제거)
                    if (text.length === 1 && /^[a-zA-Z0-9]$/.test(text)) return false;

                    return true;
                });

                if (filteredWords.length === 0) {
                    statusBar.innerText = "❌ 필터링 후 남은 유의미한 데이터가 없습니다.";
                    uploadBtn.disabled = false;
                    btnText.innerText = "캡처 선택 (의미 있는 행 단위 추출)";
                    return;
                }

                // --- [고도화 알고리즘 2: 정밀 행(줄) 분리 및 수평 정렬] ---
                // Y축 오차범위를 글자 높이 기준으로 계산하여 같은 줄끼리 바인딩
                filteredWords.sort((a, b) => a.bbox.y0 - b.bbox.y0);
                
                const rows = [];
                let currentSrcRow = [filteredWords[0]];

                for (let i = 1; i < filteredWords.length; i++) {
                    const currentWord = filteredWords[i];
                    const lastWordInRow = currentSrcRow[currentSrcRow.length - 1];
                    const rowHeight = lastWordInRow.bbox.y1 - lastWordInRow.bbox.y0;

                    // 단어 간 Y축 차이가 글자 높이의 60% 이내면 동일한 행(줄)으로 묶음
                    if (currentWord.bbox.y0 - lastWordInRow.bbox.y0 <= rowHeight * 0.6) {
                        currentSrcRow.push(currentWord);
                    } else {
                        rows.push(currentSrcRow);
                        currentSrcRow = [currentWord];
                    }
                }
                rows.push(currentSrcRow);

                // --- [고도화 알고리즘 3: 행 내부의 열 간격 최적화 정렬] ---
                let finalCleanText = "";
                
                rows.forEach(row => {
                    row.sort((a, b) => a.x0 - b.x0); // 왼쪽 단어부터 정렬
                    
                    let rowStr = "";
                    for (let j = 0; j < row.length; j++) {
                        if (j > 0) {
                            const gap = row[j].bbox.x0 - row[j-1].bbox.x1;
                            // 단어 사이의 거리가 다소 떨어져 있다면 탭 공간(열 분리) 부여, 가까우면 한 칸 공백만 부여
                            if (gap > 35) {
                                rowStr += "    "; // 탭 형태의 열 구분
                            } else {
                                rowStr += " "; // 일반 단어 띄어쓰기
                            }
                        }
                        rowStr += row[j].text;
                    }
                    
                    // 정제 후 빈 줄이 된 행은 추가하지 않음
                    if (rowStr.trim().length > 0) {
                        finalCleanText += rowStr + "\n";
                    }
                });

                if (finalCleanText.trim()) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                        content: finalCleanText.trim()
                    };
                    memos.unshift(newMemo);
                    localStorage.setItem('my_clean_row_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = "✅ 유의미한 텍스트가 행 기준으로 정렬되어 저장되었습니다!";
                } else {
                    statusBar.innerText = "❌ 정제된 데이터 추출에 실패했습니다.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 오류: " + err.message;
            } finally {
                uploadBtn.disabled = false;
                btnText.innerText = "캡처 선택 (의미 있는 행 단위 추출)";
                imageInput.value = "";
            }
        });

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('모든 메모를 삭제하시겠습니까?')) {
                memos = [];
                localStorage.removeItem('my_clean_row_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 모든 메모가 삭제되었습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('my_clean_row_memos', JSON.stringify(memos));
            renderMemos();
            statusBar.innerText = "🗑️ 선택한 메모가 삭제되었습니다.";
        }

        function renderMemos() {
            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                const items = memoList.querySelectorAll('.memo-item');
                items.forEach(el => el.remove());
                return;
            }
            
            emptyState.style.display = 'none';
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-800/40 border border-slate-700/40 p-3 rounded-lg relative transition-all";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-2 border-b border-slate-800/80 pb-1">
                        <span class="text-[10px] text-slate-500 font-bold">${m.time} [노이즈 정제 완료]</span>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 px-1">✕</button>
                    </div>
                    <div class="overflow-x-auto custom-scrollbar whitespace-pre py-1">
                        <p class="clean-row-font text-xs text-cyan-300 leading-relaxed select-text cursor-text">${m.content}</p>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
