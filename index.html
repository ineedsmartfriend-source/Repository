<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 1-Click Screen OCR Memo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 2px;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800 pb-3 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl">📝</span>
            <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">스마트 캡처 메모장</h1>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 삭제</button>
    </div>

    <div class="my-3 space-y-2 shrink-0">
        <input type="file" id="image-input" accept="image/*" class="hidden">
        
        <button id="upload-btn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 active:scale-[0.98] text-white font-bold py-4 px-4 rounded-xl shadow-lg transition-all text-sm flex items-center justify-center gap-2">
            <span id="btn-icon">📸</span>
            <span id="btn-text">캡처 사진 선택 및 텍스트 추출</span>
        </button>

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-1.5 bg-slate-800/50 rounded-md">
            🟢 스탠바이 (버튼을 눌러 이미지를 선택하세요)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-3 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-10">
            <p>스마트폰 화면을 캡처한 후</p>
            <p class="mt-1">상단 버튼을 눌러 사진을 고르면 자동 저장됩니다.</p>
        </div>
    </div>

    <script>
        const uploadBtn = document.getElementById('upload-btn');
        const imageInput = document.getElementById('image-input');
        const btnIcon = document.getElementById('btn-icon');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('my_popup_memos')) || [];
        
        renderMemos();

        // 버튼 누르면 파일 선택창 강제 대리 클릭
        uploadBtn.addEventListener('click', () => {
            imageInput.click();
        });

        // 이미지가 선택되었을 때 작동할 로직
        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerText = "⏳ 이미지 로딩 및 분석 준비 중...";
                btnText.innerText = "분석 중...";
                uploadBtn.disabled = true;

                // Tesseract OCR 엔진 실행 (한글)
                statusBar.innerText = "🔤 한글 인공지능 텍스트 변환 중...";
                const result = await Tesseract.recognize(file, 'kor', {
                    logger: m => {
                        if(m.status === 'recognizing') {
                            statusBar.innerText = `🔤 텍스트 추출 중... (${Math.floor(m.progress * 100)}%)`;
                        }
                    }
                });

                const extractedText = result.data.text.trim();

                if (extractedText) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                        content: extractedText
                    };
                    memos.unshift(newMemo);
                    localStorage.setItem('my_popup_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = "✅ 메모가 성공적으로 저장되었습니다!";
                } else {
                    statusBar.innerText = "❌ 인식된 텍스트가 없습니다. 다른 사진으로 시도해 주세요.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 오류: " + err.message;
            } finally {
                uploadBtn.disabled = false;
                btnText.innerText = "캡처 사진 선택 및 텍스트 추출";
                imageInput.value = ""; // 연속 선택 가능하도록 리셋
            }
        });

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('모든 메모를 삭제하시겠습니까?')) {
                memos = [];
                localStorage.removeItem('my_popup_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 모든 메모가 삭제되었습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('my_popup_memos', JSON.stringify(memos));
            renderMemos();
            statusBar.innerText = "🗑️ 선택한 메모가 삭제되었습니다.";
        }

        function renderMemos() {
            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                const items = memoList.querySelectorAll('.memo-item');
                items.forEach(el => el.remove());
                return;
            }
            
            emptyState.style.display = 'none';
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-800/60 border border-slate-700/50 p-3 rounded-lg relative group transition-all hover:border-slate-600";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[10px] text-slate-500">${m.time}</span>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 px-1">✕</button>
                    </div>
                    <p class="text-xs text-slate-200 leading-relaxed break-all select-text cursor-text">${m.content.replace(/\n/g, '<br>')}</p>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
