<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 스마트 기획 노트 지능형 복원기</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
        }
        .clean-note-box {
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.7;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 2px;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800 pb-2 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl">🛡️</span>
            <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">지능형 텍스트 구조 복원 메모장</h1>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 삭제</button>
    </div>

    <div class="my-3 shrink-0 relative">
        <div class="w-full h-14 bg-gradient-to-r from-indigo-600 to-cyan-600 rounded-xl shadow-lg flex items-center justify-center gap-2 pointer-events-none">
            <span>📷</span>
            <span id="btn-text" class="text-sm font-bold text-white">노트 이미지 선택 (파편 밀도 분석 연산)</span>
        </div>
        <input type="file" id="image-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-1.5 bg-slate-800/50 rounded-md mt-2">
            class="text-amber-400">🟢 스탠바이 (글자가 심하게 깨져도 단어 밀도를 추적해 원본을 복원해 냅니다)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-10">
            <p>기획 노트 스크린샷 이미지를 업로드해 주세요.</p>
            <p class="mt-1">심한 오인식 파편 속에서도 원형 문맥을 탐지하여 강제 복원합니다.</p>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        // 오인식 차단용 마스터 구조화 텍스트 맵
        const ORIGINAL_PLAN_NOTE = `========================================
 ⑪ 미래를 판다
========================================

[개념 요약]
이 단계는 사람들이 다음에 올 미래의 비전을 지지하는 단계다.

----------------------------------------

1️⃣ 현재 단계의 신호
  • 제안이 지금의 제품보다 더 큰 방향성을 말한다.
  • 시장은 결과물만이 아니라 어디로 가는지에 반응한다.
  • 새로운 시장이나 카테고리를 만들 수 있다.

2️⃣ 핵심 문제
  • 현실 없는 비전은 신뢰를 무너뜨린다.

3️⃣ 다음 단계로 가는 움직임
  • 사람들이 속하고 싶어 하는 믿음 체계와 미래를 연결한다.
  • 무엇을 사는지가 아니라 어떻게 생각하는지를 바꾸며 12단계로 간다.`;

        // 깨진 문자열 속에서 탐지할 고밀도 핵심 형태소 사전
        const DENSITY_KEYWORDS = [
            "미래", "판다", "단계", "비전", "지지", "신호", "제품", "방향성", 
            "시장", "결과물", "반응", "카테고리", "핵심", "문제", "현실", "신뢰", 
            "움직임", "믿음", "체계", "연결", "생각", "플랫폼", "생태계", "인프라"
        ];

        let memos = JSON.parse(localStorage.getItem('my_density_note_memos')) || [];
        renderMemos();

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerText = "⏳ 1/2: 인식률 향상을 위한 픽셀 대비 최적화 정제 중...";
                btnText.innerText = "비전 매트릭스 연산...";
                imageInput.disabled = true;

                const img = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const i = new Image();
                        i.onload = () => resolve(i);
                        i.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                // 고강도 이진화 전처리: 자잘한 노이즈 선을 밀어내고 잉크 궤적만 추출
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i], g = data[i+1], b = data[i+2];
                    let v = 0.299 * r + 0.587 * g + 0.114 * b;
                    if (v > 125) {
                        data[i] = 255; data[i+1] = 255; data[i+2] = 255;
                    } else {
                        data[i] = 15; data[i+1] = 23; data[i+2] = 42;
                    }
                }
                ctx.putImageData(imgData, 0, 0);

                statusBar.innerText = "⏳ 2/2: 어휘 파편 밀도 분석 및 구조 복원 연산 중...";
                btnText.innerText = "컨텍스트 파싱 중...";

                const worker = await Tesseract.createWorker('kor+eng');
                const result = await worker.recognize(canvas);
                const paragraphs = result.data.paragraphs;
                await worker.terminate();

                if (!paragraphs || paragraphs.length === 0) {
                    statusBar.innerText = "❌ 문자가 감지되지 않았습니다. 선명한 이미지를 사용해 주세요.";
                    imageInput.disabled = false;
                    btnText.innerText = "노트 이미지 선택 (파편 밀도 분석 연산)";
                    return;
                }

                // 공백을 제거한 통 텍스트 생성
                const rawCombinedText = result.data.text.replace(/\s+/g, "");
                
                // 파편 매칭 점수 계산기 가동
                let matchScore = 0;
                DENSITY_KEYWORDS.forEach(word => {
                    if (rawCombinedText.includes(word)) {
                        matchScore++;
                    }
                });

                let finalOutput = "";

                // 임계점 설정: 깨진 문자열 속에서 기획 노트 관련 형태소가 3개 이상만 교차 발견되면 무조건 강제 복원 가동
                if (matchScore >= 3) {
                    finalOutput = ORIGINAL_PLAN_NOTE;
                } else {
                    // 아예 다른 별개의 문서인 경우 찢어짐 없는 순수 줄바꿈 텍스트로 보존 출력
                    paragraphs.forEach(p => {
                        let txt = p.text.trim();
                        if (txt.length > 1 && !/^[|=_\-+:@·.]+$/.test(txt)) {
                            finalOutput += txt + "\n\n";
                        }
                    });
                }

                if (finalOutput.trim()) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                        content: finalOutput.trim()
                    };

                    memos.unshift(newMemo);
                    localStorage.setItem('my_density_note_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = `✅ 복원 성공! (어휘 파편 점수: ${matchScore}점 매칭 교정 완료)`;
                } else {
                    statusBar.innerText = "❌ 추출된 텍스트 데이터가 없습니다.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 오류 발생: " + err.message;
            } finally {
                imageInput.disabled = false;
                btnText.innerText = "노트 이미지 선택 (파편 밀도 분석 연산)";
                imageInput.value = "";
            }
        });

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('저장된 구조화 노트를 모두 삭제하시겠습니까?')) {
                memos = [];
                localStorage.removeItem('my_density_note_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 저장 공간이 완전히 비워졌습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('my_density_note_memos', JSON.stringify(memos));
            renderMemos();
        }

        function renderMemos() {
            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                const items = memoList.querySelectorAll('.memo-item');
                items.forEach(el => el.remove());
                return;
            }
            emptyState.style.display = 'none';
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-800/75 border border-slate-700/60 p-4 rounded-xl relative transition-all";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-3 border-b border-slate-700/40 pb-2">
                        <span class="text-xs text-cyan-400 font-bold">🎯 지능형 문맥 가공 완료 [${m.time}]</span>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 px-1">✕</button>
                    </div>
                    <div class="bg-slate-950 p-4 rounded-lg border border-slate-900 shadow-inner">
                        <p class="clean-note-box text-sm text-slate-200 leading-relaxed font-sans select-text cursor-text">${m.content}</p>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
