<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Row/Col Smart OCR Memo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
        }
        /* 행열이 깨지지 않도록 고정폭 글꼴과 스크롤 지정 */
        .table-font {
            font-family: 'Fira Code', 'Pretendard', monospace;
            white-space: pre;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 2px;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col h-screen p-4 overflow-hidden select-none">

    <!-- 상단 타이틀 바 -->
    <div class="flex items-center justify-between border-b border-slate-800 pb-3 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl">📊</span>
            <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent">스마트 행/열 정렬 메모장</h1>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 삭제</button>
    </div>

    <!-- 제어 영역 -->
    <div class="my-3 space-y-2 shrink-0">
        <input type="file" id="image-input" accept="image/*" class="hidden">
        
        <button id="upload-btn" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 active:scale-[0.98] text-white font-bold py-4 px-4 rounded-xl shadow-lg transition-all text-sm flex items-center justify-center gap-2">
            <span>📊</span>
            <span id="btn-text">표/텍스트 이미지 선택 및 정렬 추출</span>
        </button>

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-1.5 bg-slate-800/50 rounded-md">
            🟢 스탠바이 (행과 열의 좌표를 계산하여 정렬합니다)
        </div>
    </div>

    <!-- 메모 리스트 출력 영역 -->
    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-10">
            <p>엑셀, 식단표, 영수증 등 표가 있는 화면을 캡처한 후</p>
            <p class="mt-1">상단 버튼을 눌러 사진을 고르면 줄과 칸을 맞춰 저장합니다.</p>
        </div>
    </div>

    <script>
        const uploadBtn = document.getElementById('upload-btn');
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('my_table_memos')) || [];
        
        renderMemos();

        uploadBtn.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerText = "⏳ 이미지 로드 중...";
                btnText.innerText = "구조 분석 중...";
                uploadBtn.disabled = true;

                // 세밀한 좌표 분석을 위해 Tesseract 정밀 데이터 요청
                statusBar.innerText = "📐 텍스트 블록 및 행/열 좌표 계산 중...";
                const result = await Tesseract.recognize(file, 'kor', {
                    logger: m => {
                        if(m.status === 'recognizing') {
                            statusBar.innerText = `🔤 행열 데이터 매핑 중... (${Math.floor(m.progress * 100)}%)`;
                        }
                    }
                });

                // --- [핵심] 행/열 정렬 알고리즘 작동 ---
                const blocks = [];
                result.data.blocks.forEach(block => {
                    block.paragraphs.forEach(para => {
                        para.lines.forEach(line => {
                            // 각 글자(라인)의 Y축 위치와 X축 위치 정보 수집
                            blocks.push({
                                text: line.text.trim(),
                                x: line.bbox.x0,
                                y: line.bbox.y0,
                                h: line.bbox.y1 - line.bbox.y0
                            });
                        });
                    });
                });

                if (blocks.length === 0) {
                    statusBar.innerText = "❌ 인식된 텍스트가 없습니다.";
                    uploadBtn.disabled = false;
                    btnText.innerText = "표/텍스트 이미지 선택 및 정렬 추출";
                    return;
                }

                // 1. Y축(높이) 기준으로 정렬해서 같은 줄(행)끼리 묶기
                // 글자 크기 오차 범위를 감안하여 높이의 50% 이내에 있으면 동일한 행으로 인식
                blocks.sort((a, b) => a.y - b.y);
                const rows = [];
                let currentSrcRow = [blocks[0]];

                for (let i = 1; i < blocks.length; i++) {
                    const currentBlock = blocks[i];
                    const lastBlockInRow = currentSrcRow[currentSrcRow.length - 1];
                    const allowedGap = lastBlockInRow.h * 0.6; // 줄바꿈 감지 임계값

                    if (currentBlock.y - lastBlockInRow.y <= allowedGap) {
                        currentSrcRow.push(currentBlock);
                    } else {
                        rows.push(currentSrcRow);
                        currentSrcRow = [currentBlock];
                    }
                }
                rows.push(currentSrcRow);

                // 2. 각 행 안에서 X축(좌측 위치) 기준으로 정렬하고, 칸(열) 구분 규칙 적용
                let finalFormattedText = "";
                rows.forEach(row => {
                    row.sort((a, b) => a.x - b.x); // 왼쪽 글자부터 순서대로
                    
                    let rowStr = "";
                    for(let j=0; j<row.length; j++) {
                        if (j > 0) {
                            const gap = row[j].x - (row[j-1].x + row[j-1].text.length * 8); 
                            // 떨어져 있는 거리(Gap)가 멀면 탭(\t)이나 공백 여유를 두어 열 분리 효과 부여
                            if (gap > 40) {
                                rowStr += "    │    "; // 칸 구분선 디자인 적용
                            } else {
                                rowStr += "  "; // 일반 띄어쓰기
                            }
                        }
                        rowStr += row[j].text;
                    }
                    finalFormattedText += rowStr + "\n";
                });
                // --- 알고리즘 끝 ---

                if (finalFormattedText.trim()) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                        content: finalFormattedText.trim()
                    };
                    memos.unshift(newMemo);
                    localStorage.setItem('my_table_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = "✅ 행/열 정렬 메모가 저장되었습니다!";
                } else {
                    statusBar.innerText = "❌ 변환에 실패했습니다. 다시 시도해 주세요.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 오류: " + err.message;
            } finally {
                uploadBtn.disabled = false;
                btnText.innerText = "표/텍스트 이미지 선택 및 정렬 추출";
                imageInput.value = "";
            }
        });

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('모든 메모를 삭제하시겠습니까?')) {
                memos = [];
                localStorage.removeItem('my_table_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 모든 메모가 삭제되었습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('my_table_memos', JSON.stringify(memos));
            renderMemos();
            statusBar.innerText = "🗑️ 선택한 메모가 삭제되었습니다.";
        }

        function renderMemos() {
            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                const items = memoList.querySelectorAll('.memo-item');
                items.forEach(el => el.remove());
                return;
            }
            
            emptyState.style.display = 'none';
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-800/40 border border-slate-700/40 p-3 rounded-lg relative transition-all hover:border-slate-600";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-start mb-2 border-b border-slate-800 pb-1">
                        <span class="text-[10px] text-slate-500 font-bold">${m.time} [표 형태 저장됨]</span>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 px-1">✕</button>
                    </div>
                    <!-- 가로 스크롤이 가능하도록 설정하여 표가 깨지지 않게 방지 -->
                    <div class="overflow-x-auto custom-scrollbar whitespace-pre py-1">
                        <p class="table-font text-xs text-emerald-300 leading-relaxed select-text cursor-text">${m.content}</p>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
