<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>OCR AI Studio FIXED</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f1115;
  color:#fff;
}

header{
  padding:12px;
  background:#171a21;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:12px;
  display:grid;
  gap:10px;
}

.card{
  background:#171a21;
  padding:10px;
  border-radius:10px;
}

textarea,input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #333;
  background:#0f1115;
  color:#fff;
  box-sizing: border-box;
}

#ocr {
  font-family: 'Courier New', Courier, monospace;
  white-space: pre-wrap;
  overflow-x: auto;
}

button{
  background:#4f8cff;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-top:6px;
}

img{
  max-width:100%;
  margin-top:10px;
}

.progress-container {
  display: none;
  background: #222;
  border-radius: 8px;
  padding: 10px;
  margin-top: 8px;
}
.progress-bar {
  width: 0%;
  height: 12px;
  background: #4f8cff;
  border-radius: 6px;
  transition: width 0.1s ease;
}

/* 전체보기 모달 스타일 */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.8);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #171a21;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 900px;
  max-height: 85%;
  overflow-y: auto;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  position: relative;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #333;
  padding-bottom: 10px;
  margin-bottom: 15px;
}

.modal-header h3 {
  margin: 0;
}

.close-btn {
  background: #ff4f4f;
  margin-top: 0;
}

.modal-body {
  white-space: pre-wrap;
  font-family: 'Courier New', Courier, monospace;
  overflow-x: auto;
  word-break: keep-all;
  line-height: 1.6;
}
</style>
</head>

<body>

<header>
  <div>OCR AI Studio FIXED (초정밀 타일 분할 안정화판)</div>
</header>

<div class="container">

  <div class="card">
    <input type="file" id="file">
    <img id="preview"/>
  </div>

  <div class="card">
    <button onclick="app.runOCR()">초정밀 분할 OCR 실행</button>
    <div id="progressContainer" class="progress-container">
      <div style="font-size:12px; margin-bottom:4px;" id="progressText">준비 중...</div>
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="card">
    <h3>OCR 결과 (초미세 타일링 조립 및 행열 유지 완료)</h3>
    <textarea id="ocr" rows="15"></textarea>
    <button onclick="app.viewFull('교정된 OCR 결과', 'ocr')">전체보기</button>
  </div>

  <div class="card">
    <h3>Summary</h3>
    <textarea id="summary" rows="3"></textarea>
    <button onclick="app.viewFull('Summary 결과', 'summary')">전체보기</button>
  </div>

  <div class="card">
    <h3>Keywords</h3>
    <textarea id="keywords" rows="2"></textarea>
    <button onclick="app.viewFull('Keywords 결과', 'keywords')">전체보기</button>
  </div>

  <div class="card">
    <h3>Title</h3>
    <input id="title"/>
    <button onclick="app.viewFull('Title 결과', 'title')">전체보기</button>
  </div>

</div>

<div id="fullViewModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">타이틀</h3>
      <button class="close-btn" onclick="app.closeModal()">닫기</button>
    </div>
    <div id="fullViewModalBody" class="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>

/* =========================
   OCR ENGINE (단일 워커 풀 안정화 시스템)
========================= */
class OCR {
  constructor(){
    this.worker = null;
    this.ready = false;
  }

  async init(){
    // 스케줄러 락 현상을 방지하기 위해 단일 고성능 워커 구조로 안정화
    this.worker = await Tesseract.createWorker("kor+eng+jpn+chi_sim+chi_tra", 1, {
      logger: m => console.log(m)
    });
    this.ready = true;
  }

  async run(image){
    if(!this.ready) await this.init();
    const res = await this.worker.recognize(image);
    return res.data;
  }
}

/* =========================
   SIMPLE AI (LOCAL) - 가변 분할 및 격자 융합 엔진
========================= */
class AI {

  // 안전한 스캔을 위해 이미지 비율 맞춤 가변 블록 분할 알고리즘 적용
  static async processImageByTiling(imgElement, ocrInstance, onProgress) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    
    const imgWidth = imgElement.naturalWidth;
    const imgHeight = imgElement.naturalHeight;
    
    canvas.width = imgWidth;
    canvas.height = imgHeight;
    ctx.drawImage(imgElement, 0, 0);

    // [과분할 락 방지 고정] 병목 현상 차단 및 글자 잘림 방지를 위해 가변 블록 크기 최적화 (가로 2분할, 세로 4분할 구조)
    const numCols = imgWidth > 1000 ? 3 : 2;
    const numRows = imgHeight > 1500 ? 5 : 4;
    
    const tileWidth = Math.ceil(imgWidth / numCols);
    const tileHeight = Math.ceil(imgHeight / numRows);

    let chunks = [];
    for (let r = 0; r < numRows; r++) {
      for (let c = 0; c < numCols; c++) {
        let x = c * tileWidth;
        let y = r * tileHeight;
        let w = (x + tileWidth > imgWidth) ? (imgWidth - x) : tileWidth;
        let h = (y + tileHeight > imgHeight) ? (imgHeight - y) : tileHeight;
        chunks.push({ x, y, w, h });
      }
    }

    let allWords = [];
    const totalChunks = chunks.length;

    for (let i = 0; i < totalChunks; i++) {
      const chunk = chunks[i];
      
      const chunkCanvas = document.createElement("canvas");
      chunkCanvas.width = chunk.w;
      chunkCanvas.height = chunk.h;
      const chunkCtx = chunkCanvas.getContext("2d");
      
      chunkCtx.drawImage(canvas, chunk.x, chunk.y, chunk.w, chunk.h, 0, 0, chunk.w, chunk.h);
      
      try {
        const result = await ocrInstance.run(chunkCanvas);
        
        if (result && result.words) {
          result.words.forEach(w => {
            let txt = w.text.trim();
            // 무의미한 노이즈 완전 제거 필터
            if (/^[\\\/•\.\*\-\+\s¢®©=\|?:\(\)\[\]{}’”"‘'<>«»;_·~^`]{1,4}$/.test(txt)) txt = "";
            
            if (txt.length > 0) {
              allWords.push({
                text: txt,
                x0: chunk.x + w.bbox.x0,
                x1: chunk.x + w.bbox.x1,
                y0: chunk.y + w.bbox.y0,
                y1: chunk.y + w.bbox.y1,
                h: w.bbox.y1 - w.bbox.y0
              });
            }
          });
        }
      } catch (e) {
        console.error("부분 스캔 실패 무시: ", e);
      }

      let percent = Math.floor(((i + 1) / totalChunks) * 100);
      onProgress(percent);
    }

    if (allWords.length === 0) {
      // 분할 인식이 완전히 실패할 경우를 대비해 원본 통 스캔 예외 처리 안전장치 작동
      const fallback = await ocrInstance.run(imgElement);
      if(!fallback || !fallback.words) return "";
      allWords = fallback.words.map(w => ({
        text: w.text.trim(), x0: w.bbox.x0, x1: w.bbox.x1, y0: w.bbox.y0, y1: w.bbox.y1, h: w.bbox.y1 - w.bbox.y0
      }));
    }

    return this.buildFinalGrid(allWords);
  }

  // 조각 수집된 전체 데이터를 줄바꿈 및 간격 복원 조립
  static buildFinalGrid(words) {
    let avgHeight = words.reduce((sum, w) => sum + w.h, 0) / words.length;
    let rowThreshold = avgHeight * 0.55;

    let rows = [];
    words.sort((a, b) => a.y0 - b.y0);

    while (words.length > 0) {
      let base = words.shift();
      let currentRow = [base];

      for (let i = 0; i < words.length; i++) {
        if (Math.abs(words[i].y0 - base.y0) <= rowThreshold) {
          currentRow.push(words[i]);
          words.splice(i, 1);
          i--;
        }
      }
      currentRow.sort((a, b) => a.x0 - b.x0);
      rows.push(currentRow);
    }

    rows.sort((a, b) => a[0].y0 - b[0].y0);

    let minX = Math.min(...rows.map(r => r[0].x0));
    let maxX = Math.max(...rows.map(r => r[r.length - 1].x1));
    let docWidth = maxX - minX;
    
    // 표 형식 가독성 배치를 위한 자동 열 폭(85자) 할당
    let maxCharCols = 85; 

    let gridLines = rows.map(row => {
      let lineStr = "";
      let lastCharIdx = 0;

      row.forEach(w => {
        let relativeX = w.x0 - minX;
        let targetCharIdx = Math.floor((relativeX / docWidth) * maxCharCols);

        if (targetCharIdx > lastCharIdx) {
          lineStr += " ".repeat(targetCharIdx - lastCharIdx);
        }

        let cleanedWord = w.text;
        // 빈출 깨짐 현상 문맥 결합 보정
        cleanedWord = cleanedWord.replace(/omy/g, "com")
                                 .replace(/할일을/g, "할 일을")
                                 .replace(/정학히/g, "정확히")
                                 .replace(/지시하기/g, "지시하기")
                                 .replace(/달사시/g, "달성 시");

        lineStr += cleanedWord + " ";
        lastCharIdx = targetCharIdx + cleanedWord.length + 1;
      });

      return lineStr;
    });

    return gridLines
      .join("\n")
      .split("\n")
      .map(line => line.replace(/\s+[\-_\|]\s*$/g, ""))
      .filter(line => line.trim().length > 0)
      .join("\n");
  }

  static summary(text){
    if(!text) return "요약 정보가 없습니다.";
    return text.split("\n").slice(0, 4).join("\n");
  }

  static keywords(text){
    const words = text.toLowerCase().match(/[a-z가-힣一-龥]{2,}/g) || [];
    const map = {};
    words.forEach(w => { map[w] = (map[w]||0)+1; });
    return Object.entries(map)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,6).map(x=>x[0]).join(", ");
  }

  static title(text){
    const firstLine = text.split("\n")[0];
    return firstLine ? firstLine.trim().slice(0, 30) : "스캔 완료 분석 문서";
  }
}

/* =========================
   APPFLOW
========================= */
class App {
  constructor(){
    this.file = document.getElementById("file");
    this.preview = document.getElementById("preview");
    this.ocrEl = document.getElementById("ocr");
    this.summaryEl = document.getElementById("summary");
    this.keywordEl = document.getElementById("keywords");
    this.titleEl = document.getElementById("title");

    this.progressContainer = document.getElementById("progressContainer");
    this.progressBar = document.getElementById("progressBar");
    this.progressText = document.getElementById("progressText");

    this.modal = document.getElementById("fullViewModal");
    this.modalBody = document.getElementById("fullViewModalBody");

    this.ocr = new OCR();
    this.init();
  }

  async init(){
    await this.ocr.init();

    this.file.addEventListener("change", (e)=>{
      const file = e.target.files[0];
      if(!file) return;

      const reader = new FileReader();
      reader.onload = (ev)=>{
        this.preview.src = ev.target.result;
        this.currentImage = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    this.modal.addEventListener("click", (e) => {
      if(e.target === this.modal) this.closeModal();
    });
  }

  async runOCR(){
    if(!this.currentImage){
      alert("이미지를 먼저 선택하세요");
      return;
    }

    const img = new Image();
    img.src = this.currentImage;

    img.onload = async ()=>{
      try {
        this.progressContainer.style.display = "block";
        this.progressBar.style.width = "0%";
        this.progressText.innerText = "이미지 가변 조각 분석 중... (0%)";

        const processedText = await AI.processImageByTiling(img, this.ocr, (percent) => {
          this.progressBar.style.width = percent + "%";
          this.progressText.innerText = `이미지 가변 조각 분석 중... (${percent}%)`;
        });

        this.ocrEl.value = processedText;
        this.summaryEl.value = AI.summary(processedText);
        this.keywordEl.value = AI.keywords(processedText);
        this.titleEl.value = AI.title(processedText);
        
        setTimeout(() => { this.progressContainer.style.display = "none"; }, 500);

      } catch(err){
        console.error(err);
        alert("OCR 실행 중 오류가 발생했습니다.");
        this.progressContainer.style.display = "none";
      }
    };
  }

  viewFull(title, elementId) {
    const targetElement = document.getElementById(elementId);
    if (!targetElement || !targetElement.value.trim()) {
      alert("표시할 내용이 없습니다.");
      return;
    }
    
    document.getElementById("modalTitle").innerText = title;
    this.modalBody.innerText = targetElement.value;
    this.modal.style.display = "flex";
  }

  closeModal() {
    this.modal.style.display = "none";
  }
}

const app = new App();
</script>

</body>
</html>
