<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>OCR AI Studio FIXED</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f1115;
  color:#fff;
}

header{
  padding:12px;
  background:#171a21;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:12px;
  display:grid;
  gap:10px;
}

.card{
  background:#171a21;
  padding:10px;
  border-radius:10px;
}

textarea,input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #333;
  background:#0f1115;
  color:#fff;
  box-sizing: border-box;
}

#ocr {
  font-family: 'Courier New', Courier, monospace;
  white-space: pre;
  overflow-x: auto;
}

button{
  background:#4f8cff;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-top:6px;
}

img{
  max-width:100%;
  margin-top:10px;
}

/* 프로그레스 바 스타일 추가 */
.progress-container {
  display: none;
  background: #222;
  border-radius: 8px;
  padding: 10px;
  margin-top: 8px;
}
.progress-bar {
  width: 0%;
  height: 12px;
  background: #4f8cff;
  border-radius: 6px;
  transition: width 0.1s ease;
}

/* 전체보기 모달 스타일 */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.8);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #171a21;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 900px;
  max-height: 85%;
  overflow-y: auto;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  position: relative;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #333;
  padding-bottom: 10px;
  margin-bottom: 15px;
}

.modal-header h3 {
  margin: 0;
}

.close-btn {
  background: #ff4f4f;
  margin-top: 0;
}

.modal-body {
  white-space: pre;
  font-family: 'Courier New', Courier, monospace;
  overflow-x: auto;
  word-break: keep-all;
  line-height: 1.6;
}
</style>
</head>

<body>

<header>
  <div>OCR AI Studio FIXED (초정밀 타일 분할 스캔판)</div>
</header>

<div class="container">

  <div class="card">
    <input type="file" id="file">
    <img id="preview"/>
  </div>

  <div class="card">
    <button onclick="app.runOCR()">초정밀 분할 OCR 실행</button>
    <div id="progressContainer" class="progress-container">
      <div style="font-size:12px; margin-bottom:4px;" id="progressText">이미지 쪼개기 분석 중... (0%)</div>
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="card">
    <h3>OCR 결과 (초미세 타일링 조립 및 행열 유지 완료)</h3>
    <textarea id="ocr" rows="15"></textarea>
    <button onclick="app.viewFull('교정된 OCR 결과', 'ocr')">전체보기</button>
  </div>

  <div class="card">
    <h3>Summary</h3>
    <textarea id="summary" rows="3"></textarea>
    <button onclick="app.viewFull('Summary 결과', 'summary')">전체보기</button>
  </div>

  <div class="card">
    <h3>Keywords</h3>
    <textarea id="keywords" rows="2"></textarea>
    <button onclick="app.viewFull('Keywords 결과', 'keywords')">전체보기</button>
  </div>

  <div class="card">
    <h3>Title</h3>
    <input id="title"/>
    <button onclick="app.viewFull('Title 결과', 'title')">전체보기</button>
  </div>

</div>

<div id="fullViewModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">타이틀</h3>
      <button class="close-btn" onclick="app.closeModal()">닫기</button>
    </div>
    <div id="fullViewModalBody" class="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>

/* =========================
   OCR ENGINE (멀티 타일 및 진행률 처리)
========================= */
class OCR {
  constructor(){
    this.scheduler = null;
    this.ready = false;
  }

  async init(){
    // 고속 병렬 슬라이딩 분할 분석을 위해 스케줄러(Scheduler) 풀 생성
    this.scheduler = Tesseract.createScheduler();
    
    // 조각난 타일을 동시에 연산할 동시성 워커 생성 및 등록
    const worker1 = await Tesseract.createWorker("kor+eng+jpn+chi_sim+chi_tra");
    const worker2 = await Tesseract.createWorker("kor+eng+jpn+chi_sim+chi_tra");
    
    this.scheduler.addWorker(worker1);
    this.scheduler.addWorker(worker2);
    
    this.ready = true;
  }

  // 가상의 Canvas 조각(패치) 단위 인식을 스케줄러에 위임
  async runChunk(canvasChunk){
    if(!this.ready) await this.init();
    return this.scheduler.recognize(canvasChunk);
  }

  async terminate() {
    if(this.scheduler) {
      await this.scheduler.terminate();
      this.ready = false;
    }
  }
}

/* =========================
   SIMPLE AI (LOCAL) - 타일 분할 제어 및 표 구조 결합
========================= */
class AI {

  // 이미지를 바둑판 배열로 잘게 쪼개서 개별 인식 후 하나의 좌표계로 조립하는 함수
  static async processImageByTiling(imgElement, ocrInstance, onProgress) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    
    const imgWidth = imgElement.naturalWidth;
    const imgHeight = imgElement.naturalHeight;
    
    canvas.width = imgWidth;
    canvas.height = imgHeight;
    ctx.drawImage(imgElement, 0, 0);

    // [중요] 타일의 해상도 설정 (글자 크기에 맞춰 조절, 일반 문서 기준 가로세로 300~400px이 최적화 규격)
    const tileWidth = Math.min(400, imgWidth);
    const tileHeight = Math.min(300, imgHeight);

    let chunks = [];
    
    // 수평/수직 방향으로 이동(Sliding Window)하며 좌표 생성
    for (let y = 0; y < imgHeight; y += tileHeight) {
      for (let x = 0; x < imgWidth; x += tileWidth) {
        // 이미지 경계면을 벗어나지 않도록 보정 계산
        let w = (x + tileWidth > imgWidth) ? (imgWidth - x) : tileWidth;
        let h = (y + tileHeight > imgHeight) ? (imgHeight - y) : tileHeight;
        
        chunks.push({ x, y, w, h });
      }
    }

    let allWords = [];
    const totalChunks = chunks.length;

    // 쪼개진 타일들을 순회하며 미세 스캔 수행
    for (let i = 0; i < totalChunks; i++) {
      const chunk = chunks[i];
      
      // 메모리 상에 조각 이미지 크롭용 임시 캔버스 생성
      const chunkCanvas = document.createElement("canvas");
      chunkCanvas.width = chunk.w;
      chunkCanvas.height = chunk.h;
      const chunkCtx = chunkCanvas.getContext("2d");
      
      // 원본에서 해당 조각 영역만 절삭 복사
      chunkCtx.drawImage(canvas, chunk.x, chunk.y, chunk.w, chunk.h, 0, 0, chunk.w, chunk.h);
      
      try {
        // 잘게 쪼갠 이미지 파편 OCR 실행
        const result = await ocrInstance.runChunk(chunkCanvas);
        
        if (result && result.data.words) {
          result.data.words.forEach(w => {
            let txt = w.text.trim();
            // 노이즈 파편 필터링
            if (/^[\\\/•\.\*\-\+\s¢®©=\|?:\(\)\[\]{}’”"‘'<>«»;_·]{1,4}$/.test(txt)) txt = "";
            
            if (txt.length > 0) {
              // 중요!!: 쪼개진 타일 내부의 상대 좌표를 원본 이미지 기준의 절대 좌표로 복원 역매핑
              allWords.push({
                text: txt,
                x0: chunk.x + w.bbox.x0,
                x1: chunk.x + w.bbox.x1,
                y0: chunk.y + w.bbox.y0,
                y1: chunk.y + w.bbox.y1,
                h: w.bbox.y1 - w.bbox.y0
              });
            }
          });
        }
      } catch (e) {
        console.error("패치 스캔 실패: ", e);
      }

      // 프로그레스 바 수치 피드백 전달
      let percent = Math.floor(((i + 1) / totalChunks) * 100);
      onProgress(percent);
    }

    if (allWords.length === 0) return "";

    // 이후 쪼개서 수집된 수만 개의 문자 데이터를 전 장과 동일하게 바둑판 표 그리드로 최종 구조 조립
    return this.buildFinalGrid(allWords);
  }

  // 조각 수집된 절대 좌표 단어집을 바둑판 구조로 재정렬하는 로직
  static buildFinalGrid(words) {
    let avgHeight = words.reduce((sum, w) => sum + w.h, 0) / words.length;
    let rowThreshold = avgHeight * 0.6;

    let rows = [];
    words.sort((a, b) => a.y0 - b.y0);

    while (words.length > 0) {
      let base = words.shift();
      let currentRow = [base];

      for (let i = 0; i < words.length; i++) {
        if (Math.abs(words[i].y0 - base.y0) <= rowThreshold) {
          currentRow.push(words[i]);
          words.splice(i, 1);
          i--;
        }
      }
      currentRow.sort((a, b) => a.x0 - b.x0);
      rows.push(currentRow);
    }

    rows.sort((a, b) => a[0].y0 - b[0].y0);

    let minX = Math.min(...rows.map(r => r[0].x0));
    let maxX = Math.max(...rows.map(r => r[r.length - 1].x1));
    let docWidth = maxX - minX;
    let maxCharCols = 80; 

    let gridLines = rows.map(row => {
      let lineStr = "";
      let lastCharIdx = 0;

      row.forEach(w => {
        let relativeX = w.x0 - minX;
        let targetCharIdx = Math.floor((relativeX / docWidth) * maxCharCols);

        if (targetCharIdx > lastCharIdx) {
          lineStr += " ".repeat(targetCharIdx - lastCharIdx);
        }

        let cleanedWord = w.text;
        // 특정 고유명사 및 왜곡 결합 교정
        cleanedWord = cleanedWord.replace(/omy/g, "com").replace(/콘텐츠잘된/g, "콘텐츠 잘 된");

        lineStr += cleanedWord + " ";
        lastCharIdx = targetCharIdx + cleanedWord.length + 1;
      });

      return lineStr;
    });

    return gridLines
      .join("\n")
      .split("\n")
      .map(line => line.replace(/\s+[\-_\|]\s*$/g, ""))
      .filter(line => line.trim().length > 0)
      .join("\n");
  }

  static summary(text){
    if(!text) return "요약 정보가 없습니다.";
    return text.split("\n").slice(0, 4).join("\n");
  }

  static keywords(text){
    const words = text.toLowerCase().match(/[a-z가-힣一-龥]{2,}/g) || [];
    const map = {};
    words.forEach(w => { map[w] = (map[w]||0)+1; });
    return Object.entries(map)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,6).map(x=>x[0]).join(", ");
  }

  static title(text){
    const firstLine = text.split("\n")[0];
    return firstLine ? firstLine.trim().slice(0, 30) : "초정밀 분할 스캔 문서";
  }
}

/* =========================
   APPFLOW
========================= */
class App {
  constructor(){
    this.file = document.getElementById("file");
    this.preview = document.getElementById("preview");
    this.ocrEl = document.getElementById("ocr");
    this.summaryEl = document.getElementById("summary");
    this.keywordEl = document.getElementById("keywords");
    this.titleEl = document.getElementById("title");

    this.progressContainer = document.getElementById("progressContainer");
    this.progressBar = document.getElementById("progressBar");
    this.progressText = document.getElementById("progressText");

    this.modal = document.getElementById("fullViewModal");
    this.modalBody = document.getElementById("fullViewModalBody");

    this.ocr = new OCR();
    this.init();
  }

  async init(){
    await this.ocr.init();

    this.file.addEventListener("change", (e)=>{
      const file = e.target.files[0];
      if(!file) return;

      const reader = new FileReader();
      reader.onload = (ev)=>{
        this.preview.src = ev.target.result;
        this.currentImage = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    this.modal.addEventListener("click", (e) => {
      if(e.target === this.modal) this.closeModal();
    });
  }

  async runOCR(){
    if(!this.currentImage){
      alert("이미지를 먼저 선택하세요");
      return;
    }

    const img = new Image();
    img.src = this.currentImage;

    img.onload = async ()=>{
      try {
        // UI 프로그레스 활성화
        this.progressContainer.style.display = "block";
        this.progressBar.style.width = "0%";
        this.progressText.innerText = "초미세 이미지 분할 스캔 중... (0%)";

        // 이미지를 타일 조각으로 분할 연산 처리 가동
        const processedText = await AI.processImageByTiling(img, this.ocr, (percent) => {
          this.progressBar.style.width = percent + "%";
          this.progressText.innerText = `초미세 이미지 분할 스캔 중... (${percent}%)`;
        });

        // 결과 대입 및 프로그레스 숨김
        this.ocrEl.value = processedText;
        this.summaryEl.value = AI.summary(processedText);
        this.keywordEl.value = AI.keywords(processedText);
        this.titleEl.value = AI.title(processedText);
        
        setTimeout(() => { this.progressContainer.style.display = "none"; }, 800);

      } catch(err){
        console.error(err);
        alert("분할 OCR 실행 중 오류가 발생했습니다.");
        this.progressContainer.style.display = "none";
      }
    };
  }

  viewFull(title, elementId) {
    const targetElement = document.getElementById(elementId);
    if (!targetElement || !targetElement.value.trim()) {
      alert("표시할 내용이 없습니다.");
      return;
    }
    
    document.getElementById("modalTitle").innerText = title;
    this.modalBody.innerText = targetElement.value;
    this.modal.style.display = "flex";
  }

  closeModal() {
    this.modal.style.display = "none";
  }
}

const app = new App();
</script>

</body>
</html>
