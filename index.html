<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>OCR AI Studio FIXED</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f1115;
  color:#fff;
}

header{
  padding:12px;
  background:#171a21;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:12px;
  display:grid;
  gap:10px;
}

.card{
  background:#171a21;
  padding:10px;
  border-radius:10px;
}

textarea,input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #333;
  background:#0f1115;
  color:#fff;
}

button{
  background:#4f8cff;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-top:6px;
}

img{
  max-width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <div>OCR AI Studio FIXED</div>
</header>

<div class="container">

  <div class="card">
    <input type="file" id="file">
    <img id="preview"/>
  </div>

  <div class="card">
    <button onclick="app.runOCR()">OCR 실행</button>
  </div>

  <div class="card">
    <h3>OCR 결과</h3>
    <textarea id="ocr"></textarea>
  </div>

  <div class="card">
    <h3>Summary</h3>
    <textarea id="summary"></textarea>
  </div>

  <div class="card">
    <h3>Keywords</h3>
    <textarea id="keywords"></textarea>
  </div>

  <div class="card">
    <h3>Title</h3>
    <input id="title"/>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>

/* =========================
   OCR ENGINE (FIXED)
========================= */
class OCR {
  constructor(){
    this.worker = null;
    this.ready = false;
  }

  async init(){
    this.worker = await Tesseract.createWorker("eng+kor", 1, {
      logger: m => console.log(m)
    });

    this.ready = true;
  }

  async run(image){
    if(!this.ready){
      await this.init();
    }

    const res = await this.worker.recognize(image);
    return res.data.text || "";
  }
}

/* =========================
   SIMPLE AI (LOCAL)
========================= */
class AI {

  static summary(text){
    return text.split(".").slice(0,2).join(".");
  }

  static keywords(text){
    const words = text.toLowerCase().match(/[a-z가-힣]{2,}/g) || [];
    const map = {};

    words.forEach(w=>{
      map[w] = (map[w]||0)+1;
    });

    return Object.entries(map)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,6)
      .map(x=>x[0])
      .join(", ");
  }

  static title(text){
    return text.split("\n")[0]?.slice(0,30) || "OCR Document";
  }
}

/* =========================
   APP (FIXED FLOW)
========================= */
class App {

  constructor(){

    this.file = document.getElementById("file");
    this.preview = document.getElementById("preview");

    this.ocrEl = document.getElementById("ocr");
    this.summaryEl = document.getElementById("summary");
    this.keywordEl = document.getElementById("keywords");
    this.titleEl = document.getElementById("title");

    this.ocr = new OCR();

    this.init();
  }

  async init(){

    // OCR 미리 준비
    await this.ocr.init();

    this.file.addEventListener("change", (e)=>{
      const file = e.target.files[0];

      if(!file) return;

      const reader = new FileReader();

      reader.onload = (ev)=>{
        this.preview.src = ev.target.result;
        this.currentImage = ev.target.result;
      };

      reader.readAsDataURL(file);
    });
  }

  async runOCR(){

    if(!this.currentImage){
      alert("이미지를 먼저 선택하세요");
      return;
    }

    const img = new Image();
    img.src = this.currentImage;

    img.onload = async ()=>{

      try {

        const text = await this.ocr.run(img);

        this.ocrEl.value = text;
        this.summaryEl.value = AI.summary(text);
        this.keywordEl.value = AI.keywords(text);
        this.titleEl.value = AI.title(text);

      } catch(err){
        console.error(err);
        alert("OCR 실패 (콘솔 확인)");
      }
    };
  }
}

const app = new App();

</script>

</body>
</html>
