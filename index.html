<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Real-time Dynamic Table Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
        }
        .table-render-box {
            font-family: 'Fira Code', 'Pretendard', monospace;
            white-space: pre;
            letter-spacing: -0.2px;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 2px;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800 pb-2 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl">🔄</span>
            <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-emerald-400 to-blue-400 bg-clip-text text-transparent">실시간 동적 표 구조 분석기</h1>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 삭제</button>
    </div>

    <div class="my-3 shrink-0 relative">
        <div class="w-full h-14 bg-gradient-to-r from-emerald-600 to-blue-600 rounded-xl shadow-lg flex items-center justify-center gap-2 pointer-events-none">
            <span>📷</span>
            <span id="btn-text" class="text-sm font-bold text-white">표 이미지 업로드 (실시간 동적 분석)</span>
        </div>
        <input type="file" id="image-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-1.5 bg-slate-800/50 rounded-md mt-2">
            🟢 스탠바이 (하드코딩 데이터 없이, 입력된 이미지의 텍스트를 실시간 추적 정렬합니다)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-10">
            <p>분석할 표 이미지를 업로드해 주세요.</p>
            <p class="mt-1">이미지 내부의 실제 텍스트 좌표를 계산하여 실시간 표로 복원합니다.</p>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('my_dynamic_table_memos')) || [];
        renderMemos();

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerText = "⏳ 1/2: 이미지 흑백 고대비 이진화 가공 중...";
                btnText.innerText = "실시간 전처리 중...";
                imageInput.disabled = true;

                const img = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const i = new Image();
                        i.onload = () => resolve(i);
                        i.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                // 전처리 연산: 어떤 배경색이든 글자와 완전히 격리 분리
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i], g = data[i+1], b = data[i+2];
                    let brightness = 0.299 * r + 0.587 * g + 0.114 * b;
                    
                    // 주황색 선 및 어두운 배경 영역 제거 조건
                    if ((r > 100 && g < 85 && b < 55) || brightness < 110) {
                        data[i] = 255; data[i+1] = 255; data[i+2] = 255;
                    } else {
                        data[i] = 0; data[i+1] = 0; data[i+2] = 0;
                    }
                }
                ctx.putImageData(imgData, 0, 0);

                statusBar.innerText = "⏳ 2/2: 실시간 문장 물리 좌표 및 레이아웃 스캔 중...";
                btnText.innerText = "동적 구조 파싱 중...";

                const scheduler = await Tesseract.createWorker('kor+eng');
                const result = await scheduler.recognize(canvas);
                const lines = result.data.lines;
                await scheduler.terminate();

                if (!lines || lines.length === 0) {
                    statusBar.innerText = "❌ 텍스트 분석에 실패했습니다. 다른 이미지를 시도해 주세요.";
                    imageInput.disabled = false;
                    btnText.innerText = "표 이미지 업로드 (실시간 동적 분석)";
                    return;
                }

                const imgWidth = canvas.width;
                const extractedItems = [];

                // 하드코딩 없이, 감지된 실제 텍스트의 좌표 정보를 동적으로 파싱
                lines.forEach(line => {
                    const textStr = line.text.trim();
                    if (!textStr || textStr.length < 1) return;

                    // 의미 없는 인식 노이즈 문자 필터링
                    if (/^[뽚뵘떼뽀돌롭숨젹휵윽흑줄죡|=_\-+:@·.·\s]+$/.test(textStr)) return;

                    const startX = line.bbox.x0;
                    const ratio = startX / imgWidth;
                    const midY = (line.bbox.y0 + line.bbox.y1) / 2;

                    // 가로폭 위치 비율에 따라 4개 열로 동적 수납 (0~3번 컬럼)
                    let colIdx = 3;
                    if (ratio < 0.15) colIdx = 0;
                    else if (ratio >= 0.15 && ratio < 0.38) colIdx = 1;
                    else if (ratio >= 0.38 && ratio < 0.68) colIdx = 2;

                    extractedItems.push({ text: textStr, y: midY, col: colIdx });
                });

                // Y축 오차 범위(줄 단위) 내에 있는 아이템들을 하나의 행으로 병합
                const dynamicRows = [];
                extractedItems.sort((a, b) => a.y - b.y);

                extractedItems.forEach(item => {
                    let matchedRow = dynamicRows.find(r => Math.abs(r.y - item.y) < 20);
                    if (!matchedRow) {
                        matchedRow = { y: item.y, cells: ["", "", "", ""] };
                        dynamicRows.push(matchedRow);
                    }
                    matchedRow.cells[item.col] = (matchedRow.cells[item.col] + " " + item.text).trim();
                });

                dynamicRows.sort((a, b) => a.y - b.y);

                // 패딩 정렬 계산기 (한글 폭 맞춤)
                const padStr = (str, len) => {
                    let curLen = 0;
                    for (let i = 0; i < str.length; i++) {
                        curLen += (str.charCodeAt(i) > 128) ? 2 : 1;
                    }
                    return str + " ".repeat(Math.max(0, len - curLen));
                };

                // 실시간 조합형 텍스트 생성
                let outputStr = "";
                dynamicRows.forEach((row, idx) => {
                    let c1 = row.cells[0];
                    let c2 = row.cells[1];
                    let c3 = row.cells[2];
                    let c4 = row.cells[3];

                    if (!c1 && !c2 && !c3 && !c4) return;

                    const p1 = padStr(c1 ? c1 : "-", 5);
                    const p2 = padStr(c2 ? c2 : "-", 14);
                    const p3 = padStr(c3 ? c3 : "-", 35);

                    outputStr += `${p1} │ ${p2} │ ${p3} │ ${c4 ? c4 : "-"}\n`;
                    
                    // 첫 번째 행 뒤에는 구조적 구분선 삽입
                    if(idx === 0) {
                        outputStr += `──────┼──────────────┼─────────────────────────────────────┼──────────────────────────────────\n`;
                    }
                });

                if (outputStr.trim()) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                        content: outputStr
                    };

                    memos.unshift(newMemo);
                    localStorage.setItem('my_dynamic_table_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = "✅ 새로운 표 이미지의 실제 텍스트가 실시간 분 정렬되었습니다.";
                } else {
                    statusBar.innerText = "❌ 추출할 수 있는 유효한 데이터가 없습니다.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 오류 발생: " + err.message;
            } finally {
                imageInput.disabled = false;
                btnText.innerText = "표 이미지 업로드 (실시간 동적 분석)";
                imageInput.value = "";
            }
        });

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('저장된 실시간 메모를 전부 삭제하시겠습니까?')) {
                memos = [];
                localStorage.removeItem('my_dynamic_table_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 저장소가 초기화되었습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('my_dynamic_table_memos', JSON.stringify(memos));
            renderMemos();
        }

        function renderMemos() {
            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                const items = memoList.querySelectorAll('.memo-item');
                items.forEach(el => el.remove());
                return;
            }
            emptyState.style.display = 'none';
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-800/70 border border-slate-700/60 p-3 rounded-xl relative transition-all";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-2 border-b border-slate-800 pb-1.5">
                        <span class="text-[10px] text-emerald-400 font-bold">🔄 ${m.time} [실시간 동적 분석 메모 완료]</span>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 px-1">✕</button>
                    </div>
                    <div class="overflow-x-auto custom-scrollbar bg-slate-950 p-4 rounded-lg border border-slate-900">
                        <p class="table-render-box text-[11px] text-cyan-300 leading-relaxed font-mono select-text cursor-text">${m.content}</p>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
