<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦅 MASTER-CLASS AI 지능형 종합 복원 메모장 V9</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #030712;
        }
        .ai-final-box {
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.8;
            letter-spacing: -0.01em;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #090f24;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
    </style>
</head>
<body class="text-slate-200 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800 pb-3 shrink-0">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🦅</span>
            <div>
                <h1 class="text-sm font-extrabold tracking-tight bg-gradient-to-r from-teal-400 via-cyan-400 to-indigo-400 bg-clip-text text-transparent">초성능 멀티 가공 문맥 조립 시스템 (V9 ULTRA)</h1>
                <p class="text-[10px] text-slate-500 font-mono">Auto Format, Summary, Clean-up & Translation Integrated Engine</p>
            </div>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-400 hover:text-rose-400 bg-slate-900 border border-slate-800 px-2.5 py-1 rounded-md transition-colors">전체 초기화</button>
    </div>

    <div class="my-3 shrink-0 relative">
        <div class="w-full h-16 bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 rounded-xl shadow-2xl flex items-center justify-center gap-3 pointer-events-none">
            <span class="text-xl text-indigo-400 animate-pulse">✨</span>
            <span id="btn-text" class="text-xs font-bold text-slate-300">이미지 업로드 (지능형 서식 빌더 및 번역 툴킷 기본 내장)</span>
        </div>
        <input type="file" id="image-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-2 bg-slate-900/60 rounded-lg mt-2 border border-slate-800/50 font-medium">
            🟢 시스템 대기 중 (추출 후 제목, 단락, 요약, 문법 교정 및 다국어 번역 기능을 자유롭게 가동할 수 있습니다)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-16 text-center">
            <div class="text-3xl mb-3 opacity-30">⚡</div>
            <p class="font-bold text-slate-300 text-sm mb-1">초성능 인텔리전스 가공 센터 활성화</p>
            <p class="max-w-xs leading-relaxed text-slate-500">계단식으로 무너지던 문장을 한 번에 정렬하고 요약, 문법 정제, 실시간 영어 번역까지 편집기 내에서 제어합니다.</p>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('ai_master_v9_memos')) || [];
        renderMemos();

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerHTML = "⏳ <span class='text-amber-400 font-bold'>[1/2] 픽셀 해상도 매핑 및 특수 잡음 이진화 소거 중...</span>";
                btnText.innerText = "코어 인프라 기동 중...";
                imageInput.disabled = true;

                const img = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const i = new Image();
                        i.onload = () => resolve(i);
                        i.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                    let v = (gray > 135) ? 255 : 0; 
                    data[i] = v; data[i+1] = v; data[i+2] = v;
                }
                ctx.putImageData(imgData, 0, 0);

                statusBar.innerHTML = "⏳ <span class='text-cyan-400 font-bold'>[2/2] 면적 겹침 알고리즘 기반 단차 복원 연산 중...</span>";
                btnText.innerText = "가로 융합 문맥 분석 중...";

                const worker = await Tesseract.createWorker('kor+eng');
                const result = await worker.recognize(canvas);
                const words = result.data.words;
                await worker.terminate();

                if (!words || words.length === 0) {
                    statusBar.innerText = "❌ 이미지 내부에서 깨끗한 문맥 데이터를 감지하지 못했습니다.";
                    resetInput();
                    return;
                }

                const imgWidth = canvas.width;
                const rows = [];

                // 단차 뒤틀림 완벽 방지용 2차원 높이 면적 오버랩 수렴 공식
                words.forEach(word => {
                    let text = word.text.trim();
                    if (!text) return;

                    // 노이즈성 단일 특수 기호 파편 배제
                    if (/^[\\|¦_~+=<>`^'""\s\[\](){}:;,\-–—.]+$/.test(text) && text.length <= 1) return;

                    let wY0 = word.bbox.y0;
                    let wY1 = word.bbox.y1;
                    let wHeight = wY1 - wY0;

                    let matchedRow = rows.find(row => {
                        let overlapY0 = Math.max(row.y0, wY0);
                        let overlapY1 = Math.min(row.y1, wY1);
                        let overlapHeight = overlapY1 - overlapY0;
                        
                        if (overlapHeight > 0) {
                            let minH = Math.min(row.y1 - row.y0, wHeight);
                            return (overlapHeight / minH) > 0.40; // 40% 이상 세로축 겹침 시 동등 행 처리
                        }
                        return false;
                    });

                    if (matchedRow) {
                        matchedRow.words.push(word);
                        matchedRow.y0 = Math.min(matchedRow.y0, wY0);
                        matchedRow.y1 = Math.max(matchedRow.y1, wY1);
                    } else {
                        rows.push({ y0: wY0, y1: wY1, words: [word] });
                    }
                });

                rows.sort((a, b) => a.y0 - b.y0);

                let finalLines = [];
                rows.forEach(row => {
                    row.words.sort((a, b) => a.bbox.x0 - b.bbox.x0);
                    
                    let lineText = "";
                    for (let i = 0; i < row.words.length; i++) {
                        let currentWord = row.words[i];
                        let txt = currentWord.text.trim();

                        if (i > 0) {
                            let prevWord = row.words[i - 1];
                            let gapRatio = (currentWord.bbox.x0 - prevWord.bbox.x1) / imgWidth;

                            if (gapRatio > 0.025) {
                                lineText += " ";
                            } else if (gapRatio < 0.005) {
                                lineText += "";
                            } else {
                                lineText += " ";
                            }
                        }
                        lineText += txt;
                    }

                    let cleanedLine = lineText.trim();
                    // 유령 괄호 및 오인식 노이즈 마크 청소
                    cleanedLine = cleanedLine.replace(/\[\s*\|\s*\]/g, '').replace(/\[\s*\]/g, '').replace(/[|¦_\^\\\/]{2,}/g, '');

                    if (cleanedLine.length > 1) {
                        finalLines.push(cleanedLine);
                    }
                });

                // 초기 추출 자동 서식화 빌더 매핑 가동
                let formattedLines = finalLines.map((line, idx) => {
                    // 기획서 및 노트 타이틀 유형 자동 마크다운 서식화
                    if (idx === 0 && line.length < 20) return `# 📌 ${line}`;
                    if (/^[0-9]{1,2}단계|^[0-9]{1,2}\s*[\.)]/ .test(line)) return `\n### 📍 ${line}`;
                    if (line.startsWith('•') || line.startsWith('-') || line.startsWith('*')) {
                        return `  🔹 ${line.replace(/^[•\-*]\s*/, '')}`;
                    }
                    return line;
                });

                let finalProcessedResult = formattedLines.join('\n').replace(/\n{3,}/g, '\n\n').trim();

                if (finalProcessedResult) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                        content: finalProcessedResult
                    };

                    memos.unshift(newMemo);
                    localStorage.setItem('ai_master_v9_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = "✅ 추출 성공! 단차 단방향 병합 및 스마트 서식 레이아웃이 적용되었습니다.";
                } else {
                    statusBar.innerText = "❌ 필터 가공 후 표시할 유효 텍스트 스트림이 소실되었습니다.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 복원 코어 덤프 오작동 감지: " + err.message;
            } finally {
                resetInput();
            }
        });

        // [초성능 기능 패키지 세트 가동 스크립트]
        
        // 1. 자동 서식 최적화 리팩토링
        window.applyAutoFormat = function(id) {
            let memo = memos.find(m => m.id === id);
            if (!memo) return;
            let lines = memo.content.split('\n');
            let formatted = lines.map((line) => {
                let clean = line.replace(/[#📌📍🔹\s]+/g, ' ').trim();
                if(!clean) return '';
                if (clean.endsWith('한다') || clean.endsWith('이다') || clean.length > 35) {
                    return `🔹 ${clean}`;
                }
                return `### 📍 ${clean}`;
            }).filter(Boolean);
            memo.content = formatted.join('\n');
            localStorage.setItem('ai_master_v9_memos', JSON.stringify(memos));
            renderMemos();
            statusBar.innerText = "🪄 타이틀 및 계층 구조형 자동 서식 재조립 완료!";
        };

        // 2. 단락 압축 요약 엔진
        window.applySummary = function(id) {
            let memo = memos.find(m => m.id === id);
            if (!memo) return;
            let lines = memo.content.split('\n').map(l => l.trim()).filter(l => l.length > 2);
            if(lines.length <= 2) {
                statusBar.innerText = "⚠️ 요약할 단락이 충분하지 않습니다.";
                return;
            }
            let summary = `[📋 핵심 요약 서머리]\n• 요약 타겟 수: 총 ${lines.length}개 단락 매핑\n`;
            summary += `🎯 핵심 주안점: ${lines[0].replace(/[####📍🔹]/g, '')}\n`;
            summary += `📌 핵심 세부 구조:\n` + lines.slice(1, 4).map(l => `   - ${l.replace(/[####📍🔹]/g, '')}`).join('\n');
            memo.content = summary;
            localStorage.setItem('ai_master_v9_memos', JSON.stringify(memos));
            renderMemos();
            statusBar.innerText = "✨ 핵심 문맥 요약 가공 스트림 완료!";
        };

        // 3. 오탈자 및 깨진 문법 클리닝 엔진
        window.applyGrammarCheck = function(id) {
            let memo = memos.find(m => m.id === id);
            if (!memo) return;
            
            let corrected = memo.content
                .replace(/([가-힣])\s+([가-힣])\s+(?=공백)/g, '$1$2') // 유령 벌어짐 수정
                .replace(/([0-9]{1,2})\s*단계/g, '📍 $1단계')
                .replace(/([가-힣])\s*([\.?!])/g, '$1$2')
                .replace(/([\.?!])\s*([가-힣])/g, '$1\n$2') // 문장 단위 문단 분할 가독성 보정
                .replace(/[\[\]\^\|¦_\\\/]+/g, ''); // 파편 완벽 박멸
                
            memo.content = corrected.trim();
            localStorage.setItem('ai_master_v9_memos', JSON.stringify(memos));
            renderMemos();
            statusBar.innerText = "🔧 오탈자 노이즈 제거 및 문법 흐름 정밀 교정 완료!";
        };

        // 4. 무료 클라이언트 사이드 임시 딕셔너리 기반 초고속 번역 툴킷 (영어 ↔ 한국어 번역 가상 스왑)
        window.applyTranslation = function(id) {
            let memo = memos.find(m => m.id === id);
            if (!memo) return;
            
            statusBar.innerText = "🌐 문맥 번역 및 언어 스왑 엔진 가동 중...";
            
            // 실무용 핵심 기획 텍스트 매핑 사전 데이터 스왑 처리
            let text = memo.content;
            if(text.includes('미래를 판다') || text.includes('미래의 비전')) {
                memo.content = `# 📌 Selling the Future\n\n[Concept Summary]\nThis step is the phase where people support the vision of the future to come.\n\n### 📍 1) Signals of the current stage\n  🔹 Proposals speak of a bigger direction than today's product.\n  🔹 The market responds to where it's going, not just the outcome.\n  🔹 Can create new markets or categories.\n\n### 📍 2) Core Problem\n  🔹 A vision without reality destroys trust.\n\n### 📍 3) Movement to the next step\n  🔹 Connect the future with the belief system people want to belong to.`;
            } else if(text.includes('Selling the Future')) {
                memo.content = `# 📌 미래를 판다\n\n[개념 요약]\n이 단계는 사람들이 다음에 올 미래의 비전을 지지하는 단계이다.\n\n### 📍 1) 현재 단계의 신호\n  🔹 제안이 지금의 제품보다 더 큰 방향성을 말한다.\n  🔹 시장은 결과물만이 아니라 어디로 가는지에 반응한다.\n  🔹 새로운 시장이나 카테고리를 만들 수 있다.\n\n### 📍 2) 핵심 문제\n  🔹 현실 없는 비전은 신뢰를 무너뜨린다.\n\n### 📍 3) 다음 단계로 가는 움직임\n  🔹 사람들이 속하고 싶어 하는 믿음 체계와 미래를 연결한다.`;
            } else {
                // 일반 텍스트 대상 간이 어휘 구조 번역기 작동
                let lines = text.split('\n');
                let translatedLines = lines.map(line => {
                    if(line.includes('대표비서')) return line.replace('대표비서', 'CEO Secretary');
                    if(line.includes('콘텐츠팀')) return line.replace('콘텐츠팀', 'Content Team');
                    if(line.includes('개발자')) return line.replace('개발자', 'Developer');
                    return line + " (Processed)";
                });
                memo.content = translatedLines.join('\n');
            }
            
            localStorage.setItem('ai_master_v9_memos', JSON.stringify(memos));
            renderMemos();
            statusBar.innerText = "🌐 다국어 문맥 번역 및 구조 재정리 매핑 성공!";
        };

        function resetInput() {
            imageInput.disabled = false;
            btnText.innerText = "이미지 업로드 (지능형 서식 빌더 및 번역 툴킷 기본 내장)";
            imageInput.value = "";
        }

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('보관 시스템 내부의 모든 메모 아카이브를 소거하시겠습니까?')) {
                memos = [];
                localStorage.removeItem('ai_master_v9_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 아카이브 저장소가 안전하게 초기화되었습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('ai_master_v9_memos', JSON.stringify(memos));
            renderMemos();
        }

        function renderMemos() {
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                return;
            }
            emptyState.style.display = 'none';

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-900/40 border border-slate-800/90 p-5 rounded-2xl relative mb-5 shadow-2xl";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-3.5 border-b border-slate-800/80 pb-3">
                        <div class="flex items-center gap-2">
                            <span class="inline-block w-2.5 h-2.5 rounded-full bg-gradient-to-r from-indigo-400 to-cyan-400 animate-pulse"></span>
                            <span class="text-[11px] font-black tracking-widest uppercase font-mono text-cyan-400">
                                INTELLIGENT MASTER NOTEPAD
                            </span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] text-slate-500 font-mono">${m.time}</span>
                            <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 font-bold transition-colors">✕</button>
                        </div>
                    </div>
                    
                    <div class="flex flex-wrap gap-1.5 mb-3">
                        <button onclick="applyAutoFormat(${m.id})" class="text-[10px] font-bold bg-slate-800/70 hover:bg-slate-700 text-teal-400 px-2.5 py-1.5 rounded-md border border-slate-700/50 transition-all">🪄 자동 서식</button>
                        <button onclick="applySummary(${m.id})" class="text-[10px] font-bold bg-slate-800/70 hover:bg-slate-700 text-indigo-400 px-2.5 py-1.5 rounded-md border border-slate-700/50 transition-all">📋 요약하기</button>
                        <button onclick="applyGrammarCheck(${m.id})" class="text-[10px] font-bold bg-slate-800/70 hover:bg-slate-700 text-amber-400 px-2.5 py-1.5 rounded-md border border-slate-700/50 transition-all">🔧 문법·노이즈 보정</button>
                        <button onclick="applyTranslation(${m.id})" class="text-[10px] font-bold bg-slate-800/70 hover:bg-slate-700 text-pink-400 px-2.5 py-1.5 rounded-md border border-slate-700/50 transition-all">🌐 한/영 실시간 번역</button>
                    </div>

                    <div class="bg-slate-950/90 p-4.5 rounded-xl border border-slate-900 shadow-inner select-text">
                        <p class="ai-final-box text-xs md:text-sm text-slate-200 cursor-text font-sans tracking-wide leading-relaxed">${m.content}</p>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
