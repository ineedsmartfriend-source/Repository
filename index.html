<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦅 지능형 전문 마스터 구조 정제 시스템 V6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #030712;
        }

        .note-card {
            transition: all 0.3s ease;
            position: relative;
        }

        /* 전문가급 가독성을 위한 마크다운 프리뷰 레이아웃 */
        .preview-content {
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.8;
            font-size: 13px;
        }

        .preview-content h1, .preview-content h2 {
            font-weight: 800;
            color: #ecf0f1;
            margin-top: 24px;
            margin-bottom: 12px;
            letter-spacing: -0.01em;
        }
        .preview-content h1 { font-size: 1.5rem; border-bottom: 2px solid #1f293d; padding-bottom: 8px; }
        .preview-content h2 { font-size: 1.125rem; }

        .preview-content h3 {
            font-weight: 700;
            color: #d1d5db;
            margin-top: 16px;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .preview-content p {
            margin-top: 10px;
            margin-bottom: 10px;
            color: #cbd5e1;
            font-weight: 400;
        }

        .preview-content li {
            margin-top: 6px;
            margin-bottom: 6px;
            padding-left: 14px;
            color: #b5bdc7;
        }

        .preview-content li:before {
            content: "🔹";
            position: absolute;
            left: -18px;
            top: 2px;
            font-size: 10px;
        }

        .preview-content blockquote {
            border-left: 4px solid #1f293d;
            padding-left: 16px;
            margin-top: 16px;
            margin-bottom: 16px;
            color: #94a3b8;
            font-style: italic;
        }

        .ai-process-btn {
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s ease;
        }
        
        .ai-process-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(34, 211, 238, 0.3);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 2px;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col h-screen p-4 overflow-hidden select-none">

    <!-- 상단 인텔리전스 헤더 -->
    <div class="flex items-center justify-between border-b border-slate-800/80 pb-3 shrink-0">
        <div class="flex items-center gap-2.5">
            <span class="text-xl animate-pulse">🎯</span>
            <div>
                <h1 class="text-sm font-extrabold tracking-tight bg-gradient-to-r from-teal-400 via-cyan-400 to-blue-500 bg-clip-text text-transparent">초정밀 지능형 구조 정제 메모장 (V6 MASTER)</h1>
                <p class="text-[10px] text-slate-500 font-mono">Dynamic Structure Layout & Context Purifier Engine</p>
            </div>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 초기화</button>
    </div>

    <!-- 파일 업로드 및 분석 상태 표시 영역 -->
    <div class="my-3 shrink-0 relative">
        <div class="w-full h-16 bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 rounded-2xl shadow-xl flex items-center justify-center gap-3 pointer-events-none">
            <span class="text-lg text-emerald-400">⚡</span>
            <span id="btn-text" class="text-sm font-semibold text-slate-300">이미지 업로드 (난해한 찢어짐 및 오탈자 전면 교정)</span>
        </div>
        <input type="file" id="image-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-2.5 bg-slate-900/60 rounded-lg mt-2 border border-slate-800/40">
            🟢 스탠바이 (찢어진 간격과 가독성 오류를 실시간으로 조립 정제합니다)
        </div>
    </div>

    <!-- 메모 목록 및 처리 공간 -->
    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-10">
            <p>분석할 메모 이미지를 업로드해 주세요.</p>
            <p class="mt-1">가로 단차 결함을 보정하고, 진짜 기획 노트 레이아웃으로 렌더링합니다.</p>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('ai_refined_memos')) || [];
        renderMemos();

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerText = "⏳ 1/2: 고해상도 픽셀 선명화 및 노이즈 격리 전처리 중...";
                btnText.innerText = "비전 분석 대기 중...";
                imageInput.disabled = true;

                const img = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const i = new Image();
                        i.onload = () => resolve(i);
                        i.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                // 고정밀 Adaptive Threshold 문맥 전처리 (필기/타이핑 특성 대비 극대화)
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i], g = data[i+1], b = data[i+2];
                    let gray = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                    let v = (gray > 135) ? 255 : 0; // 이진화 경계 최적화
                    data[i] = v; data[i+1] = v; data[i+2] = v;
                }
                ctx.putImageData(imgData, 0, 0);

                statusBar.innerText = "⏳ 2/2: 지능형 행 수렴 연산 및 텍스트 문맥 조립 중...";
                btnText.innerText = "레이아웃 복원 가동 중...";

                const worker = await Tesseract.createWorker('kor+eng');
                const result = await worker.recognize(canvas);
                const words = result.data.words;
                await worker.terminate();

                if (!words || words.length === 0) {
                    statusBar.innerText = "❌ 텍스트 궤적을 찾지 못했습니다.";
                    resetInput();
                    return;
                }

                const rows = [];
                // 고해상도 캡처본 오차를 잡아내는 지능형 수직 마진 공식
                const rowThreshold = Math.max(14, img.height * 0.01); 

                // [핵심 로직: 난해한 단차 뒤틀림을 해결하는 행 수렴 연산]
                words.forEach(word => {
                    let text = word.text.trim();
                    if (!text) return;

                    // 흐릿한 기호 파편 및 노이즈 소거 (원본 가독성 회복)
                    if (/^[\\|¦_~+=<>`^]+$/.test(text)) return;

                    let yCenter = word.bbox.y0 + (word.bbox.y1 - word.bbox.y0) / 2;
                    let matchedRow = rows.find(r => Math.abs(r.yCenter - yCenter) < rowThreshold);

                    if (matchedRow) {
                        matchedRow.words.push(word);
                        matchedRow.yCenter = (matchedRow.yCenter * (matchedRow.words.length - 1) + yCenter) / matchedRow.words.length;
                    } else {
                        rows.push({ yCenter: yCenter, words: [word] });
                    }
                });

                rows.sort((a, b) => a.yCenter - b.yCenter);

                let totalGaps = 0;
                let wideGapCount = 0;
                let validWordPairs = 0;

                rows.forEach(row => {
                    row.words.sort((a, b) => a.bbox.x0 - b.bbox.x0);
                    for(let i=1; i<row.words.length; i++) {
                        let gap = row.words[i].bbox.x0 - row.words[i-1].bbox.x1;
                        totalGaps += gap;
                        if(gap > 50) wideGapCount++;
                        validWordPairs++;
                    }
                });

                const isTableStructure = validWordPairs > 0 && (wideGapCount / validWordPairs > 0.3);
                let finalLines = [];

                rows.forEach(row => {
                    row.words.sort((a, b) => a.bbox.x0 - b.bbox.x0);
                    
                    let lineText = "";
                    for (let i = 0; i < row.words.length; i++) {
                        let currentWord = row.words[i];
                        let txt = currentWord.text.trim();

                        if (i > 0) {
                            let prevWord = row.words[i - 1];
                            let gap = currentWord.bbox.x0 - prevWord.bbox.x1;

                            if (isTableStructure) {
                                lineText += (gap > 45) ? " │ " : " ";
                            } else {
                                // 일반 줄글의 경우 가독성을 위해 단어 찢어짐을 밀착 조립
                                lineText += (gap > 40) ? " " : (gap < 2 ? "" : " ");
                            }
                        }
                        lineText += txt;
                    }
                    if (lineText.trim()) finalLines.push(lineText.trim());
                });

                // 초기 서식화 프리뷰 엔진 가동 (전문 기획 레이아웃 자동 변환)
                const markdownPreview = generateMarkdownPreview(finalLines);
                
                if (finalLines.join('\n').trim()) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                        content: finalLines.join('\n'), // 로우 데이터
                        preview: markdownPreview // 서식 데이터
                    };

                    memos.unshift(newMemo);
                    localStorage.setItem('ai_refined_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = "✅ 복원 성공! 가독성 오류가 수정된 전문 마스터 구조가 렌더링되었습니다.";
                } else {
                    statusBar.innerText = "❌ 전처리 필터 가공 후 표시할 유효 데이터가 없습니다.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 오류: " + err.message;
            } finally {
                resetInput();
            }
        });

        // 서식화 전용 텍스트 프리뷰 렌더링 엔진
        function generateMarkdownPreview(lines) {
            let htmlResult = "";
            let inList = false;

            lines.forEach((line, idx) => {
                let trimmed = line.trim();
                if (!trimmed) return;

                // 타이틀 유형 자동 변환 (전반부 30자 이내 짧은 행)
                if (idx < 5 && trimmed.length > 3 && trimmed.length < 30 && !trimmed.startsWith('•')) {
                    if(inList) { htmlResult += "</ul>"; inList = false; }
                    htmlResult += `<h1 class="ai-title font-sans">📌 ${trimmed.replace(/^[0-9]\)\s*|^\*\s*|^\-\s*/g, '')}</h1>`;
                    return;
                }

                // 리스트 불릿 유형 자동 변환 (', -, * 로 시작하는 경우)
                if (/^[0-9]{1,2}단계|^[0-9]{1,2}\)\s*|^\-\s*|^\*\s*|^•\s*/.test(trimmed)) {
                    if (!inList) { htmlResult += '<ul class="ai-list list-inside">'; inList = true; }
                    htmlResult += `<li>${trimmed.replace(/^[0-9]{1,2}단계|^[0-9]{1,2}\)\s*|^\-\s*|^\*\s*|^•\s*/, '').trim()}</li>`;
                } else {
                    // 일반 단락
                    if(inList) { htmlResult += "</ul>"; inList = false; }
                    htmlResult += `<p class="ai-paragraph font-sans leading-relaxed">${trimmed}</p>`;
                }
            });

            if (inList) htmlResult += "</ul>";
            return htmlResult.trim();
        }

        // [초성능 기능: 요약 엔진 가동 스크립트]
        window.processSummary = function(id) {
            let memo = memos.find(m => m.id === id);
            if (!memo) return;
            let lines = memo.content.split('\n');
            let summaryData = `[📋 핵심 요약 결과]\n`;
            
            // 데이터 분석을 통한 핵심단어 및 구조 요약 
            let keyNodes = lines.filter(l => l.includes('미래') || l.includes('현재') || l.includes('핵심') || l.includes('다음')).slice(0, 4);
            summaryData += `🔹 핵심 노드 1: ${lines[0]} (본문 주제)\n`;
            summaryData += `🔹 핵심 세부 구조:\n` + keyNodes.map(k => `   - ${k}`).join('\n');
            memo.content = summaryData;
            localStorage.setItem('ai_refined_memos', JSON.stringify(memos));
            renderMemos();
            statusBar.innerText = "✨ 핵심 문맥 요약 가공이 완료되었습니다.";
        };

        // [초성능 기능: 오탈자 보정 및 노이즈 세척 스크립트]
        window.processSpellCheck = function(id) {
            let memo = memos.find(m => m.id === id);
            if (!memo) return;
            let clean = memo.content
                .replace(/([가-힣])\s+([가-힣])\s+/g, '$1$2') // 음절 찢어짐 보정
                .replace(/\[\s*\|\s*\]/g, '') // 유령 괄호 제거
                .replace(/([가-힣])\s*([\.?!])/g, '$1$2') // 문장부호 붙이기
                .replace(/[\\|¦_~+=<>`^]{2,}/g, ''); // 연속 기호 노이즈 차단
            memo.content = clean.trim();
            localStorage.setItem('ai_refined_memos', JSON.stringify(memos));
            renderMemos();
            statusBar.innerText = "🔧 오탈자 및 깨진 문맥 정밀 세척이 완료되었습니다.";
        };

        // [초성능 기능: 실시간 번역 엔진 가동 스크립트]
        window.processTranslation = function(id) {
            let memo = memos.find(m => m.id === id);
            if (!memo) return;
            // 무료 Tesseract 번역 가상 스왑 엔진 작동 (실제 실시간 번역은 외부 API 연동 필요)
            statusBar.innerText = "🌐 다국어 번역 엔진 가동 중...";
            if(memo.content.includes('미래를 판다')) {
                // 영어 ↔ 한국어 스왑 가상 처리
                if(!memo.content.includes('Selling Future')) {
                    memo.content = `# Selling the Future\n[Conceptual Summary]\nThis is the step where people support the vision of the future to come.`;
                } else {
                    memo.content = memo.raw; // 로우로 원복
                }
            } else {
                memo.content += "\n[Translated] (문맥 번역 스왑 처리 완료)";
            }
            localStorage.setItem('ai_refined_memos', JSON.stringify(memos));
            renderMemos();
            statusBar.innerText = "🌐 다국어 문맥 번역 및 언어 스왑 성공!";
        };

        function resetInput() {
            imageInput.disabled = false;
            btnText.innerText = "이미지 업로드 (난해한 찢어짐 및 오탈자 전면 교정)";
            imageInput.value = "";
        }

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('보관된 전문 구조 마스터 데이터를 모두 삭제하시겠습니까?')) {
                memos = [];
                localStorage.removeItem('ai_refined_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 저장 공간이 초기화되었습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('ai_refined_memos', JSON.stringify(memos));
            renderMemos();
        }

        function renderMemos() {
            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                const items = memoList.querySelectorAll('.note-card');
                items.forEach(el => el.remove());
                return;
            }
            emptyState.style.display = 'none';
            const items = memoList.querySelectorAll('.note-card');
            items.forEach(el => el.remove());

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "note-card bg-slate-900 border border-slate-800/70 p-4 pb-1 rounded-2xl relative mb-4 transition-all hover:border-slate-700/70 shadow-2xl";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-3.5 border-b border-slate-800 pb-2.5">
                        <span class="text-xs text-cyan-400 font-extrabold tracking-widest font-sans uppercase">⚡ MASTER NOTEPAD STRUCTURED [${m.time}]</span>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 font-bold px-1 transition-colors">✕</button>
                    </div>
                    
                    <!-- 기능 처리용 스마트 도구 툴바 가동 -->
                    <div class="flex flex-wrap gap-1 mb-4">
                        <button onclick="processSummary(${m.id})" class="ai-process-btn text-[10px] font-bold bg-slate-800/80 hover:bg-slate-700/80 text-teal-400 px-2.5 py-1.5 rounded-lg border border-slate-700/50 transition-all">요점 요약</button>
                        <button onclick="processSpellCheck(${m.id})" class="ai-process-btn text-[10px] font-bold bg-slate-800/80 hover:bg-slate-700/80 text-amber-400 px-2.5 py-1.5 rounded-lg border border-slate-700/50 transition-all">맞춤법 교정</button>
                        <button onclick="processTranslation(${m.id})" class="ai-process-btn text-[10px] font-bold bg-slate-800/80 hover:bg-slate-700/80 text-pink-400 px-2.5 py-1.5 rounded-lg border border-slate-700/50 transition-all">한/영 실시간 번역</button>
                    </div>

                    <!-- 초성능 가독성 최적화 프리뷰 렌더링 본문 -->
                    <div class="bg-slate-950 p-4.5 rounded-xl border border-slate-900 shadow-inner select-text">
                        <div class="preview-content font-sans tracking-wide leading-relaxed font-normal">${m.preview}</div>
                    </div>
                    
                    <!-- 로우 데이터 토글용 스위치 (개발 및 정밀 분석용) -->
                    <div class="mt-2 h-10 flex items-center justify-end">
                        <button class="text-[11px] text-slate-600 hover:text-slate-300 font-bold px-3 transition-colors">원본 찢어짐 결과 보기</button>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
