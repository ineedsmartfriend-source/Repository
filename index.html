<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>OCR AI Studio FIXED</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f1115;
  color:#fff;
}

header{
  padding:12px;
  background:#171a21;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:12px;
  display:grid;
  gap:10px;
}

.card{
  background:#171a21;
  padding:10px;
  border-radius:10px;
}

textarea,input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #333;
  background:#0f1115;
  color:#fff;
  box-sizing: border-box;
}

#ocr {
  font-family: monospace;
  white-space: pre-wrap;
  word-break: break-all;
}

button{
  background:#4f8cff;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-top:6px;
  font-weight: bold;
}

img{
  max-width:100%;
  margin-top:10px;
}

.progress-container {
  display: none;
  background: #222;
  border-radius: 8px;
  padding: 10px;
  margin-top: 8px;
}
.progress-bar {
  width: 0%;
  height: 12px;
  background: #4f8cff;
  border-radius: 6px;
}

/* 갤럭시 스타일 어시스트 툴바 */
.assist-toolbar {
  display: none;
  gap: 8px;
  margin-bottom: 8px;
}
.btn-assist {
  background: #3a3f50;
  color: #7cb5ff;
  border: 1px solid #4f8cff;
  padding: 8px 14px;
  font-size: 13px;
  border-radius: 20px;
  margin-top: 0;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.btn-assist:active {
  background: #4f8cff;
  color: #fff;
}

/* 전체보기 모달 스타일 */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.8);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #171a21;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 900px;
  max-height: 85%;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #333;
  padding-bottom: 10px;
  margin-bottom: 15px;
}

.modal-body {
  white-space: pre-wrap;
  font-family: monospace;
  line-height: 1.6;
}
</style>
</head>

<body>

<header>
  <div>OCR AI Studio FIXED (갤럭시 텍스트 추출 어시스트판)</div>
</header>

<div class="container">

  <div class="card">
    <input type="file" id="file">
    <img id="preview"/>
  </div>

  <div class="card">
    <button onclick="app.runOCR()" style="width:100%; padding:12px; font-size:15px;">정밀 융합 OCR 실행</button>
    <div id="progressContainer" class="progress-container">
      <div style="font-size:12px; margin-bottom:4px;" id="progressText">데이터 분석 결합 중...</div>
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="card">
    <h3>OCR 결과</h3>
    
    <div id="assistToolbar" class="assist-toolbar">
      <button class="btn-assist" onclick="app.copyToClipboard()">📋 전체 복사</button>
      <button class="btn-assist" onclick="app.shareText()">📤 스마트 공유</button>
    </div>

    <textarea id="ocr" rows="15" placeholder="이미지를 업로드하고 실행하면 분석된 텍스트가 조립됩니다."></textarea>
    <button onclick="app.viewFull('교정된 OCR 결과', 'ocr')">전체보기</button>
  </div>

  <div class="card">
    <h3>Summary</h3>
    <textarea id="summary" rows="3"></textarea>
    <button onclick="app.viewFull('Summary 결과', 'summary')">전체보기</button>
  </div>

  <div class="card">
    <h3>Keywords</h3>
    <textarea id="keywords" rows="2"></textarea>
    <button onclick="app.viewFull('Keywords 결과', 'keywords')">전체보기</button>
  </div>

  <div class="card">
    <h3>Title</h3>
    <input id="title"/>
    <button onclick="app.viewFull('Title 결과', 'title')">전체보기</button>
  </div>

</div>

<div id="fullViewModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">타이틀</h3>
      <button style="background:#ff4f4f; margin-top:0;" onclick="app.closeModal()">닫기</button>
    </div>
    <div id="fullViewModalBody" class="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>

/* =========================
   OCR ENGINE
========================= */
class OCR {
  constructor(){
    this.worker = null;
    this.ready = false;
  }

  async init(){
    this.worker = await Tesseract.createWorker("kor+eng+jpn+chi_sim+chi_tra", 1);
    this.ready = true;
  }

  async run(image){
    if(!this.ready) await this.init();
    const res = await this.worker.recognize(image);
    return res.data;
  }
}

/* =========================
   SIMPLE AI (LOCAL) - 컴팩트 밀착 융합 로직
========================= */
class AI {

  static async processCompactLayout(imgElement, ocrInstance, onProgress) {
    onProgress(30);
    const result = await ocrInstance.run(imgElement);
    onProgress(70);

    if (!result || !result.words) return "";

    let words = result.words.map(w => {
      let txt = w.text.trim();
      if (/^[\\\/•\.\*\-\+\s¢®©=\|?:\(\)\[\]{}’”"‘'<>«»;_·~^`]{1,4}$/.test(txt)) txt = "";
      return {
        text: txt,
        x0: w.bbox.x0,
        y0: w.bbox.y0,
        h: w.bbox.y1 - w.bbox.y0
      };
    }).filter(w => w.text.length > 0);

    if (words.length === 0) return "";

    let avgHeight = words.reduce((sum, w) => sum + w.h, 0) / words.length;
    let rowThreshold = avgHeight * 0.5;

    let rows = [];
    words.sort((a, b) => a.y0 - b.y0);

    while (words.length > 0) {
      let base = words.shift();
      let currentRow = [base];

      for (let i = 0; i < words.length; i++) {
        if (Math.abs(words[i].y0 - base.y0) <= rowThreshold) {
          currentRow.push(words[i]);
          words.splice(i, 1);
          i--;
        }
      }
      currentRow.sort((a, b) => a.x0 - b.x0);
      rows.push(currentRow);
    }

    rows.sort((a, b) => a[0].y0 - b[0].y0);

    let gridLines = rows.map(row => {
      let lineStr = "";
      
      for(let i=0; i<row.length; i++) {
        let w = row[i];
        let cleanedWord = w.text;

        cleanedWord = cleanedWord.replace(/omy/g, "com")
                                 .replace(/할일을/g, "할 일을")
                                 .replace(/정학히/g, "정확히")
                                 .replace(/지시하기/g, "지시하기")
                                 .replace(/달사시/g, "달성 시");

        if (i === 0) {
          lineStr += cleanedWord;
        } else {
          let prevW = row[i-1];
          let distance = w.x0 - (prevW.x0 + (prevW.text.length * (avgHeight * 0.5)));
          
          if (distance > avgHeight * 1.2) {
            lineStr += "   |   " + cleanedWord; 
          } else {
            lineStr += " " + cleanedWord;
          }
        }
      }
      return lineStr;
    });

    onProgress(100);
    return this.cleanupOutput(gridLines.join("\n"));
  }

  static cleanupOutput(text) {
    return text
      .split("\n")
      .map(line => line.replace(/^[\[\]_\|\s]+$/g, "").trim())
      .filter(line => line.length > 0)
      .join("\n");
  }

  static summary(text){
    if(!text) return "요약 정보가 없습니다.";
    return text.split("\n").slice(0, 4).join("\n");
  }

  static keywords(text){
    const words = text.toLowerCase().match(/[a-z가-힣一-龥]{2,}/g) || [];
    const map = {};
    words.forEach(w => { map[w] = (map[w]||0)+1; });
    return Object.entries(map)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,6).map(x=>x[0]).join(", ");
  }

  static title(text){
    const firstLine = text.split("\n")[0];
    return firstLine ? firstLine.slice(0, 30) : "스캔 데이터 문서";
  }
}

/* =========================
   APPFLOW
========================= */
class App {
  constructor(){
    this.file = document.getElementById("file");
    this.preview = document.getElementById("preview");
    this.ocrEl = document.getElementById("ocr");
    this.summaryEl = document.getElementById("summary");
    this.keywordEl = document.getElementById("keywords");
    this.titleEl = document.getElementById("title");

    this.progressContainer = document.getElementById("progressContainer");
    this.progressBar = document.getElementById("progressBar");
    this.progressText = document.getElementById("progressText");
    this.assistToolbar = document.getElementById("assistToolbar");

    this.modal = document.getElementById("fullViewModal");
    this.modalBody = document.getElementById("fullViewModalBody");

    this.ocr = new OCR();
    this.init();
  }

  async init(){
    await this.ocr.init();

    this.file.addEventListener("change", (e)=>{
      const file = e.target.files[0];
      if(!file) return;

      const reader = new FileReader();
      reader.onload = (ev)=>{
        this.preview.src = ev.target.result;
        this.currentImage = ev.target.result;
        this.assistToolbar.style.display = "none"; // 새 파일 로드 시 툴바 초기화
      };
      reader.readAsDataURL(file);
    });
  }

  async runOCR(){
    if(!this.currentImage){
      alert("이미지를 먼저 선택하세요");
      return;
    }

    const img = new Image();
    img.src = this.currentImage;

    img.onload = async ()=>{
      try {
        this.progressContainer.style.display = "block";
        this.progressBar.style.width = "0%";
        this.assistToolbar.style.display = "none";

        const processedText = await AI.processCompactLayout(img, this.ocr, (percent) => {
          this.progressBar.style.width = percent + "%";
          this.progressText.innerText = `데이터 분석 결합 중... (${percent}%)`;
        });

        this.ocrEl.value = processedText;
        this.summaryEl.value = AI.summary(processedText);
        this.keywordEl.value = AI.keywords(processedText);
        this.titleEl.value = AI.title(processedText);
        
        // 스캔 성공 시 갤럭시 스타일 어시스트 툴바 즉시 표출
        if (processedText.trim().length > 0) {
          this.assistToolbar.style.display = "flex";
        }

        setTimeout(() => { this.progressContainer.style.display = "none"; }, 500);

      } catch(err){
        console.error(err);
        alert("OCR 실행 중 에러가 발생했습니다.");
        this.progressContainer.style.display = "none";
      }
    };
  }

  /* 갤럭시 어시스트 기능 1: 클립보드 복사 */
  async copyToClipboard() {
    const text = this.ocrEl.value;
    if (!text.trim()) return;
    try {
      await navigator.clipboard.writeText(text);
      alert("추출된 전체 텍스트가 클립보드에 복사되었습니다!");
    } catch (err) {
      // 구형 웹뷰 호환성 대응 백업 구조
      this.ocrEl.select();
      document.execCommand('copy');
      alert("텍스트가 복사되었습니다.");
    }
  }

  /* 갤럭시 어시스트 기능 2: 모바일 공유 시스템 연동 */
  async shareText() {
    const text = this.ocrEl.value;
    if (!text.trim()) return;
    
    if (navigator.share) {
      try {
        await navigator.share({
          title: this.titleEl.value || '추출된 문서',
          text: text
        });
      } catch (err) {
        console.log('공유 취소 또는 에러:', err);
      }
    } else {
      alert("현재 브라우저/환경에서는 웹 공유 API를 지원하지 않습니다. [전체 복사] 기능을 이용해 주세요.");
    }
  }

  viewFull(title, elementId) {
    const targetElement = document.getElementById(elementId);
    if (!targetElement || !targetElement.value.trim()) {
      alert("표시할 내용이 없습니다.");
      return;
    }
    document.getElementById("modalTitle").innerText = title;
    this.modalBody.innerText = targetElement.value;
    this.modal.style.display = "flex";
  }

  closeModal() {
    this.modal.style.display = "none";
  }
}

const app = new App();
</script>

</body>
</html>
