<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Smart Table Grid OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 2px;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800 pb-2 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl">📊</span>
            <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent">스마트 표 구조 OCR 메모장</h1>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 삭제</button>
    </div>

    <div class="my-3 shrink-0 relative">
        <div class="w-full h-14 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-xl shadow-lg flex items-center justify-center gap-2 pointer-events-none">
            <span>📊</span>
            <span id="btn-text" class="text-sm font-bold text-white">표 캡처 선택 (줄·칸 매핑 추출)</span>
        </div>
        <input type="file" id="image-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-1.5 bg-slate-800/50 rounded-md mt-2">
            🟢 스탠바이 (표의 열과 행 위치를 감지하여 어휘를 정렬합니다)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-10">
            <p>표 또는 리스트 캡처 이미지를 선택하면,</p>
            <p class="mt-1">칸을 구분하여 보기 편한 텍스트 리스트로 가공합니다.</p>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('my_grid_table_memos')) || [];
        
        renderMemos();

        // 사용자가 화면을 직접 터치하여 가동되는 다이렉트 파일 핸들러
        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerText = "⏳ 이미지 격자 분석 중...";
                btnText.innerText = "구조 스캔 중...";
                imageInput.disabled = true;

                const result = await Tesseract.recognize(file, 'kor');
                const words = result.data.words;

                if (words.length === 0) {
                    statusBar.innerText = "❌ 인식된 텍스트가 없습니다.";
                    imageInput.disabled = false;
                    btnText.innerText = "표 캡처 선택 (줄·칸 매핑 추출)";
                    return;
                }

                // 1단계: 노이즈 문자 정제
                const cleanWords = words.filter(w => {
                    const txt = w.text.trim();
                    if (/^[.,\-_=|*+:^~'""`‘’“”()\[\]{}<>!?•·]+$/.test(txt)) return false;
                    if (/^[ㄱ-ㅎㅏ-ㅣ]$/.test(txt)) return false;
                    if (txt.length === 1 && /^[a-zA-Z0-9]$/.test(txt) && !/^\d$/.test(txt)) return false;
                    return true;
                });

                // 2단계: Y축 정렬 (행 묶기)
                cleanWords.sort((a, b) => a.bbox.y0 - b.bbox.y0);
                const rows = [];
                let currentSrcRow = [cleanWords[0]];

                for (let i = 1; i < cleanWords.length; i++) {
                    const currentWord = cleanWords[i];
                    const lastWordInRow = currentSrcRow[currentSrcRow.length - 1];
                    const rowHeight = lastWordInRow.bbox.y1 - lastWordInRow.bbox.y0;

                    if (currentWord.bbox.y0 - lastWordInRow.bbox.y0 <= rowHeight * 0.7) {
                        currentSrcRow.push(currentWord);
                    } else {
                        rows.push(currentSrcRow);
                        currentSrcRow = [currentWord];
                    }
                }
                rows.push(currentSrcRow);

                // 3단계: X축 정렬 및 가로 칸막이(│) 배치
                let finalOutputText = "";
                rows.forEach(row => {
                    row.sort((a, b) => a.bbox.x0 - b.bbox.x0);
                    let rowStr = "";
                    for (let j = 0; j < row.length; j++) {
                        if (j > 0) {
                            const gap = row[j].bbox.x0 - row[j-1].bbox.x1;
                            if (gap > 28) {
                                rowStr += "  │  "; 
                            } else {
                                rowStr += " "; 
                            }
                        }
                        rowStr += row[j].text;
                    }
                    if (rowStr.replace(/[│\s]/g, '').length > 0) {
                        finalOutputText += rowStr + "\n";
                    }
                });

                if (finalOutputText.trim()) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                        content: finalOutputText.trim()
                    };
                    memos.unshift(newMemo);
                    localStorage.setItem('my_grid_table_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = "✅ 원본 표 구조가 이쁘게 정렬되어 저장되었습니다!";
                } else {
                    statusBar.innerText = "❌ 유의미한 표 데이터를 찾지 못했습니다.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 오류: " + err.message;
            } finally {
                imageInput.disabled = false;
                btnText.innerText = "표 캡처 선택 (줄·칸 매핑 추출)";
                imageInput.value = "";
            }
        });

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('모든 메모를 삭제하시겠습니까?')) {
                memos = [];
                localStorage.removeItem('my_grid_table_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 모든 메모가 삭제되었습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('my_grid_table_memos', JSON.stringify(memos));
            renderMemos();
            statusBar.innerText = "🗑️ 선택한 메모가 삭제되었습니다.";
        }

        function renderMemos() {
            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                const items = memoList.querySelectorAll('.memo-item');
                items.forEach(el => el.remove());
                return;
            }
            
            emptyState.style.display = 'none';
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-800/40 border border-slate-700/40 p-3 rounded-lg relative transition-all";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-2 border-b border-slate-800 pb-1">
                        <span class="text-[10px] text-slate-500 font-bold">${m.time} [표 데이터 매핑 완료]</span>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 px-1">✕</button>
                    </div>
                    <div class="overflow-x-auto custom-scrollbar whitespace-pre py-1 bg-slate-950/40 p-3 rounded border border-slate-900">
                        <p class="font-mono text-xs text-cyan-400 leading-relaxed select-text cursor-text">${m.content}</p>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
