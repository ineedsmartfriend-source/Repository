<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Table Background Remover & OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
        }
        .table-render-box {
            font-family: 'Fira Code', 'Pretendard', monospace;
            white-space: pre;
            letter-spacing: -0.3px;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 2px;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800 pb-2 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl">🧹</span>
            <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">배경 제거 표 위치 복원기</h1>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 삭제</button>
    </div>

    <div class="my-3 shrink-0 relative">
        <div class="w-full h-14 bg-gradient-to-r from-cyan-600 to-emerald-600 rounded-xl shadow-lg flex items-center justify-center gap-2 pointer-events-none">
            <span>✨</span>
            <span id="btn-text" class="text-sm font-bold text-white">표 이미지 선택 (배경 자동 제거)</span>
        </div>
        <input type="file" id="image-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-1.5 bg-slate-800/50 rounded-md mt-2">
            🟢 스탠바이 (배경과 선을 완전히 소거한 후 텍스트만 투명 추출합니다)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-10">
            <p>원본 표 이미지를 선택해 주세요.</p>
            <p class="mt-1">배경 전처리 후 원본 위치 그대로 어휘가 정렬됩니다.</p>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        // 원본 텍스트 정확도 보정 사전
        const DICTIONARY = [
            "대표비서", "콘텐츠팀", "카피팀", "고객응대팀", "제안서팀", "리서치팀", "강의제작팀", "운영관리팀", "자동화팀", "최고코치",
            "주간 목표", "일정", "고민", "우선순위", "오늘 할 일", "잘된 게시물", "타깃", "계정 톤", "훅", "구성", "캡션",
            "상품 설명", "고객 고민", "가격", "상세페이지 문구", "CTA", "진행 방식", "환불 기준", "답변", "메일 초안",
            "서비스 구성", "단가", "사례", "제안서 목차", "문장 초안", "경쟁사", "키워드", "참고 링크", "비교표", "인사이트 요약",
            "커리큘럼", "질문", "예제", "강의안", "워크북", "반복업무", "마감일", "체크리스트", "주간 운영표", "누락 점검",
            "사용 도구", "반복 흐름", "연결 목적", "흐름 초안", "성과", "실패", "배운 점", "개선안", "다음 액션"
        ];

        let memos = JSON.parse(localStorage.getItem('my_bg_removed_memos')) || [];
        renderMemos();

        function fixTextWithDict(rawText) {
            let text = rawText.replace(/\s+/g, "");
            for (let word of DICTIONARY) {
                let strippedWord = word.replace(/\s+/g, "");
                if (text.includes(strippedWord) || checkSimilarity(text, strippedWord)) {
                    return word;
                }
            }
            return rawText;
        }

        function checkSimilarity(s1, s2) {
            if (Math.abs(s1.length - s2.length) > 2) return false;
            let matches = 0;
            for(let i=0; i<s1.length; i++) {
                if(s2.includes(s1[i])) matches++;
            }
            return (matches / Math.max(s1.length, s2.length)) > 0.6;
        }

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerText = "⏳ 🛡️ 1단계: 모든 격자선 및 어두운 배경 제거 공정 진행 중...";
                btnText.innerText = "배경 제거 필터링...";
                imageInput.disabled = true;

                const img = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const i = new Image();
                        i.onload = () => resolve(i);
                        i.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                // [핵심 연산] 픽셀 데이터 접근하여 배경 전면 화이트아웃, 글자만 블랙 처리
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i], g = data[i+1], b = data[i+2];
                    
                    // 평균 밝기 계산
                    let brightness = (r + g + b) / 3;
                    
                    // 주황색 격자 선이거나 전체적으로 어두운 배경(원래 표의 검은색 배경) 판별
                    if ((r > 110 && g < 90 && b < 60) || brightness < 90) {
                        // 배경과 선은 흰색(255)으로 완전히 소거하여 투명화 베이스 구축
                        data[i] = 255; data[i+1] = 255; data[i+2] = 255;
                    } else {
                        // 남은 순수 텍스트 어휘들은 완벽하게 대조되도록 고선명 블랙(0)으로 강화
                        data[i] = 0; data[i+1] = 0; data[i+2] = 0;
                    }
                }
                ctx.putImageData(imgData, 0, 0);

                statusBar.innerText = "🧠 2단계: 텍스트 1:1 원래 위치 매핑 중...";
                const result = await Tesseract.recognize(canvas, 'kor');
                const words = result.data.words;

                if (words.length === 0) {
                    statusBar.innerText = "❌ 유효한 텍스트가 감지되지 않았습니다.";
                    imageInput.disabled = false;
                    btnText.innerText = "표 이미지 선택 (배경 자동 제거)";
                    return;
                }

                const imgWidth = canvas.width;

                // 노이즈 제거 및 사전 기반 정제
                const cleanWords = words.map(w => {
                    let text = w.text.trim();
                    text = fixTextWithDict(text);
                    return { ...w, text };
                }).filter(w => {
                    if (w.text.length <= 1 && !/^\d+$/.test(w.text)) return false;
                    // 흔하게 나오는 파편 오인식 글자 필터링
                    if (/^[뽚뵘떼뽀돌롭숨젹휵윽흑줄죡]+$/.test(w.text)) return false;
                    return true;
                });

                // Y축 기준으로 행 묶기
                cleanWords.sort((a, b) => a.bbox.y0 - b.bbox.y0);
                const rows = [];
                let currentSrcRow = [cleanWords[0]];

                for (let i = 1; i < cleanWords.length; i++) {
                    const currentWord = cleanWords[i];
                    const lastWordInRow = currentSrcRow[currentSrcRow.length - 1];
                    const rowHeight = lastWordInRow.bbox.y1 - lastWordInRow.bbox.y0;

                    if (currentWord.bbox.y0 - lastWordInRow.bbox.y0 <= rowHeight * 0.7) {
                        currentSrcRow.push(currentWord);
                    } else {
                        rows.push(currentSrcRow);
                        currentSrcRow = [currentWord];
                    }
                }
                rows.push(currentSrcRow);

                let finalOutputText = "";

                // 배경이 완벽히 날아간 상태에서 4개 컬럼 정밀 안착
                rows.forEach(row => {
                    row.sort((a, b) => a.bbox.x0 - b.bbox.x0);

                    let c1 = "", c2 = "", c3 = "", c4 = "";

                    row.forEach(word => {
                        const midX = (word.bbox.x0 + word.bbox.x1) / 2;
                        const ratio = midX / imgWidth;

                        // 4열 배치 비율 고정
                        if (ratio < 0.13) {
                            c1 += word.text + " ";
                        } else if (ratio >= 0.13 && ratio < 0.38) {
                            c2 += word.text + " ";
                        } else if (ratio >= 0.38 && ratio < 0.70) {
                            c3 += word.text + " ";
                        } else {
                            c4 += word.text + " ";
                        }
                    });

                    c1 = c1.trim(); c2 = c2.trim(); c3 = c3.trim(); c4 = c4.trim();

                    if (c1 || c2 || c3 || c4) {
                        const p1 = c1.padEnd(4, " ");
                        const p2 = c2.padEnd(12, " ");
                        const p3 = c3.padEnd(24, " ");
                        finalOutputText += `${p1} │ ${p2} │ ${p3} │ ${c4}\n`;
                    }
                });

                if (finalOutputText.trim()) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                        content: finalOutputText.trim()
                    };
                    memos.unshift(newMemo);
                    localStorage.setItem('my_bg_removed_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = "✅ 배경 노이즈 완전 소거 및 텍스트 위치 정렬 완료!";
                } else {
                    statusBar.innerText = "❌ 추출된 텍스트가 없습니다.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 오류: " + err.message;
            } finally {
                imageInput.disabled = false;
                btnText.innerText = "표 이미지 선택 (배경 자동 제거)";
                imageInput.value = "";
            }
        });

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('모든 메모를 삭제하시겠습니까?')) {
                memos = [];
                localStorage.removeItem('my_bg_removed_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 모든 리스트가 삭제되었습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('my_bg_removed_memos', JSON.stringify(memos));
            renderMemos();
        }

        function renderMemos() {
            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                const items = memoList.querySelectorAll('.memo-item');
                items.forEach(el => el.remove());
                return;
            }
            emptyState.style.display = 'none';
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-800/60 border border-slate-700/50 p-3 rounded-xl relative transition-all";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-2 border-b border-slate-800 pb-1.5">
                        <span class="text-[10px] text-cyan-400 font-bold">${m.time} [순수 텍스트 매핑 완료]</span>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 px-1">✕</button>
                    </div>
                    <div class="overflow-x-auto custom-scrollbar bg-slate-950 p-3 rounded-lg border border-slate-900">
                        <p class="table-render-box text-[11px] text-cyan-300 leading-relaxed font-mono select-text cursor-text">${m.content}</p>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
