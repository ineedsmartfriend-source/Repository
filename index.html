<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Real-time Smart OCR Streamer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 2px;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800 pb-2 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl">👁️‍🗨️</span>
            <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-violet-400 to-fuchsia-400 bg-clip-text text-transparent">실시간 스마트 스트림 OCR</h1>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 삭제</button>
    </div>

    <div id="video-container" class="hidden my-2 bg-black rounded-lg overflow-hidden relative border border-slate-800 shrink-0 h-32">
        <video id="webcam-video" autoplay playsinline muted class="w-full h-full object-cover"></video>
        <div class="absolute top-2 left-2 bg-rose-600/80 px-2 py-0.5 rounded text-[10px] font-bold animate-pulse">LIVE SCREEN SCAN</div>
    </div>

    <div class="my-2 space-y-2 shrink-0">
        <div class="grid grid-cols-2 gap-2 bg-slate-900 p-1 rounded-lg border border-slate-800 text-xs">
            <button id="mode-sentence" class="py-2 rounded-md font-bold transition-all text-center bg-violet-600 text-white shadow-sm">
                📝 문장 단위 (자동 연결)
            </button>
            <button id="mode-word" class="py-2 rounded-md font-bold transition-all text-center text-slate-400 hover:text-slate-200">
                🧩 단어 단위 (개별 분리)
            </button>
        </div>

        <input type="file" id="image-input" accept="image/*" class="hidden">
        
        <div class="grid grid-cols-2 gap-2">
            <button id="stream-btn" class="bg-gradient-to-r from-violet-600 to-indigo-600 active:scale-[0.98] text-white font-bold py-3.5 px-2 rounded-xl shadow-lg text-xs flex items-center justify-center gap-1.5">
                <span id="stream-icon">👁️</span>
                <span id="stream-text">실시간 스캔 시작</span>
            </button>
            <button id="upload-btn" class="bg-slate-800 border border-slate-700 active:scale-[0.98] text-white font-bold py-3.5 px-2 rounded-xl text-xs flex items-center justify-center gap-1.5">
                <span>📸</span>
                <span>갤러리 캡처 선택</span>
            </button>
        </div>

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-1 bg-slate-800/50 rounded-md">
            🟢 스탠바이 (원하는 가공 모드를 선택하세요)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-3 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-10">
            <p>실시간 스캔을 켜거나 캡처 사진을 골라보세요.</p>
            <p class="mt-1">선택한 모드(문장/단어)에 맞춰 보정되어 쌓입니다.</p>
        </div>
    </div>

    <script>
        const streamBtn = document.getElementById('stream-btn');
        const streamIcon = document.getElementById('stream-icon');
        const streamText = document.getElementById('stream-text');
        const uploadBtn = document.getElementById('upload-btn');
        const imageInput = document.getElementById('image-input');
        const videoContainer = document.getElementById('video-container');
        const video = document.getElementById('webcam-video');
        const statusBar = document.getElementById('status-bar');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const clearAllBtn = document.getElementById('clear-all-btn');

        const modeSentence = document.getElementById('mode-sentence');
        const modeWord = document.getElementById('mode-word');

        let activeMode = 'sentence'; // 'sentence' 또는 'word'
        let localStream = null;
        let isScanning = false;
        let scanInterval = null;
        let memos = JSON.parse(localStorage.getItem('my_stream_memos')) || [];

        renderMemos();

        // 모드 전환 이벤트
        modeSentence.addEventListener('click', () => {
            activeMode = 'sentence';
            modeSentence.className = "py-2 rounded-md font-bold transition-all text-center bg-violet-600 text-white shadow-sm";
            modeWord.className = "py-2 rounded-md font-bold transition-all text-center text-slate-400 hover:text-slate-200";
            statusBar.innerText = "💡 문장 모드: 흩어진 글자들을 문장 형태로 부드럽게 이어 붙입니다.";
        });

        modeWord.addEventListener('click', () => {
            activeMode = 'word';
            modeWord.className = "py-2 rounded-md font-bold transition-all text-center bg-violet-600 text-white shadow-sm";
            modeSentence.className = "py-2 rounded-md font-bold transition-all text-center text-slate-400 hover:text-slate-200";
            statusBar.innerText = "💡 단어 모드: 불필요한 조사를 떼어내고 핵심 키워드 단위로 분리합니다.";
        });

        // 갤러리 캡처 파일 업로드 처리
        uploadBtn.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            processOCR(file);
        });

        // [핵심] 실시간 비디오 스트리밍 스캔 토글 버튼
        streamBtn.addEventListener('click', async () => {
            if (isScanning) {
                stopStream();
                return;
            }

            try {
                statusBar.innerText = "🔄 카메라/화면 스트림 권한 요청 중...";
                // 스마트폰의 후면 카메라나 미러링 소스를 실시간 연동
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });

                video.srcObject = localStream;
                videoContainer.classList.remove('hidden');
                
                isScanning = true;
                streamText.innerText = "실시간 스캔 중지";
                streamIcon.innerText = "⏹️";
                streamBtn.className = streamBtn.className.replace('from-violet-600 to-indigo-600', 'from-rose-600 to-pink-600');

                // 4초마다 현재 실시간 화면 프레임을 스냅샷 찍어 자동 OCR 처리
                statusBar.innerText = "⏳ 실시간 스트림 매핑 중... (4초 주기로 자동 분석)";
                scanInterval = setInterval(() => {
                    captureFrameAndOCR();
                }, 4000);

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 지원되지 않는 브라우저이거나 카메라 권한이 거부되었습니다.";
                stopStream();
            }
        });

        function stopStream() {
            isScanning = false;
            if (scanInterval) clearInterval(scanInterval);
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            videoContainer.classList.add('hidden');
            streamText.innerText = "실시간 스캔 시작";
            streamIcon.innerText = "👁️";
            streamBtn.className = streamBtn.className.replace('from-rose-600 to-pink-600', 'from-violet-600 to-indigo-600');
            statusBar.innerText = "🟢 실시간 스캔이 중지되었습니다.";
        }

        async function captureFrameAndOCR() {
            if (!isScanning) return;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob((blob) => {
                if (blob) processOCR(blob, true);
            }, 'image/jpeg');
        }

        // --- [핵심 알고리즘] 단어 및 문장 구분 분석 엔진 ---
        async function processOCR(sourceBlob, isLive = false) {
            try {
                if(!isLive) statusBar.innerText = "⏳ 이미지 구조 분석 중...";
                const result = await Tesseract.recognize(sourceBlob, 'kor');
                let processedText = "";

                if (activeMode === 'sentence') {
                    // [문장 최적화]: 이상한 줄바꿈을 지우고 마침표나 맥락을 고려하여 하나의 자연스러운 흐름으로 병합
                    const rawLines = result.data.lines.map(l => l.text.trim()).filter(t => t.length > 0);
                    processedText = rawLines.join(" ").replace(/\s+/g, " "); // 다중 공백 청소
                } else {
                    // [단어 최적화]: 한 글자짜리 찌꺼기 조사나 노이즈를 제거하고 유의미한 키워드 단어 배열로 나열
                    const rawWords = result.data.words.map(w => w.text.trim());
                    const filteredWords = rawWords.filter(w => {
                        return w.length > 1 && !/^[은는이가을를과와도]$/.test(w); // 불필요 조사 필터링
                    });
                    processedText = filteredWords.join("   |   "); // 단어 구분 가독성 매핑
                }

                if (processedText.trim()) {
                    // 실시간 중복 저장 방지 필터 (바로 전 메모와 내용이 80% 이상 같으면 스킵)
                    if (memos.length > 0 && memos[0].content === processedText.trim()) {
                        if(isLive) statusBar.innerText = "💤 변경사항 없음 (동일 문장 스킵 중)";
                        return;
                    }

                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                        mode: activeMode === 'sentence' ? '문장' : '단어',
                        content: processedText.trim()
                    };
                    memos.unshift(newMemo);
                    localStorage.setItem('my_stream_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = `✅ [${newMemo.mode}] 모드로 가공되어 기록되었습니다!`;
                }
            } catch (err) {
                console.error(err);
                if(!isLive) statusBar.innerText = "❌ 분석 오류: " + err.message;
            }
        }

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('모든 메모를 삭제하시겠습니까?')) {
                memos = [];
                localStorage.removeItem('my_stream_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 모든 메모가 삭제되었습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('my_stream_memos', JSON.stringify(memos));
            renderMemos();
            statusBar.innerText = "🗑️ 선택한 메모가 삭제되었습니다.";
        }

        function renderMemos() {
            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                const items = memoList.querySelectorAll('.memo-item');
                items.forEach(el => el.remove());
                return;
            }
            
            emptyState.style.display = 'none';
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-800/50 border border-slate-700/40 p-3 rounded-lg relative transition-all";
                const badgeColor = m.mode === '문장' ? 'bg-violet-500/20 text-violet-300 border-violet-500/30' : 'bg-fuchsia-500/20 text-fuchsia-300 border-fuchsia-500/30';
                
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-1.5 border-b border-slate-800/80 pb-1">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-slate-500 font-bold">${m.time}</span>
                            <span class="text-[9px] px-1.5 py-0.5 rounded border ${badgeColor}">${m.mode} 최적화</span>
                        </div>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 px-1">✕</button>
                    </div>
                    <p class="text-xs text-slate-200 leading-relaxed select-text cursor-text break-all">${m.content}</p>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
