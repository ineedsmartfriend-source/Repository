<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 초정밀 다국어 그리드 복원형 OCR 메모장</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap');
        body {
            font-family: 'Pretendard', 'Noto Sans JP', 'Noto Sans SC', 'Roboto Mono', sans-serif;
            background-color: #060913;
        }
        .ai-grid-box {
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.8;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0a1124;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #22345a;
            border-radius: 3px;
        }
    </style>
</head>
<body class="text-slate-200 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800/80 pb-3 shrink-0">
        <div class="flex items-center gap-2.5">
            <span class="text-xl animate-pulse">🎯</span>
            <div>
                <h1 class="text-sm font-bold tracking-tight bg-gradient-to-r from-cyan-400 via-indigo-400 to-purple-400 bg-clip-text text-transparent">초정밀 다국어 그리드 복원 메모장</h1>
                <p class="text-[10px] text-slate-500">Universal Multi-Language Table & Document Structure Sync</p>
            </div>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 리셋</button>
    </div>

    <div class="my-3 shrink-0 relative">
        <div class="w-full h-14 bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 rounded-xl shadow-2xl flex items-center justify-center gap-3 pointer-events-none">
            <span class="text-indigo-400">📊</span>
            <span id="btn-text" class="text-xs font-semibold text-slate-300">표·문서 이미지 업로드 (문맥 간격 및 언어 1:1 동기화)</span>
        </div>
        <input type="file" id="image-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-2 bg-slate-900/50 rounded-lg mt-2 border border-slate-800/60">
            🟢 스탠바이 (세계 모든 언어의 서식, 기획서, 표의 줄·칸 구조를 훼손 없이 정렬하여 추출합니다)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-12 text-center">
            <p class="font-semibold text-slate-400 text-sm mb-1">다국어 격자 배열 복원 엔진 탑재</p>
            <p class="max-w-xs leading-relaxed">찢어지고 흐트러지던 표 구조 데이터나 글로벌 언어 문서를 원본 서식 느낌 그대로 정밀 복원합니다.</p>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('ai_perfect_grid_memos')) || [];
        renderMemos();

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerHTML = "⏳ <span class='text-amber-400 font-bold'>1/2: 미세 텍스트 윤곽선 스캔 및 표 좌표 추적 중...</span>";
                btnText.innerText = "그리드 매핑 엔진 가동 중...";
                imageInput.disabled = true;

                const img = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const i = new Image();
                        i.onload = () => resolve(i);
                        i.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                // 이미지 전처리 (다국어 특수기호 및 표 테두리 주변 노이즈 완벽 격리)
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                    let v = (gray > 150) ? 255 : 0; // 픽셀 대비 극대화
                    data[i] = v; data[i+1] = v; data[i+2] = v;
                }
                ctx.putImageData(imgData, 0, 0);

                statusBar.innerHTML = "⏳ <span class='text-cyan-400 font-bold'>2/2: 범용 다국어 결합 및 수평 행 구조 결합 중...</span>";
                btnText.innerText = "텍스트 서식 조립 중...";

                // 세계 주요 언어팩 통합 로드
                const worker = await Tesseract.createWorker('kor+eng+jpn+chi_sim');
                const result = await worker.recognize(canvas);
                const words = result.data.words; // 단어 및 좌표 구조 획득
                await worker.terminate();

                if (!words || words.length === 0) {
                    statusBar.innerText = "❌ 이미지 내부에서 유효한 텍스트 궤적을 찾지 못했습니다.";
                    resetInput();
                    return;
                }

                // [핵심 매커니즘: Y좌표 기반 수평 행 그룹화]
                const rows = [];
                const rowThreshold = 15; // 동일한 행으로 인지할 Y좌표 허용 오차 (픽셀 단위)

                words.forEach(word => {
                    let text = word.text.trim();
                    if (!text) return;

                    // 불필요한 단독 유령 노이즈 기호만 필터링 (| 이나 \ 가 홀로 깨져서 나오는 현상 제어)
                    if (/^[\\|¦_]$/.test(text)) return;

                    let yCenter = word.bbox.y0 + (word.bbox.y1 - word.bbox.y0) / 2;
                    let matchedRow = rows.find(r => Math.abs(r.yCenter - yCenter) < rowThreshold);

                    if (matchedRow) {
                        matchedRow.words.push(word);
                        // 행의 평균 Y 중심점 업데이트
                        matchedRow.yCenter = (matchedRow.yCenter * (matchedRow.words.length - 1) + yCenter) / matchedRow.words.length;
                    } else {
                        rows.push({
                            yCenter: yCenter,
                            words: [word]
                        });
                    }
                });

                // 1. 행을 위에서 아래 순서로 정렬
                rows.sort((a, b) => a.yCenter - b.yCenter);

                let formattedLines = [];

                rows.forEach(row => {
                    // 2. 같은 행 내부의 단어들을 왼쪽에서 오른쪽 순서로 정렬
                    row.words.sort((a, b) => a.bbox.x0 - b.bbox.x0);

                    // 칸(Column)의 간격을 인지하여 일정한 공백이나 구분기호 제공
                    let lineText = "";
                    for (let i = 0; i < row.words.length; i++) {
                        let currentWord = row.words[i];
                        if (i > 0) {
                            let prevWord = row.words[i - 1];
                            let gap = currentWord.bbox.x0 - prevWord.bbox.x1;
                            
                            // 단어 간격이 일정 수준 이상 넓다면 표의 칸(Column) 이동으로 간주하여 구분자 삽입
                            if (gap > 40) {
                                lineText += "  [ | ]  ";
                            } else {
                                lineText += " ";
                            }
                        }
                        lineText += currentWord.text;
                    }
                    if (lineText.trim()) {
                        formattedLines.push(lineText.trim());
                    }
                });

                let finalProcessedResult = formattedLines.join('\n').trim();

                if (finalProcessedResult) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                        content: finalProcessedResult
                    };

                    memos.unshift(newMemo);
                    localStorage.setItem('ai_perfect_grid_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = `✅ 다국어 격자 구조 복원 완료! 표 형태 그대로 메모에 기록되었습니다.`;
                } else {
                    statusBar.innerText = "❌ 필터링 후 남은 유효 데이터가 없습니다.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 디코딩 오류 발생: " + err.message;
            } finally {
                resetInput();
            }
        });

        function resetInput() {
            imageInput.disabled = false;
            btnText.innerText = "표·문서 이미지 업로드 (문맥 간격 및 언어 1:1 동기화)";
            imageInput.value = "";
        }

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('저장된 정밀 메모 리스트를 전부 삭제할까요?')) {
                memos = [];
                localStorage.removeItem('ai_perfect_grid_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 저장 공간 초기화 완료.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('ai_perfect_grid_memos', JSON.stringify(memos));
            renderMemos();
        }

        function renderMemos() {
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                return;
            }
            emptyState.style.display = 'none';

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-900/60 border border-slate-800 p-4 rounded-xl relative mb-4 transition-all";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-2.5 border-b border-slate-800/50 pb-1.5">
                        <span class="text-xs text-indigo-400 font-medium tracking-wide">📊 GRID & LANGUAGE SYNC DATA [${m.time}]</span>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-600 hover:text-rose-400 px-1">✕</button>
                    </div>
                    <div class="bg-slate-950/80 p-3.5 rounded-lg border border-slate-900 shadow-inner overflow-x-auto custom-scrollbar">
                        <p class="ai-grid-box text-xs md:text-sm text-slate-300 font-mono select-text cursor-text">${m.content}</p>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
