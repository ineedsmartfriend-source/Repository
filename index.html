<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>OCR Memo Assistant</title>

<style>
body{
  margin:0;
  font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background:#0f1115;
  color:#fff;
}
header{
  padding:16px;
  background:#171a21;
  font-weight: bold;
  font-size: 16px;
  border-bottom: 1px solid #232733;
}
.container{
  padding:16px;
  display:grid;
  gap:12px;
}
.card{
  background:#171a21;
  padding:16px;
  border-radius:12px;
  border: 1px solid #232733;
}
textarea, input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #2e3344;
  background:#0f1115;
  color:#fff;
  box-sizing: border-box;
  font-size: 14px;
  line-height: 1.6;
}
textarea {
  font-family: "Fira Code", Consolas, Monaco, monospace;
}
button{
  background:#4f8cff;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  cursor:pointer;
  font-weight: bold;
  font-size: 14px;
  width: 100%;
  transition: background 0.2s;
}
button:hover {
  background: #3b76e0;
}
img{
  max-width:100%;
  margin-top:12px;
  border-radius: 6px;
}
.progress-container {
  display: none;
  background: #222;
  border-radius: 8px;
  padding: 12px;
  margin-top: 10px;
}
.progress-bar {
  width: 0%;
  height: 8px;
  background: #4f8cff;
  border-radius: 4px;
  transition: width 0.2s;
}
.assist-toolbar {
  display: none;
  gap: 8px;
  margin-bottom: 10px;
}
.btn-assist {
  background: #2a2e3d;
  color: #7cb5ff;
  border: 1px solid #4f8cff;
  padding: 8px 16px;
  font-size: 13px;
  border-radius: 20px;
  width: auto;
}
h3 {
  margin-top: 0;
  margin-bottom: 12px;
  font-size: 15px;
  color: #a0a5b5;
}
</style>
</head>

<body>

<header>📋 깔끔한 텍스트 메모 정렬 어시스트</header>

<div class="container">

  <div class="card">
    <h3>1. 이미지 선택</h3>
    <input type="file" id="file">
    <img id="preview"/>
  </div>

  <div class="card">
    <button onclick="app.runOCR()">나란히 정렬해서 추출하기</button>
    <div id="progressContainer" class="progress-container">
      <div style="font-size:12px; margin-bottom:6px; color:#a0a5b5;" id="progressText">대기 중...</div>
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="card">
    <h3>2. 나란히 정렬된 메모 결과 (바로 복사 가능)</h3>
    <div id="assistToolbar" class="assist-toolbar">
      <button class="btn-assist" onclick="app.copyToClipboard()">📋 한 번에 복사하기</button>
    </div>
    <textarea id="ocr" rows="14" placeholder="스캔을 시작하면 텍스트가 줄바꿈과 열 구조에 맞춰 한 줄씩 깔끔하게 정렬됩니다."></textarea>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
class OCRProcessor {
  constructor(){
    this.worker = null;
    this.ready = false;
  }
  async init(){
    this.worker = await Tesseract.createWorker("kor+eng", 1);
    this.ready = true;
  }
  async run(image){
    if(!this.ready) await this.init();
    const res = await this.worker.recognize(image);
    return res.data;
  }
}

class MemoAligner {
  static align(ocrData) {
    if (!ocrData || !ocrData.words) return "";

    // 1단계: @를 제외한 의미 없는 불필요 특수문자 파편 전면 청소
    let words = ocrData.words.map(w => {
      let txt = w.text.trim();
      txt = txt.replace(/[^a-zA-Z0-9가-힣@\s\.\,\-\~]/g, "").trim();
      if (!txt) return null;
      return { text: txt, x0: w.bbox.x0, y0: w.bbox.y0, h: w.bbox.y1 - w.bbox.y0 };
    }).filter(w => w !== null);

    if (words.length === 0) return "추출된 텍스트가 없습니다.";

    // 2단계: Y축 좌표를 분석하여 '같은 행(줄)'에 있는 단어들 묶기
    let avgHeight = words.reduce((sum, w) => sum + w.h, 0) / words.length;
    let rowThreshold = avgHeight * 0.50; // 행 판정 오차범위 타이트하게 조정
    let rows = [];

    words.sort((a, b) => a.y0 - b.y0);

    while (words.length > 0) {
      let base = words.shift();
      let currentRow = [base];

      for (let i = 0; i < words.length; i++) {
        if (Math.abs(words[i].y0 - base.y0) <= rowThreshold) {
          currentRow.push(words[i]);
          words.splice(i, 1);
          i--;
        }
      }
      // 가로(왼쪽 -> 오른쪽) 순서대로 정렬
      currentRow.sort((a, b) => a.x0 - b.x0);
      rows.push(currentRow);
    }
    rows.sort((a, b) => a[0].y0 - b[0].y0);

    // 3단계: 나란히 정렬 및 구분자 추가 (핵심)
    return rows.map(row => {
      let lineSegments = [];
      let currentSegment = row[0].text;

      for (let i = 1; i < row.length; i++) {
        let prev = row[i - 1];
        let curr = row[i];
        let dist = curr.x0 - prev.x0;

        // 같은 칸에 묶여 있는 글자인지, 완전히 다른 칸(열)으로 떨어진 글자인지 판별
        // 글자 높이 대비 가로 거리가 멀다면 새로운 열로 판단
        if (dist > avgHeight * 3.5) {
          lineSegments.push(currentSegment);
          currentSegment = curr.text;
        } else {
          // 가까운 거리는 자연스럽게 띄어쓰기로 연결
          currentSegment += " " + curr.text;
        }
      }
      lineSegments.push(currentSegment);

      // 각 열의 데이터들을 깔끔하게 "  |  " 기호로 나란히 연결
      return lineSegments
        .map(seg => seg.trim())
        .filter(seg => seg.length > 0)
        .join("   |   ");
    }).filter(line => line.trim().length > 1).join("\n");
  }
}

class App {
  constructor(){
    this.file = document.getElementById("file");
    this.preview = document.getElementById("preview");
    this.ocrEl = document.getElementById("ocr");
    this.progressContainer = document.getElementById("progressContainer");
    this.progressBar = document.getElementById("progressBar");
    this.progressText = document.getElementById("progressText");
    this.assistToolbar = document.getElementById("assistToolbar");

    this.ocr = new OCRProcessor();
    this.init();
  }

  async init(){
    await this.ocr.init();
    this.file.addEventListener("change", (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        this.preview.src = ev.target.result;
        this.currentImage = ev.target.result;
        this.assistToolbar.style.display = "none";
      };
      reader.readAsDataURL(file);
    });
  }

  async runOCR(){
    if(!this.currentImage){
      alert("이미지를 먼저 업로드해 주세요.");
      return;
    }
    const img = new Image();
    img.src = this.currentImage;
    img.onload = async ()=>{
      try {
        this.progressContainer.style.display = "block";
        this.progressBar.style.width = "30%";
        this.progressText.innerText = "이미지에서 글자 위치 분석 중...";

        const rawData = await this.ocr.run(img);
        
        this.progressBar.style.width = "80%";
        this.progressText.innerText = "열 구조 파악 및 가로 정렬 보정 중...";

        const resultMemo = MemoAligner.align(rawData);

        this.ocrEl.value = resultMemo;
        this.progressBar.style.width = "100%";
        this.progressText.innerText = "정렬 완료!";
        this.assistToolbar.style.display = "flex";

        setTimeout(() => { this.progressContainer.style.display = "none"; }, 500);
      } catch(err) {
        console.error(err);
        alert("분석 중 에러가 발생했습니다.");
        this.progressContainer.style.display = "none";
      }
    };
  }

  async copyToClipboard() {
    if (!this.ocrEl.value.trim()) return;
    await navigator.clipboard.writeText(this.ocrEl.value);
    alert("나란히 정렬된 텍스트가 클립보드에 복사되었습니다. 메모장에 붙여넣어 보세요!");
  }
}

const app = new App();
</script>

</body>
</html>
