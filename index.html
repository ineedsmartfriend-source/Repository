<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ MASTER-CLASS AI 지능형 종합 복원 메모장 V6</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #050811;
        }
        .ai-final-box {
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.7;
            letter-spacing: -0.02em;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #090f22;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1e2d5a;
            border-radius: 3px;
        }
    </style>
</head>
<body class="text-slate-200 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800/80 pb-3 shrink-0">
        <div class="flex items-center gap-2.5">
            <span class="text-xl">🦅</span>
            <div>
                <h1 class="text-sm font-bold tracking-tight bg-gradient-to-r from-cyan-400 via-teal-400 to-indigo-400 bg-clip-text text-transparent">초정밀 지능형 구조 정제 시스템 (V6 완결판)</h1>
                <p class="text-[10px] text-slate-500">Relative Gap Convergence & Purifier Ultimate Engine</p>
            </div>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 리셋</button>
    </div>

    <div class="my-3 shrink-0 relative">
        <div class="w-full h-14 bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 rounded-xl shadow-2xl flex items-center justify-center gap-3 pointer-events-none">
            <span class="text-teal-400">⚡</span>
            <span id="btn-text" class="text-xs font-semibold text-slate-300">이미지 선택 (간격 뒤틀림 · 유령 기호 전면 제거)</span>
        </div>
        <input type="file" id="image-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-2 bg-slate-900/40 rounded-lg mt-2 border border-slate-800/60">
            🟢 대기 중 (가로 찢어짐 현상 및 무분별한 특수문자 배치 오류가 원천 수정되었습니다)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-12 text-center">
            <p class="font-semibold text-slate-400 text-sm mb-1">인텔리전스 레이아웃 정제기 활성화</p>
            <p class="max-w-xs leading-relaxed text-slate-500">엉망으로 흩어진 문장 간격과 오작동 기호들을 지능적으로 결합하여 깔끔한 노트 정보로 출력합니다.</p>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('ai_master_v6_memos')) || [];
        renderMemos();

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerHTML = "⏳ <span class='text-amber-400 font-bold'>1/2: 이미지 픽셀 맵 노이즈 제거 고주파 필터링 중...</span>";
                btnText.innerText = "초정밀 분석 중...";
                imageInput.disabled = true;

                const img = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const i = new Image();
                        i.onload = () => resolve(i);
                        i.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                // 고강도 콘트라스트 및 이진화 연산 처리
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                    let v = (gray > 135) ? 255 : 0; 
                    data[i] = v; data[i+1] = v; data[i+2] = v;
                }
                ctx.putImageData(imgData, 0, 0);

                statusBar.innerHTML = "⏳ <span class='text-cyan-400 font-bold'>2/2: 상대적 갭 압축 알고리즘 및 텍스트 매핑 가동 중...</span>";
                btnText.innerText = "문장 흐름 조립 중...";

                const worker = await Tesseract.createWorker('kor+eng');
                const result = await worker.recognize(canvas);
                const words = result.data.words;
                await worker.terminate();

                if (!words || words.length === 0) {
                    statusBar.innerText = "❌ 유효 텍스트를 검출하지 못했습니다.";
                    resetInput();
                    return;
                }

                const imgWidth = canvas.width;
                const rows = [];
                // 이미지 해상도에 동적으로 비례하는 행 결합 마진 계산
                const rowThreshold = Math.max(12, img.height * 0.012); 

                // [1단계: 행 묶기 연산 및 오인식 기호 1차 차단]
                words.forEach(word => {
                    let text = word.text.trim();
                    if (!text) return;

                    // OCR 연산 중 유출되는 불필요 파편 기호 정제 제거
                    if (/^[\\|¦_~+=<>`^'""\s\[\]()]+$/.test(text) && text.length <= 2) return;

                    let yCenter = word.bbox.y0 + (word.bbox.y1 - word.bbox.y0) / 2;
                    let matchedRow = rows.find(r => Math.abs(r.yCenter - yCenter) < rowThreshold);

                    if (matchedRow) {
                        matchedRow.words.push(word);
                        matchedRow.yCenter = (matchedRow.yCenter * (matchedRow.words.length - 1) + yCenter) / matchedRow.words.length;
                    } else {
                        rows.push({ yCenter: yCenter, words: [word] });
                    }
                });

                rows.sort((a, b) => a.yCenter - b.yCenter);

                // [2단계: 가비지 레이아웃 판별 스캔]
                let totalGaps = 0;
                let wideGapCount = 0;
                let validWordPairs = 0;

                rows.forEach(row => {
                    row.words.sort((a, b) => a.bbox.x0 - b.bbox.x0);
                    for(let i = 1; i < row.words.length; i++) {
                        let gapRatio = (row.words[i].bbox.x0 - row.words[i-1].bbox.x1) / imgWidth;
                        if(gapRatio > 0.06) wideGapCount++;
                        validWordPairs++;
                    }
                });

                // 전체 문서 대비 넓은 간격 비율 계산을 통해 표/텍스트 모드 판정
                const isTableStructure = validWordPairs > 0 && (wideGapCount / validWordPairs > 0.22);
                let finalLines = [];

                // [3단계: 상대적 갭 수렴 기술을 적용한 정밀 조립 메커니즘]
                rows.forEach(row => {
                    row.words.sort((a, b) => a.bbox.x0 - b.bbox.x0);
                    
                    let lineText = "";
                    for (let i = 0; i < row.words.length; i++) {
                        let currentWord = row.words[i];
                        let txt = currentWord.text.trim();

                        if (i > 0) {
                            let prevWord = row.words[i - 1];
                            // 해상도에 무관한 절대적인 너비 대비 간격 비율 연산
                            let gapRatio = (currentWord.bbox.x0 - prevWord.bbox.x1) / imgWidth;

                            if (isTableStructure) {
                                if (gapRatio > 0.05) {
                                    lineText += " │ ";
                                } else {
                                    lineText += " ";
                                }
                            } else {
                                // 일반 문서 캡처 시 자모음 및 단어 찢어짐 현상을 근본적으로 압축 결합
                                if (gapRatio > 0.04) {
                                    lineText += " ";
                                } else if (gapRatio < 0.008) {
                                    lineText += ""; // 초미세 찢어짐 강제 밀착화
                                } else {
                                    lineText += " ";
                                }
                            }
                        }
                        lineText += txt;
                    }

                    // [4단계: 문장 내부 정규식 클리닝 기법 (유령 괄호 파괴)]
                    let cleanedLine = lineText.trim();
                    
                    // 불필요하게 침투한 대괄호 및 수직 바 기호 완전 박멸
                    cleanedLine = cleanedLine.replace(/\[\s*\|\s*\]/g, '');
                    cleanedLine = cleanedLine.replace(/\[\s*\]/g, '');
                    cleanedLine = cleanedLine.replace(/\s*│\s*$/g, '');
                    cleanedLine = cleanedLine.replace(/^\s*│\s*/g, '');
                    cleanedLine = cleanedLine.replace(/[\|¦_\^]{2,}/g, '');

                    // 리스트 불릿 기호 가독성 보정
                    if (/^[•*▪️-]\s*/.test(cleanedLine)) {
                        cleanedLine = "📍 " + cleanedLine.replace(/^[•*▪️-]\s*/, '');
                    }

                    if (cleanedLine.replace(/[│\s]/g, '').length > 1) {
                        finalLines.push(cleanedLine);
                    }
                });

                let finalProcessedResult = finalLines.join('\n').replace(/\n{3,}/g, '\n\n').trim();

                if (finalProcessedResult) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                        isTable: isTableStructure,
                        content: finalProcessedResult
                    };

                    memos.unshift(newMemo);
                    localStorage.setItem('ai_master_v6_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = `✅ 복원 성공! 가로 찢어짐을 해결하고 [${isTableStructure ? '정돈된 표 형태' : '유연한 줄글 문맥'}] 정보로 가공했습니다.`;
                } else {
                    statusBar.innerText = "❌ 노이즈 필터링 후 남은 유효 데이터가 없습니다.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 분석 중 예외 오류 발생: " + err.message;
            } finally {
                resetInput();
            }
        });

        function resetInput() {
            imageInput.disabled = false;
            btnText.innerText = "이미지 선택 (간격 뒤틀림 · 유령 기호 전면 제거)";
            imageInput.value = "";
        }

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('모든 추출 기록을 삭제하시겠습니까?')) {
                memos = [];
                localStorage.removeItem('ai_master_v6_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 저장 공간이 초기화되었습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('ai_master_v6_memos', JSON.stringify(memos));
            renderMemos();
        }

        function renderMemos() {
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                return;
            }
            emptyState.style.display = 'none';

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-900/70 border border-slate-800/90 p-4 rounded-xl relative mb-4";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-2.5 border-b border-slate-800/60 pb-2">
                        <span class="text-xs ${m.isTable ? 'text-cyan-400' : 'text-emerald-400'} font-bold tracking-wider">
                            ${m.isTable ? '📊 STRUCTURED GRID SMART' : '📝 CLEAN FLOW NOTE'} [${m.time}]
                        </span>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-600 hover:text-rose-400 px-1">✕</button>
                    </div>
                    <div class="bg-slate-950/90 p-4 rounded-lg border border-slate-900/80 shadow-inner">
                        <p class="ai-final-box text-xs md:text-sm text-slate-300 select-text cursor-text leading-relaxed">${m.content}</p>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
