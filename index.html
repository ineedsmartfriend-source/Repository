<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Precision Layout OCR Memo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Pretendard:wght@400;600&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
        }
        /* 위치 왜곡을 막기 위해 간격이 완벽히 균일한 고정폭(Monospace) 폰트 사용 */
        .monospace-layout {
            font-family: 'Fira Code', monospace;
            white-space: pre;
            letter-spacing: 0px;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 2px;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800 pb-3 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl">🎯</span>
            <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent">초정밀 위치 매핑 메모장</h1>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 삭제</button>
    </div>

    <div class="my-3 space-y-2 shrink-0">
        <input type="file" id="image-input" accept="image/*" class="hidden">
        
        <button id="upload-btn" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 active:scale-[0.98] text-white font-bold py-4 px-4 rounded-xl shadow-lg transition-all text-sm flex items-center justify-center gap-2">
            <span>🎯</span>
            <span id="btn-text">캡처 선택 (원본 위치 그대로 추출)</span>
        </button>

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-1.5 bg-slate-800/50 rounded-md">
            🟢 스탠바이 (글자 간의 기하학적 배치를 정밀 분석합니다)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-10">
            <p>원본 레이아웃 유지가 필요한 화면을 캡처한 후</p>
            <p class="mt-1">상단 버튼을 눌러 사진을 고르면 빈칸 비율까지 맞춰 복사합니다.</p>
        </div>
    </div>

    <script>
        const uploadBtn = document.getElementById('upload-btn');
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('my_precision_memos')) || [];
        
        renderMemos();

        uploadBtn.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerText = "⏳ 이미지 캔버스 매핑 중...";
                btnText.innerText = "위치 스캔 중...";
                uploadBtn.disabled = true;

                statusBar.innerText = "📐 글자별 좌표 분석 및 공간 비율 계산 중...";
                const result = await Tesseract.recognize(file, 'kor', {
                    logger: m => {
                        if(m.status === 'recognizing') {
                            statusBar.innerText = `🎯 위치 고정 매핑 중... (${Math.floor(m.progress * 100)}%)`;
                        }
                    }
                });

                const words = result.data.words;
                // 가로 너비를 기준으로 띄어쓰기 칸수를 계산하기 위해 이미지 전체 너비 확보
                const pageWidth = result.data.blocks[0]?.paragraphs[0]?.lines[0]?.bbox.x1 * 1.2 || 1000; 

                if (words.length === 0) {
                    statusBar.innerText = "❌ 인식된 텍스트가 없습니다.";
                    uploadBtn.disabled = false;
                    btnText.innerText = "캡처 선택 (원본 위치 그대로 추출)";
                    return;
                }

                // 1. 단어들을 Y축 위치 기준으로 정렬
                words.sort((a, b) => a.bbox.y0 - b.bbox.y0);

                const rows = [];
                let currentSrcRow = [words[0]];

                for (let i = 1; i < words.length; i++) {
                    const currentWord = words[i];
                    const lastWordInRow = currentSrcRow[currentSrcRow.length - 1];
                    // 글자 높이의 70% 이내에 있으면 같은 줄(행)로 묶음
                    const rowHeight = lastWordInRow.bbox.y1 - lastWordInRow.bbox.y0;

                    if (currentWord.bbox.y0 - lastWordInRow.bbox.y0 <= rowHeight * 0.7) {
                        currentSrcRow.push(currentWord);
                    } else {
                        rows.push(currentSrcRow);
                        currentSrcRow = [currentWord];
                    }
                }
                rows.push(currentSrcRow);

                // 2. 가로(X축) 좌표 정보에 비례하여 실제 "공백 글자(Space)" 채워넣기
                let finalFormattedText = "";
                // 고정폭 단어 너비 기준값 계산 (대략적인 글자당 해상도 너비 비율)
                const charWidthUnit = pageWidth / 65; 

                rows.forEach(row => {
                    row.sort((a, b) => a.bbox.x0 - b.bbox.x0); // 왼쪽 단어부터 정렬
                    
                    let rowStr = "";
                    let currentPosition = 0;

                    row.forEach(word => {
                        // 이미지 좌측 끝 혹은 이전 단어 끝에서부터 현재 단어 시작점까지의 물리적 거리 계산
                        const targetCharPos = Math.round(word.bbox.x0 / charWidthUnit);
                        
                        // 계산된 거리만큼 공백(' ')을 채워 넣어 위치를 밀어줌
                        if (targetCharPos > currentPosition) {
                            rowStr += " ".repeat(targetCharPos - currentPosition);
                            currentPosition = targetCharPos;
                        }

                        rowStr += word.text;
                        // 한글/영문 글자 수에 맞춰 현재 포지션 업데이트 (한글은 대략 1.7칸, 영문숫자는 1칸 차지로 보정)
                        const korCount = (word.text.match(/[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/g) || []).length;
                        const otherCount = word.text.length - korCount;
                        currentPosition += Math.round((korCount * 1.6) + (otherCount * 0.9));
                    });

                    finalFormattedText += rowStr + "\n";
                });

                if (finalFormattedText.trim()) {
                    const newMemo = {
                        id: Date.now(),
                        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                        content: finalFormattedText
                    };
                    memos.unshift(newMemo);
                    localStorage.setItem('my_precision_memos', JSON.stringify(memos));
                    renderMemos();
                    statusBar.innerText = "✅ 원본 레이아웃 그대로 저장되었습니다!";
                } else {
                    statusBar.innerText = "❌ 변환에 실패했습니다.";
                }

            } catch (err) {
                console.error(err);
                statusBar.innerText = "❌ 오류: " + err.message;
            } finally {
                uploadBtn.disabled = false;
                btnText.innerText = "캡처 선택 (원본 위치 그대로 추출)";
                imageInput.value = "";
            }
        });

        clearAllBtn.addEventListener('click', () => {
            if(memos.length === 0) return;
            if(confirm('모든 메모를 삭제하시겠습니까?')) {
                memos = [];
                localStorage.removeItem('my_precision_memos');
                renderMemos();
                statusBar.innerText = "🗑️ 모든 메모가 삭제되었습니다.";
            }
        });

        window.deleteMemo = function(id) {
            memos = memos.filter(m => m.id !== id);
            localStorage.setItem('my_precision_memos', JSON.stringify(memos));
            renderMemos();
            statusBar.innerText = "🗑️ 선택한 메모가 삭제되었습니다.";
        }

        function renderMemos() {
            if (memos.length === 0) {
                emptyState.style.display = 'flex';
                const items = memoList.querySelectorAll('.memo-item');
                items.forEach(el => el.remove());
                return;
            }
            
            emptyState.style.display = 'none';
            const items = memoList.querySelectorAll('.memo-item');
            items.forEach(el => el.remove());

            memos.forEach(m => {
                const memoDiv = document.createElement('div');
                memoDiv.className = "memo-item bg-slate-800/40 border border-slate-700/40 p-3 rounded-lg relative transition-all hover:border-slate-600";
                memoDiv.innerHTML = `
                    <div class="flex justify-between items-start mb-2 border-b border-slate-800 pb-1">
                        <span class="text-[10px] text-slate-500 font-bold">${m.time} [원본 1:1 매핑 완료]</span>
                        <button onclick="deleteMemo(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 px-1">✕</button>
                    </div>
                    <div class="overflow-x-auto custom-scrollbar whitespace-pre py-1 bg-slate-950/60 p-2 rounded border border-slate-900">
                        <p class="monospace-layout text-xs text-cyan-400 leading-relaxed select-text cursor-text">${m.content}</p>
                    </div>
                `;
                memoList.appendChild(memoDiv);
            });
        }
    </script>
</body>
</html>
