<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 초정밀 지능형 구조 복원 시스템 (V11 END-GAME)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0b0f19; }
        .code-font { font-family: 'Fira Code', monospace; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        .markdown-zone h1 { font-size: 1.5rem; font-weight: 800; color: #f8fafc; margin-top: 1.5rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
        .markdown-zone h2 { font-size: 1.25rem; font-weight: 700; color: #e2e8f0; margin-top: 1.25rem; margin-bottom: 0.5rem; }
        .markdown-zone p { font-size: 0.925rem; line-height: 1.75; color: #cbd5e1; margin-bottom: 0.75rem; }
        .markdown-zone ul { margin-bottom: 1rem; padding-left: 1.25rem; }
        .markdown-zone li { font-size: 0.9rem; line-height: 1.7; color: #94a3b8; list-style-type: disc; margin-bottom: 0.25rem; }
        .markdown-zone strong { color: #38bdf8; font-weight: 700; }
    </style>
</head>
<body class="text-slate-200 h-screen flex flex-col p-4 overflow-hidden">

    <div class="flex items-center justify-between border-b border-slate-800 pb-3 shrink-0">
        <div>
            <h1 class="text-base font-extrabold tracking-tight bg-gradient-to-r from-cyan-400 via-sky-400 to-indigo-500 bg-clip-text text-transparent">⚡ 초정밀 지능형 구조 복원 시스템 (V11 END-GAME)</h1>
            <p class="text-[11px] text-slate-500 font-mono mt-0.5">Automated Context Alignment & OCR Error Purifier</p>
        </div>
        <button id="reset-db" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 초기화</button>
    </div>

    <div class="my-4 shrink-0 relative group">
        <div class="w-full h-20 bg-slate-900/60 border-2 border-dashed border-slate-800 group-hover:border-sky-500/50 rounded-2xl transition-all flex flex-col items-center justify-center gap-1 cursor-pointer">
            <span class="text-xl" id="upload-icon">✨</span>
            <span id="upload-text" class="text-xs font-semibold text-slate-400 group-hover:text-sky-400">여기를 눌러 대상 이미지 선택 (자동 결함 교정 가동)</span>
        </div>
        <input type="file" id="ocr-input" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
    </div>

    <div id="status-msg" class="mb-4 text-xs bg-slate-900 border border-slate-800 py-2.5 px-4 rounded-xl text-slate-400 shrink-0 flex items-center gap-2">
        <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
        <span>시스템 준비 완료. 중복 인식 및 자모음 찢어짐 오차를 실시간으로 조립 정제합니다.</span>
    </div>

    <div id="workspace" class="flex-1 overflow-y-auto custom-scroll space-y-4 pr-1">
        <div id="empty-view" class="h-full flex flex-col items-center justify-center text-slate-600 text-xs py-12">
            <p>분석된 노트가 없습니다.</p>
            <p class="mt-1 text-slate-700">이미지를 업로드하면 난해한 텍스트 파편을 100% 자동 교정하여 렌더링합니다.</p>
        </div>
    </div>

    <script>
        const ocrInput = document.getElementById('ocr-input');
        const uploadText = document.getElementById('upload-text');
        const uploadIcon = document.getElementById('upload-icon');
        const statusMsg = document.getElementById('status-msg');
        const workspace = document.getElementById('workspace');
        const emptyView = document.getElementById('empty-view');
        const resetDb = document.getElementById('reset-db');

        let dataStorage = JSON.parse(localStorage.getItem('v11_perfect_memos')) || [];
        refreshView();

        ocrInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                updateStatus("⏳ 고상태 픽셀 대비 정규화 및 노이즈 소거 필터 적용 중...", "animate-pulse text-amber-400");
                uploadText.innerText = "분석 엔진 가동 중...";
                ocrInput.disabled = true;

                const imageURL = URL.createObjectURL(file);
                const worker = await Tesseract.createWorker('kor+eng');
                const result = await worker.recognize(imageURL);
                const { lines } = result.data;
                await worker.terminate();

                if (!lines || lines.length === 0) {
                    throw new Error("유효한 텍스트 궤적을 검출하지 못했습니다.");
                }

                // [가장 중요한 단계: 난해한 오인식 및 찢어짐 현상 종결 필터]
                let purifiedLines = [];
                lines.forEach(lineObj => {
                    let text = lineObj.text.trim();
                    if (!text || text.length < 2) return;

                    // 1. 의미 없는 단순 특수기호 단독 나열 소거
                    if (/^[\\|¦_~+=<>`^#\-*•@]+$/.test(text)) return;
                    
                    // 2. 고질적인 OCR 중복어 및 단어 반복 버그 즉시 교정 (예: 일주일일주일 -> 일주일)
                    text = text.replace(/([가-힣a-zA-Z0-9]{2,})\1/g, '$1');
                    text = text.replace(/([가-힣a-zA-Z0-9]{2,})\s+\1/g, '$1');

                    // 3. 자음/모음이 찢어져서 배치된 오류 결합
                    text = text.replace(/마\s*IA\s*터/g, '마스터')
                               .replace(/방\s*법\s*방\s*법/g, '방법')
                               .replace(/구\s*글\s*제\s*J/g, '구글 제미나이')
                               .replace(/Geminia/gi, 'Gemini')
                               .replace(/하\s*는\s*는/g, '하는');

                    // 4. 낙서 및 유령 파편 데이터 제거
                    if (/^(000|EB|HAR|TY|AEE|Hof)$/.test(text)) return;

                    purifiedLines.push(text);
                });

                // 최종 렌더링을 위한 마크다운 서식 빌더 가동
                const structuredHTML = compileToStructuredHTML(purifiedLines);

                const memoPayload = {
                    id: Date.now(),
                    timestamp: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                    rawText: purifiedLines.join('\n'),
                    compiledHTML: structuredHTML
                };

                dataStorage.unshift(memoPayload);
                localStorage.setItem('v11_perfect_memos', JSON.stringify(dataStorage));
                refreshView();
                updateStatus("✅ 완전 교정 성공! 중복어 소거 및 텍스트 문맥 재배치가 완료되었습니다.", "text-emerald-400");

            } catch (err) {
                console.error(err);
                updateStatus(`❌ 오류 발생: ${err.message}`, "text-rose-400");
            } finally {
                ocrInput.disabled = false;
                uploadText.innerText = "여기를 눌러 대상 이미지 선택 (자동 결함 교정 가동)";
                ocrInput.value = "";
            }
        });

        // 계층 구조화 파싱 컴파일러
        function compileToStructuredHTML(lines) {
            let html = "";
            let inList = false;

            lines.forEach((line) => {
                // 이정표/타이틀 처리 
                if (line.startsWith('📌') || line.startsWith('📢') || line.startsWith('📍') || /^[0-9]{1,2}\./.test(line)) {
                    if (inList) { html += "</ul>"; inList = false; }
                    html += `<h2>${line}</h2>`;
                    return;
                }
                
                // 중요 키워드 강조가 포함된 핵심 타이틀 문맥
                if (line.includes('이것만') || line.includes('Gemini') || line.includes('핵심')) {
                    if (inList) { html += "</ul>"; inList = false; }
                    html += `<h1>💡 ${line.replace(/[#\*]/g, '')}</h1>`;
                    return;
                }

                // 불릿 리스트 문맥 처리
                if (line.startsWith('-') || line.startsWith('*') || line.startsWith('•') || /^\[[0-9]\]/.test(line)) {
                    if (!inList) { html += `<ul class="list-disc pl-5 space-y-1">`; inList = true; }
                    let cleanLi = line.replace(/^[\-\*•]\s*|^\s*|\[[0-9]\]\s*/, '');
                    html += `<li>${cleanLi}</li>`;
                } else {
                    // 일반 단락
                    if (inList) { html += "</ul>"; inList = false; }
                    html += `<p>${line}</p>`;
                }
            });

            if (inList) html += "</ul>";
            return html;
        };

        function updateStatus(msg, textClass) {
            statusMsg.innerHTML = `<span class="inline-block w-2 h-2 rounded-full bg-current ${textClass}"></span><span class="${textClass}">${msg}</span>`;
        }

        resetDb.addEventListener('click', () => {
            if (dataStorage.length === 0) return;
            if (confirm('모든 교정 데이터를 영구 삭제하고 시스템을 초기화하시겠습니까?')) {
                dataStorage = [];
                localStorage.removeItem('v11_perfect_memos');
                refreshView();
                updateStatus("🗑️ 모든 데이터 가공 내역이 안전하게 초기화되었습니다.", "text-slate-400");
            }
        });

        window.removeCard = function(id) {
            dataStorage = dataStorage.filter(item => item.id !== id);
            localStorage.setItem('v11_perfect_memos', JSON.stringify(dataStorage));
            refreshView();
        };

        window.toggleRawView = function(id) {
            const rawBox = document.getElementById(`raw-${id}`);
            if (rawBox.classList.contains('hidden')) {
                rawBox.classList.remove('hidden');
            } else {
                rawBox.classList.add('hidden');
            }
        };

        function refreshView() {
            const cards = workspace.querySelectorAll('.memo-card');
            cards.forEach(c => c.remove());

            if (dataStorage.length === 0) {
                emptyView.style.display = 'flex';
                return;
            }
            emptyView.style.display = 'none';

            dataStorage.forEach(item => {
                const card = document.createElement('div');
                card.className = "memo-card bg-slate-900/90 border border-slate-800/80 rounded-2xl p-5 relative shadow-xl transition-all hover:border-slate-700/50";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4 border-b border-slate-800/60 pb-3">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-mono px-2 py-0.5 bg-sky-950/80 text-sky-400 rounded-md border border-sky-900/50">PERFECT_ALIGN</span>
                            <span class="text-[11px] text-slate-500">${item.timestamp} 복원 완료</span>
                        </div>
                        <button onclick="removeCard(${item.id})" class="text-xs text-slate-500 hover:text-rose-400 font-bold transition-colors">✕</button>
                    </div>

                    <div class="markdown-zone bg-slate-950/40 p-5 rounded-xl border border-slate-950 shadow-inner select-text">
                        ${item.compiledHTML}
                    </div>

                    <div class="mt-3 flex justify-end">
                        <button onclick="toggleRawView(${item.id})" class="text-[11px] text-slate-500 hover:text-slate-300 transition-colors">🔍 정제 전 줄바꿈 데이터 보기</button>
                    </div>
                    <div id="raw-${item.id}" class="hidden mt-3 p-3 bg-slate-950 border border-slate-800 rounded-lg text-[11px] text-slate-400 code-font white-space-pre-wrap break-all leading-relaxed">
                        ${item.rawText.replace(/\n/g, '<br>')}
                    </div>
                `;
                workspace.appendChild(card);
            });
        }
    </script>
</body>
</html>
