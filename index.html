<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Smart Table Grid OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 2px;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col h-screen p-4 overflow-hidden select-none">

    <div class="flex items-center justify-between border-b border-slate-800 pb-2 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl">📊</span>
            <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent">스마트 표 구조 OCR 메모장</h1>
        </div>
        <button id="clear-all-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">전체 삭제</button>
    </div>

    <div class="my-3 space-y-2 shrink-0">
        <input type="file" id="image-input" accept="image/*" class="hidden">
        
        <button id="upload-btn" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 active:scale-[0.98] text-white font-bold py-4 px-4 rounded-xl shadow-lg transition-all text-sm flex items-center justify-center gap-2">
            <span>📊</span>
            <span id="btn-text">표 캡처 선택 (줄·칸 매핑 추출)</span>
        </button>

        <div id="status-bar" class="text-[11px] text-center text-slate-400 py-1.5 bg-slate-800/50 rounded-md">
            🟢 스탠바이 (표의 열과 행 위치를 감지하여 어휘를 정렬합니다)
        </div>
    </div>

    <div id="memo-list" class="flex-1 min-h-0 space-y-4 overflow-y-auto custom-scrollbar pr-1 pb-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs py-10">
            <p>표 또는 리스트 캡처 이미지를 선택하면,</p>
            <p class="mt-1">칸을 구분하여 보기 편한 텍스트 리스트로 가공합니다.</p>
        </div>
    </div>

    <script>
        const uploadBtn = document.getElementById('upload-btn');
        const imageInput = document.getElementById('image-input');
        const btnText = document.getElementById('btn-text');
        const memoList = document.getElementById('memo-list');
        const emptyState = document.getElementById('empty-state');
        const statusBar = document.getElementById('status-bar');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let memos = JSON.parse(localStorage.getItem('my_grid_table_memos')) || [];
        
        renderMemos();

        uploadBtn.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                statusBar.innerText = "⏳ 이미지 격자 분석 중...";
                btnText.innerText = "구조 스캔 중...";
                uploadBtn.disabled = true;

                // 정밀 OCR 스캔 시작
                const result = await Tesseract.recognize(file, 'kor');
                const words = result.data.words;

                if (words.length === 0) {
                    statusBar.innerText = "❌ 인식된 텍스트가 없습니다.";
                    uploadBtn.disabled = false;
                    btnText.innerText = "표 캡처 선택 (줄·칸 매핑 추출)";
                    return;
                }

                // 1단계: 무의미한 단일 특수문자, 깨진 자모음 노이즈 1차 청소
                const cleanWords = words.filter(w => {
                    const txt = w.text.trim();
                    if (/^[.,\-_=|*+:^~'""`‘’“”()\[\]{}<>!?•·]+$/.test(txt)) return false;
                    if (/^[ㄱ-ㅎㅏ-ㅣ]$/.test(txt)) return false;
                    if (txt.length === 1 && /^[a-zA-Z0-9]$/.test(txt) && !/^\d$/.test(txt)) return false; // 1글자짜리 영문 노이즈 제거
                    return true;
                });

                // 2단계: Y축 위치 기준으로 정렬하여 '행(Row)' 만들기
                cleanWords.sort((a, b) => a.bbox.y0 - b.bbox.y0);
                
                const rows = [];
                let currentSrcRow = [cleanWords[0]];

                for (let i = 1; i < cleanWords.length; i++) {
                    const currentWord = cleanWords[i];
                    const lastWordInRow = currentSrcRow[currentSrcRow.length - 1];
                    const rowHeight = lastWordInRow.bbox.y1 - lastWordInRow.bbox.y0;

                    // 줄 간격 오차 범위 내에 있으면 같은 줄로 묶음
                    if (currentWord.bbox.y0 - lastWordInRow.bbox.y0 <= rowHeight * 0.7) {
                        currentSrcRow.push(currentWord);
                    } else {
                        rows.push(currentSrcRow);
                        currentSrcRow = [currentWord];
                    }
                }
                rows.push(currentSrcRow);

                // 3단계: 각 행 내부에서 X축(가로) 기준으로 정렬하고, 멀리 떨어진 글자는 대형 탭 간격 부여
                let finalOutputText = "";

                rows.forEach(row => {
                    row.sort((a, b) => a.bbox.x0 - b.bbox.x0); // 왼쪽 칸부터 정렬
                    
                    let rowStr = "";
                    for (let j = 0; j < row.length; j++) {
                        if (j > 0) {
                            const gap = row[j].bbox.x0 - row[j-1].bbox.x1;
                            
                            // 원본 표의 컬럼(칸) 구분을 위해 단어 간격이 크게 벌어진 경우 분리 기호 추가
                            if (gap > 28) {
                                rowStr += "  │  "; 
                            } else {
                                // 단어 내부 혹은 붙어있는 문장은 부드럽게 한 칸 공백 연결 (어휘 보존)
