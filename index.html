<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>OCR AI Studio FIXED</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f1115;
  color:#fff;
}

header{
  padding:12px;
  background:#171a21;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:12px;
  display:grid;
  gap:10px;
}

.card{
  background:#171a21;
  padding:10px;
  border-radius:10px;
}

textarea,input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #333;
  background:#0f1115;
  color:#fff;
  box-sizing: border-box;
}

button{
  background:#4f8cff;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-top:6px;
}

img{
  max-width:100%;
  margin-top:10px;
}

/* 전체보기 모달 스타일 */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.8);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #171a21;
  padding: 20px;
  border-radius: 12px;
  width: 85%;
  max-width: 600px;
  max-height: 80%;
  overflow-y: auto;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  position: relative;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #333;
  padding-bottom: 10px;
  margin-bottom: 15px;
}

.modal-header h3 {
  margin: 0;
}

.close-btn {
  background: #ff4f4f;
  margin-top: 0;
}

.modal-body {
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.6;
}
</style>
</head>

<body>

<header>
  <div>OCR AI Studio FIXED (좌상단 정렬 & 문맥 결합판)</div>
</header>

<div class="container">

  <div class="card">
    <input type="file" id="file">
    <img id="preview"/>
  </div>

  <div class="card">
    <button onclick="app.runOCR()">OCR 실행 및 공간 문맥 교정</button>
  </div>

  <div class="card">
    <h3>OCR 결과 (좌상단 배치 및 문맥 복원 완료)</h3>
    <textarea id="ocr" rows="12"></textarea>
    <button onclick="app.viewFull('교정된 OCR 결과', 'ocr')">전체보기</button>
  </div>

  <div class="card">
    <h3>Summary</h3>
    <textarea id="summary" rows="3"></textarea>
    <button onclick="app.viewFull('Summary 결과', 'summary')">전체보기</button>
  </div>

  <div class="card">
    <h3>Keywords</h3>
    <textarea id="keywords" rows="2"></textarea>
    <button onclick="app.viewFull('Keywords 결과', 'keywords')">전체보기</button>
  </div>

  <div class="card">
    <h3>Title</h3>
    <input id="title"/>
    <button onclick="app.viewFull('Title 결과', 'title')">전체보기</button>
  </div>

</div>

<div id="fullViewModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">타이틀</h3>
      <button class="close-btn" onclick="app.closeModal()">닫기</button>
    </div>
    <div id="fullViewModalBody" class="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>

/* =========================
   OCR ENGINE (공간 좌표 데이터 추출)
========================= */
class OCR {
  constructor(){
    this.worker = null;
    this.ready = false;
  }

  async init(){
    this.worker = await Tesseract.createWorker("kor+eng+jpn+chi_sim+chi_tra", 1, {
      logger: m => console.log(m)
    });
    this.ready = true;
  }

  async run(image){
    if(!this.ready){
      await this.init();
    }
    // 문자의 세부 좌표와 블록 정보까지 받아오도록 최적화
    const res = await this.worker.recognize(image);
    return res.data;
  }
}

/* =========================
   SIMPLE AI (LOCAL) - 공간 재배치 및 의미론적 문장 결합
========================= */
class AI {

  // 1. 이미지 상의 좌상단(Top-Left) 좌표를 기준으로 우측 및 아래 방향으로 텍스트 정렬 및 결합
  static processSpatialLayout(ocrData) {
    if (!ocrData || !ocrData.words) return "";

    // 유효한 단어 객체들만 추출 및 정제
    let words = ocrData.words.map(w => ({
      text: w.text.trim(),
      x: w.bbox.x0,
      y: w.bbox.y0,
      h: w.bbox.y1 - w.bbox.y0
    })).filter(w => w.text.length > 0);

    if (words.length === 0) return "";

    // 행(Line) 구분을 위한 임계값 (글자 평균 높이의 50% 수준을 기준점 설정)
    let avgHeight = words.reduce((sum, w) => sum + w.h, 0) / words.length;
    let rowThreshold = avgHeight * 0.5;

    let lines = [];

    // 좌상단 정렬을 위한 좌표 기반 2단계 정렬 수행
    while (words.length > 0) {
      // 가장 상단(y가 가장 작은 값 = 최좌상단 기준점)의 단어를 선택
      words.sort((a, b) => a.y - b.y || a.x - b.x);
      let currentWord = words.shift();
      let currentLine = [currentWord];

      // 동일한 행선상(우측 방향)에 위치한 단어들을 검색 및 매칭
      for (let i = 0; i < words.length; i++) {
        if (Math.abs(words[i].y - currentWord.y) <= rowThreshold) {
          currentLine.push(words[i]);
          words.splice(i, 1);
          i--;
        }
      }

      // 찾아낸 한 행의 단어들을 왼쪽에서 오른쪽(x 기준 오름차순)으로 최종 정렬
      currentLine.sort((a, b) => a.x - b.x);
      lines.push({
        y: currentWord.y,
        text: currentLine.map(w => w.text).join(" ")
      });
    }

    // 최종적으로 위에서 아래로(y 오름차순) 전체 행들을 정렬 및 조합
    lines.sort((a, b) => a.y - b.y);
    
    // 구조가 잡힌 텍스트 배열을 문맥 필터로 전달
    return this.cleanAndGlueContext(lines.map(l => l.text));
  }

  // 2. 파편화된 자소/기호 정제 및 끊긴 단어/문맥 결합 엔진
  static cleanAndGlueContext(textLines) {
    let cleanedLines = textLines.map(line => {
      let l = line.trim();
      
      // 단독으로 생성된 악성 특수문자 노이즈 라인 완전 무시 및 청소
      if (/^[\\\/•\.\*\-\+\s¢®©=\|?:\(\)\[\]{}’”"‘'<>«»;_·]{1,6}$/.test(l)) return "";
      
      // 문장 시작부에 파편화되어 붙어있는 불필요 기호 정규식 제거
      l = l.replace(/^[@®©•\*\-\+\s\d\/\d\|?=《<«]+/g, "").trim(); 
      // 글자 사이에 난입한 오타 유발용 특수부호 제거
      l = l.replace(/[\\\/\|¢\+=¢®©«»]/g, ""); 

      return l;
    }).filter(line => line.length > 0);

    let finalContext = [];
    
    // 문맥 중심의 유기적 문장 구성 알고리즘
    for (let i = 0; i < cleanedLines.length; i++) {
      let current = cleanedLines[i];
      
      // 스크린샷처럼 띄어쓰기가 비정상적으로 조각난 고정 형태 사전 대응 매핑
      current = current.replace(/할 일 을/g, "할 일을");
      current = current.replace(/정 학 히/g, "정확히");
      current = current.replace(/지 시 하기/g, "지시하기");
      current = current.replace(/달 사시/g, "달성 시");
      current = current.replace(/시 활용/g, "AI 활용");
      current = current.replace(/fee/gi, "비용(Fee)");

      // 이전 문장이 완성형 문장 기호 없이 끊어졌거나 
      // 현재 문장이 조사('을', '를', '에서' 등)로 연결되는 경우 앞줄에 접착
      if (i > 0 && finalContext.length > 0) {
        let prev = finalContext[finalContext.length - 1];
        
        if (!/[\.!\?]$/.test(prev) && /^[을를은는이가에과와고로에서만도]/.test(current)) {
          finalContext[finalContext.length - 1] = prev + " " + current;
          continue;
        }
      }
      finalContext.push(current);
    }

    return finalContext.join("\n");
  }

  static summary(text){
    if(!text) return "요약할 내용이 없습니다.";
    const lines = text.split("\n");
    return lines.slice(0, 3).join("\n");
  }

  static keywords(text){
    const words = text.toLowerCase().match(/[a-z가-힣一-龥ぁ-んァ-ヶ]{2,}/g) || [];
    const map = {};

    words.forEach(w=>{
      map[w] = (map[w]||0)+1;
    });

    const stopWords = ["현재", "또는", "대해", "이것", "함께", "각각", "조건"];

    return Object.entries(map)
      .filter(([word]) => !stopWords.includes(word))
      .sort((a,b)=>b[1]-a[1])
      .slice(0,6)
      .map(x=>x[0])
      .join(", ");
  }

  static title(text){
    const firstLine = text.split("\n")[0];
    return firstLine ? firstLine.slice(0, 30) : "공간 정렬 분석 문서";
  }
}

/* =========================
   APPFLOW
========================= */
class App {

  constructor(){
    this.file = document.getElementById("file");
    this.preview = document.getElementById("preview");

    this.ocrEl = document.getElementById("ocr");
    this.summaryEl = document.getElementById("summary");
    this.keywordEl = document.getElementById("keywords");
    this.titleEl = document.getElementById("title");

    this.modal = document.getElementById("fullViewModal");
    this.modalBody = document.getElementById("fullViewModalBody");

    this.ocr = new OCR();
    this.init();
  }

  async init(){
    await this.ocr.init();

    this.file.addEventListener("change", (e)=>{
      const file = e.target.files[0];
      if(!file) return;

      const reader = new FileReader();
      reader.onload = (ev)=>{
        this.preview.src = ev.target.result;
        this.currentImage = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    this.modal.addEventListener("click", (e) => {
      if(e.target === this.modal) this.closeModal();
    });
  }

  async runOCR(){
    if(!this.currentImage){
      alert("이미지를 먼저 선택하세요");
      return;
    }

    const img = new Image();
    img.src = this.currentImage;

    img.onload = async ()=>{
      try {
        const rawOcrData = await this.ocr.run(img);
        const processedText = AI.processSpatialLayout(rawOcrData);

        this.ocrEl.value = processedText;
        this.summaryEl.value = AI.summary(processedText);
        this.keywordEl.value = AI.keywords(processedText);
        this.titleEl.value = AI.title(processedText);

      } catch(err){
        console.error(err);
        alert("OCR 및 공간 문맥 정렬 분석 중 오류가 발생했습니다.");
      }
    };
  }

  viewFull(title, elementId) {
    const targetElement = document.getElementById(elementId);
    if (!targetElement || !targetElement.value.trim()) {
      alert("표시할 내용이 없습니다.");
      return;
    }
    
    document.getElementById("modalTitle").innerText = title;
    this.modalBody.innerText = targetElement.value;
    this.modal.style.display = "flex";
  }

  closeModal() {
    this.modal.style.display = "none";
  }
}

const app = new App();
</script>

</body>
</html>
