<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>OCR AI Studio FULL</title>

<style>
:root{
  --bg:#0f1115;
  --panel:#171a21;
  --text:#e6e6e6;
  --accent:#4f8cff;
  --border:#2a2f3a;
}

*{box-sizing:border-box;font-family:system-ui;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:12px;
  background:var(--panel);
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}

.container{
  padding:12px;
  display:grid;
  gap:10px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
}

textarea,input{
  width:100%;
  padding:8px;
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
}

button{
  background:var(--accent);
  border:none;
  color:#fff;
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

@media(max-width:768px){
  .row{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div>OCR AI Studio FULL</div>
  <button onclick="app.downloadSelf()">📥 HTML</button>
</header>

<div class="container">

  <div class="card">
    <input type="file" id="file">
  </div>

  <div class="card">
    <h3>OCR</h3>
    <textarea id="ocr"></textarea>
  </div>

  <div class="card">
    <h3>Summary</h3>
    <textarea id="summary"></textarea>
  </div>

  <div class="card">
    <h3>Keywords</h3>
    <textarea id="keywords"></textarea>
  </div>

  <div class="card">
    <h3>Title</h3>
    <input id="title">
  </div>

  <div class="card row">
    <button onclick="app.save()">Save</button>
    <button onclick="app.exportMD()">MD</button>
    <button onclick="app.exportTXT()">TXT</button>
    <button onclick="app.exportPDF()">PDF</button>
  </div>

  <div class="card">
    <input id="search" placeholder="search">
    <button onclick="app.search()">Search</button>
    <div id="list"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

/* ---------------- OCR ---------------- */
class OCR{
  constructor(onProgress){
    this.onProgress=onProgress;
  }

  async init(){
    this.worker=await Tesseract.createWorker();
    await this.worker.loadLanguage("eng+kor");
    await this.worker.initialize("eng+kor");
  }

  async run(img){
    const r=await this.worker.recognize(img,{},{
      logger:m=>{
        if(m.status==="recognizing text"){
          this.onProgress?.(m.progress*100);
        }
      }
    });
    return r.data.text;
  }
}

/* ---------------- POST ---------------- */
class Post{
  static clean(t){
    return (t||"")
      .replace(/-\n/g,"")
      .replace(/\n+/g,"\n")
      .trim();
  }
}

/* ---------------- AI ---------------- */
class AI{
  static summary(t){
    return t.split(/[.?\n]/).slice(0,3).join(".");
  }

  static keywords(t){
    const w=t.toLowerCase().match(/[a-z가-힣]{2,}/g)||[];
    const f={};
    w.forEach(x=>f[x]=(f[x]||0)+1);
    return Object.entries(f).sort((a,b)=>b[1]-a[1]).slice(0,8).map(x=>x[0]).join(",");
  }

  static title(t){
    return t.split(/\n/)[0]?.slice(0,40)||"doc";
  }
}

/* ---------------- EXPORT ---------------- */
class Exporter{
  static md(t,o,s,k){
    const md=`# ${t}\n\n## OCR\n${o}\n\n## Summary\n${s}\n\n## Keywords\n${k}`;
    this.download("doc.md",md);
  }

  static txt(t,o,s,k){
    this.download("doc.txt",`${t}\n\n${o}\n\n${s}\n\n${k}`);
  }

  static pdf(t,o,s,k){
    const el=document.createElement("div");
    el.innerHTML=`<h1>${t}</h1><p>${o}</p><p>${s}</p><p>${k}</p>`;
    html2pdf().from(el).save("doc.pdf");
  }

  static download(n,c){
    const b=new Blob([c],{type:"text/plain"});
    const u=URL.createObjectURL(b);
    const a=document.createElement("a");
    a.href=u;a.download=n;a.click();
  }
}

/* ---------------- DB ---------------- */
class DB{
  async init(){
    return new Promise(res=>{
      const r=indexedDB.open("ocr_full",1);
      r.onupgradeneeded=e=>{
        e.target.result.createObjectStore("docs",{keyPath:"id",autoIncrement:true});
      };
      r.onsuccess=e=>{this.db=e.target.result;res();}
    });
  }

  add(d){
    const tx=this.db.transaction("docs","readwrite");
    tx.objectStore("docs").add({...d,date:Date.now()});
  }

  getAll(){
    return new Promise(res=>{
      const tx=this.db.transaction("docs","readonly");
      const r=tx.objectStore("docs").getAll();
      r.onsuccess=()=>res(r.result);
    });
  }
}

/* ---------------- APP ---------------- */
class App{

  constructor(){

    this.file=document.getElementById("file");
    this.ocr=document.getElementById("ocr");
    this.summary=document.getElementById("summary");
    this.keywords=document.getElementById("keywords");
    this.title=document.getElementById("title");
    this.list=document.getElementById("list");
    this.searchBox=document.getElementById("search");

    this.ocrEngine=new OCR(()=>{});
    this.db=new DB();

    this.init();
  }

  async init(){
    await this.ocrEngine.init();
    await this.db.init();

    this.file.onchange=e=>this.run(e.target.files[0]);
  }

  async run(file){

    const img=new Image();
    const r=new FileReader();

    r.onload=e=>img.src=e.target.result;

    img.onload=async()=>{

      const raw=await this.ocrEngine.run(img);
      const clean=Post.clean(raw);

      this.ocr.value=clean;

      this.summary.value=AI.summary(clean);
      this.keywords.value=AI.keywords(clean);
      this.title.value=AI.title(clean);
    };

    r.readAsDataURL(file);
  }

  save(){
    this.db.add({
      title:this.title.value,
      ocr:this.ocr.value,
      summary:this.summary.value,
      keywords:this.keywords.value
    });
    alert("saved");
  }

  async search(){
    const list=await this.db.getAll();
    const k=this.searchBox.value;

    this.list.innerHTML="";

    list.filter(d=>
      d.title.includes(k)||
      d.ocr.includes(k)
    ).forEach(d=>{
      const div=document.createElement("div");
      div.innerHTML=`<b>${d.title}</b>`;
      div.onclick=()=>{
        this.title.value=d.title;
        this.ocr.value=d.ocr;
        this.summary.value=d.summary;
        this.keywords.value=d.keywords;
      };
      this.list.appendChild(div);
    });
  }

  exportMD(){Exporter.md(this.title.value,this.ocr.value,this.summary.value,this.keywords.value);}
  exportTXT(){Exporter.txt(this.title.value,this.ocr.value,this.summary.value,this.keywords.value);}
  exportPDF(){Exporter.pdf(this.title.value,this.ocr.value,this.summary.value,this.keywords.value);}

  downloadSelf(){
    const html="<!doctype html>\n"+document.documentElement.outerHTML;
    const blob=new Blob([html],{type:"text/html"});
    const url=URL.createObjectURL(blob);

    const a=document.createElement("a");
    a.href=url;
    a.download="ocr_ai_full.html";
    a.click();
  }
}

const app=new App();

</script>

</body>
</html>
