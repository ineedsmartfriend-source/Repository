<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>OCR AI Studio FIXED</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f1115;
  color:#fff;
}

header{
  padding:12px;
  background:#171a21;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:12px;
  display:grid;
  gap:10px;
}

.card{
  background:#171a21;
  padding:10px;
  border-radius:10px;
}

textarea,input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #333;
  background:#0f1115;
  color:#fff;
  box-sizing: border-box;
}

button{
  background:#4f8cff;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-top:6px;
}

img{
  max-width:100%;
  margin-top:10px;
}

/* 전체보기 모달 스타일 */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.8);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #171a21;
  padding: 20px;
  border-radius: 12px;
  width: 85%;
  max-width: 600px;
  max-height: 80%;
  overflow-y: auto;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  position: relative;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #333;
  padding-bottom: 10px;
  margin-bottom: 15px;
}

.modal-header h3 {
  margin: 0;
}

.close-btn {
  background: #ff4f4f;
  margin-top: 0;
}

.modal-body {
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.6;
}
</style>
</head>

<body>

<header>
  <div>OCR AI Studio FIXED (특수문자 & 다국어 강화판)</div>
</header>

<div class="container">

  <div class="card">
    <input type="file" id="file">
    <img id="preview"/>
  </div>

  <div class="card">
    <button onclick="app.runOCR()">OCR 실행 및 다국어·문맥 교정</button>
  </div>

  <div class="card">
    <h3>OCR 결과 (자동 교정됨)</h3>
    <textarea id="ocr" rows="8"></textarea>
    <button onclick="app.viewFull('교정된 OCR 결과', 'ocr')">전체보기</button>
  </div>

  <div class="card">
    <h3>Summary</h3>
    <textarea id="summary" rows="3"></textarea>
    <button onclick="app.viewFull('Summary 결과', 'summary')">전체보기</button>
  </div>

  <div class="card">
    <h3>Keywords</h3>
    <textarea id="keywords" rows="2"></textarea>
    <button onclick="app.viewFull('Keywords 결과', 'keywords')">전체보기</button>
  </div>

  <div class="card">
    <h3>Title</h3>
    <input id="title"/>
    <button onclick="app.viewFull('Title 결과', 'title')">전체보기</button>
  </div>

</div>

<div id="fullViewModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">타이틀</h3>
      <button class="close-btn" onclick="app.closeModal()">닫기</button>
    </div>
    <div id="modalBody" class="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>

/* =========================
   OCR ENGINE (다국어 확장)
========================= */
class OCR {
  constructor(){
    this.worker = null;
    this.ready = false;
  }

  async init(){
    // 다국어 확장을 위해 한글(kor), 영어(eng), 일어(jpn), 중국어 간체/번체(chi_sim, chi_tra)를 기본 세팅합니다.
    this.worker = await Tesseract.createWorker("kor+eng+jpn+chi_sim+chi_tra", 1, {
      logger: m => console.log(m)
    });

    this.ready = true;
  }

  async run(image){
    if(!this.ready){
      await this.init();
    }

    const res = await this.worker.recognize(image);
    return res.data.text || "";
  }
}

/* =========================
   SIMPLE AI (LOCAL) - 특수문자 및 다국어 정제 고도화
========================= */
class AI {

  static cleanText(text) {
    if (!text) return "";

    return text
      .split("\n")
      .map(line => {
        let l = line.trim();
        
        // 1. 단독으로 깨져서 굴러다니는 의미 없는 특수문자 기호행 전체 청소 (\ wv ¢, . Sr +, |? == 등)
        if (/^[\\\/•\.\*\-\+\s¢®©=\|?:\(\)\[\]{}’”"‘'<>«»;_·]{1,6}$/.test(l)) return "";
        
        // 2. [다국어 지원 강화] 문장 시작점에 붙은 시스템 노이즈 불필요 기호 걷어내기 
        // (한글, 영어, 일어 가타카나/히라가나/한자, 중국어 한자 영역을 보존하며 앞쪽 기호 제거)
        l = l.replace(/^[@®©•\*\-\+\s\d\/\d\|?=《<«]+/g, "").trim(); 
        
        // 3. 문장 중간에 잘못 스캔된 악성 특수기호 파편 제거 (글자 사이사이에 낀 기호)
        l = l.replace(/[\\\/\|¢\+=¢®©«»]/g, ""); 

        // 4. 단어 가독성을 해치는 극단적인 자소 분리 및 흔한 에러 매핑 교정
        l = l.replace(/할 일 을/g, "할 일을");
        l = l.replace(/정 학 히/g, "정확히");
        l = l.replace(/지 시 하기/g, "지시하기");
        l = l.replace(/달 사시/g, "달성 시");
        l = l.replace(/시 활용/g, "AI 활용");
        l = l.replace(/fee/gi, "비용(Fee)");

        return l.trim();
      })
      .filter(line => line.length > 0) // 깨끗한 문장 라인만 남기고 빈 칸 제외
      .join("\n");
  }

  static summary(text){
    const lines = text.split("\n");
    return lines.slice(0, 3).join("\n") || "요약 내용을 추출할 수 없습니다.";
  }

  static keywords(text){
    // 다국어(영어, 한글, 일어, 중국어 문자군) 정규식으로 키워드 매칭 범위 확장
    const words = text.toLowerCase().match(/[a-z가-힣一-龥ぁ-んァ-ヶ]{2,}/g) || [];
    const map = {};

    words.forEach(w=>{
      map[w] = (map[w]||0)+1;
    });

    const stopWords = ["현재", "또는", "대해", "이것", "함께", "각각"];

    return Object.entries(map)
      .filter(([word]) => !stopWords.includes(word))
      .sort((a,b)=>b[1]-a[1])
      .slice(0,6)
      .map(x=>x[0])
      .join(", ");
  }

  static title(text){
    const firstLine = text.split("\n")[0];
    return firstLine ? firstLine.slice(0, 30) : "OCR 분석 문서";
  }
}

/* =========================
   APPFLOW
========================= */
class App {

  constructor(){
    this.file = document.getElementById("file");
    this.preview = document.getElementById("preview");

    this.ocrEl = document.getElementById("ocr");
    this.summaryEl = document.getElementById("summary");
    this.keywordEl = document.getElementById("keywords");
    this.titleEl = document.getElementById("title");

    this.modal = document.getElementById("fullViewModal");
    this.modalTitle = document.getElementById("modalTitle");
    this.modalBody = document.getElementById("modalBody");

    this.ocr = new OCR();
    this.init();
  }

  async init(){
    await this.ocr.init();

    this.file.addEventListener("change", (e)=>{
      const file = e.target.files[0];
      if(!file) return;

      const reader = new FileReader();
      reader.onload = (ev)=>{
        this.preview.src = ev.target.result;
        this.currentImage = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    this.modal.addEventListener("click", (e) => {
      if(e.target === this.modal) this.closeModal();
    });
  }

  async runOCR(){
    if(!this.currentImage){
      alert("이미지를 먼저 선택하세요");
      return;
    }

    const img = new Image();
    img.src = this.currentImage;

    img.onload = async ()=>{
      try {
        const rawText = await this.ocr.run(img);
        const cleanedText = AI.cleanText(rawText);

        this.ocrEl.value = cleanedText;
        this.summaryEl.value = AI.summary(cleanedText);
        this.keywordEl.value = AI.keywords(cleanedText);
        this.titleEl.value = AI.title(cleanedText);

      } catch(err){
        console.error(err);
        alert("OCR 실행 중 오류가 발생했습니다.");
      }
    };
  }

  viewFull(title, elementId) {
    const targetElement = document.getElementById(elementId);
    if (!targetElement || !targetElement.value.trim()) {
      alert("표시할 내용이 없습니다.");
      return;
    }
    
    this.modalTitle.innerText = title;
    this.modalBody.innerText = targetElement.value;
    this.modal.style.display = "flex";
  }

  closeModal() {
    this.modal.style.display = "none";
  }
}

const app = new App();
</script>

</body>
</html>
