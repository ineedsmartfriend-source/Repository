<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>OCR 스마트 메모 정렬기</title>

<style>
body{
  margin:0;
  font-family:system-ui, -apple-system, sans-serif;
  background:#0f1115;
  color:#fff;
}
header{
  padding:16px;
  background:#171a21;
  font-weight: bold;
  font-size: 16px;
  border-bottom: 1px solid #232733;
}
.container{
  padding:16px;
  display:grid;
  gap:12px;
}
.card{
  background:#171a21;
  padding:16px;
  border-radius:12px;
  border: 1px solid #232733;
}
textarea{
  width:100%;
  padding:14px;
  border-radius:8px;
  border:1px solid #2e3344;
  background:#0f1115;
  color:#fff;
  box-sizing: border-box;
  font-size: 14px;
  line-height: 1.6;
  font-family: "Consolas", "Monaco", monospace;
}
button{
  background:#4f8cff;
  color:white;
  border:none;
  padding:14px;
  border-radius:8px;
  cursor:pointer;
  font-weight: bold;
  font-size: 15px;
  width: 100%;
}
button:hover { background: #3b76e0; }
img{
  max-width:100%;
  margin-top:12px;
  border-radius: 6px;
  display: none;
}
.progress-container {
  display: none;
  background: #222;
  border-radius: 8px;
  padding: 12px;
  margin-top: 10px;
}
.progress-bar {
  width: 0%;
  height: 8px;
  background: #4f8cff;
  border-radius: 4px;
  transition: width 0.1s;
}
.toolbar {
  display: none;
  margin-bottom: 10px;
}
.btn-copy {
  background: #2a2e3d;
  color: #7cb5ff;
  border: 1px solid #4f8cff;
  padding: 8px 16px;
  font-size: 13px;
  border-radius: 20px;
  width: auto;
  font-weight: bold;
  cursor: pointer;
}
/* 전처리용 숨김 캔버스 */
#hiddenCanvas { display: none; }
</style>
</head>

<body>

<header>📋 표조직 및 숫자 배지 완전 인식 스튜디오</header>

<div class="container">

  <div class="card">
    <input type="file" id="file" accept="image/*">
    <img id="preview"/>
    <canvas id="hiddenCanvas"></canvas>
  </div>

  <div class="card">
    <button onclick="app.processImage()">나란히 정렬해서 추출하기</button>
    <div id="progressContainer" class="progress-container">
      <div style="font-size:12px; margin-bottom:6px; color:#a0a5b5;" id="progressText">대기 중...</div>
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="card">
    <div id="toolbar" class="toolbar">
      <button class="btn-copy" onclick="app.copy()">📋 결과 메모 복사하기</button>
    </div>
    <textarea id="ocr" rows="15" placeholder="스캔 결과가 여기에 실시간으로 나란히 배치됩니다."></textarea>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
class ImagePreprocessor {
  // 주황색 배경의 흰색 숫자를 OCR 엔진이 문자로 인지할 수 있도록 흑백 고대비 반전 처리
  static preprocess(imgElement, canvas) {
    const ctx = canvas.getContext('2d');
    canvas.width = imgElement.naturalWidth;
    canvas.height = imgElement.naturalHeight;
    ctx.drawImage(imgElement, 0, 0);

    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imgData.data;

    for (let i = 0; i < data.length; i += 4) {
      let r = data[i], g = data[i+1], b = data[i+2];
      
      // 주황색 및 어두운 갈색 계열을 집중적으로 탐색하여 흰색 문자로 반전 보정
      if ((r > 120 && g < 90 && b < 40) || (r < 40 && g < 40 && b < 40)) {
        data[i] = 255; data[i+1] = 255; data[i+2] = 255; // 배경을 밝게
      } else if (r > 200 && g > 200 && b > 200) {
        data[i] = 0; data[i+1] = 0; data[i+2] = 0; // 흰색 글자를 검게
      }
      
      // 전반적인 고대비 이진화 가동
      let v = (0.2126*r + 0.7152*g + 0.0722*b >= 110) ? 255 : 0;
      data[i] = v; data[i+1] = v; data[i+2] = v;
    }
    ctx.putImageData(imgData, 0, 0);
    return canvas.toDataURL();
  }
}

class AdvancedAligner {
  static format(ocrData) {
    if (!ocrData || !ocrData.words) return "인식된 데이터가 없습니다.";

    // 노이즈 차단 및 단어 파편 병합
    let words = ocrData.words.map(w => {
      let txt = w.text.trim().replace(/[^a-zA-Z0-9가-힣\s\.\,\-\·]/g, "");
      // 오타 정정 사전 연동
      txt = txt.replace(/^No$/g, "No.").replace(/^O1$/g, "01").replace(/^O2$/g, "02")
               .replace(/^O8$/g, "08").replace(/^IO$/g, "10").replace(/할일을/g, "할 일");
      
      if (!txt || txt.length === 0) return null;
      return { text: txt, x0: w.bbox.x0, x1: w.bbox.x1, y0: w.bbox.y0, y1: w.bbox.y1, h: w.bbox.y1 - w.bbox.y0 };
    }).filter(w => w !== null);

    if (words.length === 0) return "유효한 글자가 없습니다.";

    // 가로 행 추적 알고리즘 개편 (동적 가로 밴드 추적 방식)
    let rows = [];
    words.sort((a, b) => a.y0 - b.y0);

    while (words.length > 0) {
      let base = words.shift();
      let currentRow = [base];
      let baseCenter = (base.y0 + base.y1) / 2;
      let allowedGap = base.h * 0.65; // 세로 오차 한계선 설정

      for (let i = 0; i < words.length; i++) {
        let targetCenter = (words[i].y0 + words[i].y1) / 2;
        if (Math.abs(targetCenter - baseCenter) <= allowedGap) {
          currentRow.push(words[i]);
          words.splice(i, 1);
          i--;
        }
      }
      currentRow.sort((a, b) => a.x0 - b.x0);
      rows.push(currentRow);
    }
    
    rows.sort((a, b) => a[0].y0 - b[0].y0);

    // 열 구조화 보정 매핑
    return rows.map(row => {
      let finalLine = "";
      for (let i = 0; i < row.length; i++) {
        let curr = row[i];
        if (i === 0) {
          finalLine += curr.text;
        } else {
          let prev = row[i-1];
          let spaceDistance = curr.x0 - prev.x1;
          
          // 단어 간의 물리 거리가 넓으면 표의 다른 컬럼으로 인지하고 가독성 좋은 탭 구분선 삽입
          if (spaceDistance > curr.h * 1.5) {
            finalLine += "   |   " + curr.text;
          } else {
            finalLine += " " + curr.text;
          }
        }
      }
      return finalLine;
    }).filter(line => line.replace(/[^a-zA-Z0-9가-힣]/g, "").length > 0).join("\n");
  }
}

class App {
  constructor(){
    this.file = document.getElementById("file");
    this.preview = document.getElementById("preview");
    this.canvas = document.getElementById("hiddenCanvas");
    this.ocrEl = document.getElementById("ocr");
    this.pContainer = document.getElementById("progressContainer");
    this.pBar = document.getElementById("progressBar");
    this.pText = document.getElementById("progressText");
    this.toolbar = document.getElementById("toolbar");

    this.worker = null;
    this.init();
  }

  async init(){
    this.worker = await Tesseract.createWorker("kor+eng", 1);
    this.file.addEventListener("change", (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        this.preview.src = ev.target.result;
        this.preview.style.display = "block";
        this.toolbar.style.display = "none";
      };
      reader.readAsDataURL(file);
    });
  }

  async processImage(){
    if(!this.preview.src){
      alert("이미지를 먼저 선택해 주세요.");
      return;
    }
    
    this.pContainer.style.display = "block";
    this.pBar.style.width = "20%";
    this.pText.innerText = "1단계: 배지 숫자 그래픽 인식률 복원 중...";

    const processedDataUrl = ImagePreprocessor.preprocess(this.preview, this.canvas);
    
    this.pBar.style.width = "50%";
    this.pText.innerText = "2단계: 딥러닝 문자 정밀 추출 중...";

    const img = new Image();
    img.src = processedDataUrl;
    img.onload = async () => {
      try {
        const rawResult = await this.worker.recognize(img);
        
        this.pBar.style.width = "90%";
        this.pText.innerText = "3단계: 수평 가로 정렬 조립 중...";

        const finalizedMemo = AdvancedAligner.format(rawResult.data);
        this.ocrEl.value = finalizedMemo;

        this.pBar.style.width = "100%";
        this.pText.innerText = "추출 및 정렬이 완료되었습니다!";
        this.toolbar.style.display = "block";
        
        setTimeout(() => { this.pContainer.style.display = "none"; }, 500);
      } catch (err) {
        console.error(err);
        alert("OCR 처리 중 오류가 발생했습니다.");
        this.pContainer.style.display = "none";
      }
    };
  }

  async copy() {
    if(!this.ocrEl.value.trim()) return;
    await navigator.clipboard.writeText(this.ocrEl.value);
    alert("메모가 깔끔하게 클립보드에 저장되었습니다! 필요한 곳에 붙여넣으세요.");
  }
}

const app = new App();
</script>

</body>
</html>
