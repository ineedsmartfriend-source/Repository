<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>OCR AI Studio v1.0</title>

<link rel="manifest" id="manifestTag">

<style>
:root{
  --bg:#0f1115;
  --panel:#171a21;
  --text:#e6e6e6;
  --accent:#4f8cff;
  --border:#2a2f3a;
}

[data-theme="light"]{
  --bg:#f5f6f8;
  --panel:#fff;
  --text:#111;
  --border:#ddd;
}

*{box-sizing:border-box;font-family:system-ui;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:14px;
  background:var(--panel);
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}

.container{
  padding:12px;
  display:grid;
  gap:12px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
}

textarea,input,select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
}

button{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

@media(max-width:768px){
  .row{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div>OCR AI Studio v1.0</div>
</header>

<div class="container">

  <!-- AI 설정 -->
  <div class="card">
    <select id="aiMode">
      <option value="local">Local AI</option>
      <option value="openai">OpenAI</option>
      <option value="gemini">Gemini</option>
    </select>
    <input id="apiKey" placeholder="API Key (optional)">
  </div>

  <!-- 업로드 -->
  <div class="card">
    <input type="file" id="fileInput">
  </div>

  <!-- OCR -->
  <div class="card">
    <h3>OCR</h3>
    <textarea id="ocr"></textarea>
  </div>

  <!-- AI 결과 -->
  <div class="card">
    <h3>Summary</h3>
    <textarea id="summary"></textarea>
  </div>

  <div class="card">
    <h3>Keywords</h3>
    <textarea id="keywords"></textarea>
  </div>

  <div class="card">
    <h3>Title</h3>
    <input id="title">
  </div>

  <!-- 저장 -->
  <div class="card row">
    <button onclick="app.save()">Save</button>
    <button onclick="app.exportMD()">MD</button>
    <button onclick="app.exportTXT()">TXT</button>
    <button onclick="app.exportPDF()">PDF</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

/* ---------------- AI ---------------- */

class LocalAI{
  static summarize(t){
    const s=t.split(/[.?\n]/).filter(Boolean);
    return s.slice(0,3).join(". ");
  }

  static keywords(t){
    const w=t.toLowerCase().match(/[a-z가-힣]{2,}/g)||[];
    const f={};
    w.forEach(x=>f[x]=(f[x]||0)+1);
    return Object.entries(f).sort((a,b)=>b[1]-a[1]).slice(0,8).map(x=>x[0]).join(", ");
  }

  static title(t){
    return t.split(/\n/)[0]?.slice(0,40)||"OCR Document";
  }
}

class AIEngine{
  constructor(){
    this.mode="local";
    this.key="";
  }

  setMode(m){this.mode=m;}
  setKey(k){this.key=k;}

  async summarize(t){
    if(this.mode==="local") return LocalAI.summarize(t);
    return LocalAI.summarize(t);
  }

  async keywords(t){return LocalAI.keywords(t);}
  async title(t){return LocalAI.title(t);}
}

/* ---------------- OCR ---------------- */

class OCR{
  constructor(onProgress){
    this.onProgress=onProgress;
    this.worker=Tesseract.createWorker();
  }

  async init(){
    await this.worker.load();
    await this.worker.loadLanguage("eng+kor");
    await this.worker.initialize("eng+kor");
  }

  async run(img){
    const r=await this.worker.recognize(img,{},{
      logger:m=>{
        if(m.status==="recognizing text"){
          this.onProgress(Math.round(m.progress*100));
        }
      }
    });

    return r.data.text;
  }
}

/* ---------------- POST PROCESS ---------------- */

class Post{
  static fix(t){
    return t
      .replace(/\n+/g,"\n")
      .replace(/-\n/g,"")
      .trim();
  }
}

/* ---------------- EXPORT ---------------- */

class Exporter{
  static md(t,o,s,k){
    const md=`# ${t}\n\n## OCR\n${o}\n\n## Summary\n${s}\n\n## Keywords\n${k}`;
    this.download("doc.md",md,"text/markdown");
  }

  static txt(t,o,s,k){
    const txt=`${t}\n\n${o}\n\n${s}\n\n${k}`;
    this.download("doc.txt",txt,"text/plain");
  }

  static pdf(t,o,s,k){
    const el=document.createElement("div");
    el.innerHTML=`<h1>${t}</h1><p>${o}</p><p>${s}</p><p>${k}</p>`;
    html2pdf().from(el).save("doc.pdf");
  }

  static download(n,c,t){
    const b=new Blob([c],{type:t});
    const u=URL.createObjectURL(b);
    const a=document.createElement("a");
    a.href=u;a.download=n;a.click();
  }
}

/* ---------------- DB ---------------- */

class DB{
  constructor(){
    this.name="ocr_v1";
    this.store="docs";
  }

  async init(){
    return new Promise(res=>{
      const r=indexedDB.open(this.name,1);
      r.onupgradeneeded=e=>{
        e.target.result.createObjectStore(this.store,{keyPath:"id",autoIncrement:true});
      };
      r.onsuccess=e=>{this.db=e.target.result;res();}
    });
  }

  add(d){
    const tx=this.db.transaction(this.store,"readwrite");
    tx.objectStore(this.store).add(d);
  }
}

/* ---------------- APP ---------------- */

class App{
  constructor(){

    this.file=document.getElementById("fileInput");
    this.ocr=document.getElementById("ocr");
    this.sum=document.getElementById("summary");
    this.key=document.getElementById("keywords");
    this.title=document.getElementById("title");

    this.ai=new AIEngine();
    this.ocrEngine=new OCR(()=>{});

    this.db=new DB();

    this.init();
  }

  async init(){
    await this.db.init();
    await this.ocrEngine.init();

    this.file.onchange=e=>this.run(e.target.files[0]);
  }

  async run(file){

    const img=new Image();
    const reader=new FileReader();

    reader.onload=e=>{
      img.src=e.target.result;
    };

    img.onload=async()=>{

      const raw=await this.ocrEngine.run(img);
      const clean=Post.fix(raw);

      this.ocr.value=clean;

      this.sum.value=await this.ai.summarize(clean);
      this.key.value=await this.ai.keywords(clean);
      this.title.value=await this.ai.title(clean);
    };

    reader.readAsDataURL(file);
  }

  save(){
    this.db.add({
      title:this.title.value,
      ocr:this.ocr.value,
      summary:this.sum.value,
      keywords:this.key.value,
      date:Date.now()
    });
    alert("saved");
  }

  exportMD(){
    Exporter.md(this.title.value,this.ocr.value,this.sum.value,this.key.value);
  }

  exportTXT(){
    Exporter.txt(this.title.value,this.ocr.value,this.sum.value,this.key.value);
  }

  exportPDF(){
    Exporter.pdf(this.title.value,this.ocr.value,this.sum.value,this.key.value);
  }
}

const app=new App();

</script>

</body>
</html>
